  # ════════════════════════════════════════════════════════════════════════
  # Basis Dimension Sweep
  #
  # Adds fixed basis_dim overrides of 32, 64, and 128 for every unique
  # configuration in this file that contains Wavelet / TrendWavelet-family
  # blocks and therefore consumes block_params.basis_dim.
  #
  # Duplicate guard: no configs in the original file already set
  # basis_dim to 32, 64, or 128, and the duplicated base config name
  # `TrendAELG+DB3WaveletV3AELG-30-skip` is swept only once here.
  #
  # Naming convention: <base_name>_bd32 / _bd64 / _bd128
  #
  # Swept base configs:
  #   novel_nonae:
  #     - Trend+Coif2WaveletV3-30
  #     - TrendWaveletGeneric-10
  #     - TrendWaveletGeneric-30
  #     - Trend+Coif2WaveletV3-30-activeG
