# ============================================================
# AutoEncoder Pure-Stack Study on M4
# Tests AutoEncoder, AutoEncoderAE, and AutoEncoderAELG variants
#
# Stack depth: 10 (sub-1M parameter budget)
# active_g: false, true
# Latent dims: ld=32 for AE/AAE, ld=16 for AELG
# LR Scheduler: ReduceLROnPlateau
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/autoencoder_pure_m4.yaml
#   python experiments/run_from_yaml.py experiments/configs/autoencoder_pure_m4.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/autoencoder_pure_m4.yaml --max-epochs 50 --periods Yearly
# ============================================================

experiment_name: autoencoder_pure_m4
category: ae_pure_study
description: >
  Pure stacks of AutoEncoder (ld=32), AutoEncoderAE (ld=32), and AutoEncoderAELG (ld=16)
  on M4 all periods. Tests active_g (false, true) with ReduceLROnPlateau scheduler
  at 10-stack depth for sub-1M parameter regime.

dataset: m4
periods:
  - Yearly
  - Quarterly
  - Monthly
  - Weekly
  - Daily
  - Hourly


# Paper-sampling protocol — matched to comprehensive_m4_paper_sample_plateau.yaml
protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Yearly: 1.5
    Quarterly: 1.5
    Monthly: 10
    Weekly: 10
    Daily: 10
    Hourly: 10
# Global training defaults — matched to comprehensive_m4_paper_sample_plateau.yaml
training:
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

hardware:
  num_workers: 2

block_params:
  basis_dim: 128

# ReduceLROnPlateau scheduler — matched to comprehensive_m4_paper_sample_plateau.yaml
# Step-cadence (every 100 steps) so plateau triggers track val_check_interval and
# get sufficient firing opportunities under nbeats_paper sampling. factor=0.75 with
# patience=2 + cooldown=1 yields ~3-6 actual drops per run (cumulative decay
# 0.75^4 ~= 0.32) without collapsing LR to min_lr mid-run.
lr_scheduler:
  type: plateau
  factor: 0.75
  patience: 1
  cooldown: 0
  min_lr: 1.0e-06
  mode: min
  monitor: val_loss
  interval: step
  frequency: 100

# Extra CSV columns for tracking
extra_csv_columns:
  - block_type_cfg
  - latent_dim_cfg
  - active_g_cfg

# --- Pure stacks of 10 blocks ---
# 6 total configs: 3 block types × 2 active_g settings
configs:
  # AutoEncoder (ld=32, ag=false)
  - name: AE_10s_ld32_ag0
    stacks:
      type: homogeneous
      block: AutoEncoder
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: false
    extra_fields:
      block_type_cfg: AutoEncoder
      latent_dim_cfg: 32
      active_g_cfg: false

  # AutoEncoder (ld=32, ag=true)
  - name: AE_10s_ld32_ag1
    stacks:
      type: homogeneous
      block: AutoEncoder
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: true
    extra_fields:
      block_type_cfg: AutoEncoder
      latent_dim_cfg: 32
      active_g_cfg: true

  # AutoEncoderAE (ld=32, ag=false)
  - name: AAE_10s_ld32_ag0
    stacks:
      type: homogeneous
      block: AutoEncoderAE
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: false
    extra_fields:
      block_type_cfg: AutoEncoderAE
      latent_dim_cfg: 32
      active_g_cfg: false

  # AutoEncoderAE (ld=32, ag=true)
  - name: AAE_10s_ld32_ag1
    stacks:
      type: homogeneous
      block: AutoEncoderAE
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: true
    extra_fields:
      block_type_cfg: AutoEncoderAE
      latent_dim_cfg: 32
      active_g_cfg: true

  # AutoEncoderAELG (ld=16, ag=false)
  - name: AELG_10s_ld16_ag0
    stacks:
      type: homogeneous
      block: AutoEncoderAELG
      n: 10
    block_params:
      latent_dim: 16
      thetas_dim: 5
    training:
      active_g: false
    extra_fields:
      block_type_cfg: AutoEncoderAELG
      latent_dim_cfg: 16
      active_g_cfg: false

  # AutoEncoderAELG (ld=16, ag=true)
  - name: AELG_10s_ld16_ag1
    stacks:
      type: homogeneous
      block: AutoEncoderAELG
      n: 10
    block_params:
      latent_dim: 16
      thetas_dim: 5
    training:
      active_g: true
    extra_fields:
      block_type_cfg: AutoEncoderAELG
      latent_dim_cfg: 16
      active_g_cfg: true
