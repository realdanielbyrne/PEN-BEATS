# ============================================================
# generic_dim Sweep + Stack Depth Study
# TrendWaveletGeneric Family — M4 Yearly
#
# PURPOSE:
#   Two complementary studies in one config:
#
#   Study 1 — generic_dim sweep (12 configs):
#     Sweeps the learned generic branch rank in [3, 5, 8, 16] across all three
#     TrendWaveletGeneric backbone variants (RootBlock, AERootBlock, AERootBlockLG).
#     All other params fixed to empirically validated best values for M4 Yearly.
#
#   Study 2 — Stack depth sweep (9 configs):
#     Fixes generic_dim=5 (default) and sweeps n_stacks in [5, 15, 20].
#     n=10 is already covered by Study 1 (gd5 configs). Parameter count for
#     TWG* blocks is low, so extra stacks are inexpensive to test.
#
#   Baselines (2 configs):
#     TrendWaveletAE and TrendWaveletAELG at the same basis_dim=6 (eq_fcast)
#     provide a no-generic-branch reference at generic_dim_cfg=0.
#     TW (RootBlock) excluded — proven weaker than AE variants in prior studies.
#
# TOTAL: 23 configs
#
# DESIGN NOTE — WaveletV3Generic:
#   The user envisioned a "WaveletV3 + generic side path" block (2-way: wavelet +
#   learned generic, no polynomial trend). This block type does not yet exist.
#   Creating it would require a new class in blocks.py, a constants.py registration,
#   and create_stack() routing in models.py. Noted for future work.
#   This config focuses exclusively on the existing TrendWaveletGeneric family.
#
# FIXED PARAMETERS (all validated best values for M4 Yearly TrendWavelet studies):
#   wavelet_type:    coif2   (best family for M4 AE variants)
#   basis_dim:       6       (eq_fcast; M4 Yearly forecast_length=6)
#   trend_thetas_dim:3       (winner in all prior TrendWavelet experiments)
#   latent_dim:      16      (critical for AE/AELG stability — MEMORY.md)
#   active_g:        false   (paper-faithful)
#
# PARAMETER NOTE:
#   basis_dim=6 (eq_fcast) differs from trendwavelet_generic_effectiveness.yaml
#   which used basis_dim=4 (lt_fcast). Direct numerical comparison requires care.
#
# CONTEXT:
#   - M4 Yearly best unified TWGAELG (effectiveness study): SMAPE=14.183
#     (coif2, lt_fcast bd=4, td=3, ld=16, gd=5)
#   - M4 Yearly non-AE SOTA: SMAPE=13.410
#   - This study probes whether gd≠5 or n≠10 improves further at bd=6.
#
# RESEARCH QUESTIONS:
#   Q1: Does adding a generic branch (gd>0) improve over TWAE/TWAELG baselines?
#   Q2: What is the optimal generic_dim per backbone (3/5/8/16)?
#   Q3: Does increasing stack depth (5→10→15→20) help at gd=5?
#   Q4: Is there a backbone × generic_dim interaction?
#
# ESTIMATED RUNTIME:
#   Round 1 (10 epochs):  23 configs × 3 runs = 69 runs
#   Round 2 (15 epochs): ~15 configs × 3 runs = ~45 runs  (keep_fraction=0.67)
#   Round 3 (50 epochs): top_k=10    × 3 runs = ~30 runs
#   Total: ~144 training runs
#
# USAGE:
#   # Dry-run to verify config parsing
#   python experiments/run_from_yaml.py experiments/configs/generic_dim_sweep.yaml --dry-run
#
#   # Full pipeline
#   python experiments/run_from_yaml.py experiments/configs/generic_dim_sweep.yaml
#
#   # Parallel workers (claim files prevent duplicate work)
#   python experiments/run_from_yaml.py experiments/configs/generic_dim_sweep.yaml --worker-id gpu0
#   python experiments/run_from_yaml.py experiments/configs/generic_dim_sweep.yaml --worker-id gpu1
#
#   # Analyze existing results without retraining
#   python experiments/run_from_yaml.py experiments/configs/generic_dim_sweep.yaml --analyze-only
#
#   # Smoke test (2 epochs per round)
#   python experiments/run_from_yaml.py experiments/configs/generic_dim_sweep.yaml --max-epochs 2
# ============================================================

experiment_name: generic_dim_sweep
category: trendwavelet_generic_dim
description: >
  Sweeps generic_dim in [3, 5, 8, 16] and stack depth in [5, 10, 15, 20] for
  TrendWaveletGeneric, TrendWaveletGenericAE, and TrendWaveletGenericAELG blocks
  on M4 Yearly. Includes TWAE/TWAELG no-generic baselines at basis_dim=6 (eq_fcast).
  Uses 3-round successive halving search.

dataset: m4
periods:
  - Yearly

# Global training defaults — paper-faithful; no active_g sweep
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_epochs: 50            # overridden per round by search schedule
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

# Global block params — validated best settings for M4 Yearly TrendWavelet studies.
# latent_dim ignored by non-AE blocks; generic_dim ignored by non-Generic blocks.
block_params:
  wavelet_type: coif2
  basis_dim: 6              # eq_fcast for M4 Yearly (forecast_length=6)
  trend_thetas_dim: 3       # empirical winner across all prior TrendWavelet experiments
  latent_dim: 16            # critical for AE/AELG stability (MEMORY.md)
  generic_dim: 5            # global default; overridden per config in Study 1

# LR scheduler — cosine annealing after warmup (matches all prior TrendWavelet configs)
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

# Extra CSV columns for study metadata
extra_csv_columns:
  - search_round
  - generic_dim_cfg
  - block_type
  - backbone
  - n_stacks

# ── Configs ──────────────────────────────────────────────────────────────────
#
# Study 1: generic_dim sweep (12 configs, n=10 fixed)
#   3 block types × 4 generic_dim values
#   - TWG (RootBlock)        — gd=[3,5,8,16]
#   - TWGAE (AERootBlock)    — gd=[3,5,8,16], latent_dim=16
#   - TWGAELG (AERootBlockLG)— gd=[3,5,8,16], latent_dim=16
#
# Study 2: Stack height sweep (9 configs, gd=5 fixed)
#   n=10 already covered by Study 1 (gd=5 configs); only n=[5,15,20] are new.
#   3 block types × 3 new stack heights
#
# Baselines (2 configs, n=10, gd=0 effectively)
#   - TWAE  (no generic branch, AERootBlock)
#   - TWAELG (no generic branch, AERootBlockLG)
#
# CSV analysis tip:
#   df[df.generic_dim_cfg != 'N/A'].groupby(['block_type','generic_dim_cfg'])  → Study 1
#   df[df.generic_dim_cfg == 5].groupby(['block_type','n_stacks'])             → Study 2
#   df[df.generic_dim_cfg == 0]                                                → Baselines
# ─────────────────────────────────────────────────────────────────────────────

configs:

  # ══════════════════════════════════════════════════════════════════════════
  # STUDY 1: generic_dim sweep (n=10)
  # ══════════════════════════════════════════════════════════════════════════

  # ── TrendWaveletGeneric (RootBlock backbone) ──────────────────────────────
  # Standard 4-FC backbone; no AE bottleneck. Uses t_width=256.

  - name: TWG_coif2_bd6_td3_gd3
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    block_params:
      generic_dim: 3
    extra_fields:
      generic_dim_cfg: 3
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 10

  - name: TWG_coif2_bd6_td3_gd5
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 10

  - name: TWG_coif2_bd6_td3_gd8
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    block_params:
      generic_dim: 8
    extra_fields:
      generic_dim_cfg: 8
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 10

  - name: TWG_coif2_bd6_td3_gd16
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    block_params:
      generic_dim: 16
    extra_fields:
      generic_dim_cfg: 16
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 10

  # ── TrendWaveletGenericAE (AERootBlock backbone, latent_dim=16) ──────────
  # AE encoder-decoder bottleneck. latent_dim=16 critical per MEMORY.md.

  - name: TWGAE_coif2_bd6_td3_ld16_gd3
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 10
    block_params:
      generic_dim: 3
    extra_fields:
      generic_dim_cfg: 3
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 10

  - name: TWGAE_coif2_bd6_td3_ld16_gd5
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 10
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 10

  - name: TWGAE_coif2_bd6_td3_ld16_gd8
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 10
    block_params:
      generic_dim: 8
    extra_fields:
      generic_dim_cfg: 8
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 10

  - name: TWGAE_coif2_bd6_td3_ld16_gd16
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 10
    block_params:
      generic_dim: 16
    extra_fields:
      generic_dim_cfg: 16
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 10

  # ── TrendWaveletGenericAELG (AERootBlockLG backbone, latent_dim=16) ──────
  # Learned-gate AE: adds sigmoid(gate)*z at latent layer.

  - name: TWGAELG_coif2_bd6_td3_ld16_gd3
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    block_params:
      generic_dim: 3
    extra_fields:
      generic_dim_cfg: 3
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 10

  - name: TWGAELG_coif2_bd6_td3_ld16_gd5
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 10

  - name: TWGAELG_coif2_bd6_td3_ld16_gd8
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    block_params:
      generic_dim: 8
    extra_fields:
      generic_dim_cfg: 8
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 10

  - name: TWGAELG_coif2_bd6_td3_ld16_gd16
    category: generic_dim_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    block_params:
      generic_dim: 16
    extra_fields:
      generic_dim_cfg: 16
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 10

  # ══════════════════════════════════════════════════════════════════════════
  # STUDY 2: Stack height sweep (gd=5, n=[5,15,20])
  # n=10 @ gd=5 is already covered in Study 1 above.
  # ══════════════════════════════════════════════════════════════════════════

  # ── TrendWaveletGeneric stack heights ─────────────────────────────────────

  - name: TWG_coif2_bd6_td3_gd5_n5
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 5
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 5

  - name: TWG_coif2_bd6_td3_gd5_n15
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 15
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 15

  - name: TWG_coif2_bd6_td3_gd5_n20
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 20
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      n_stacks: 20

  # ── TrendWaveletGenericAE stack heights ───────────────────────────────────

  - name: TWGAE_coif2_bd6_td3_ld16_gd5_n5
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 5
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 5

  - name: TWGAE_coif2_bd6_td3_ld16_gd5_n15
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 15
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 15

  - name: TWGAE_coif2_bd6_td3_ld16_gd5_n20
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 20
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      n_stacks: 20

  # ── TrendWaveletGenericAELG stack heights ─────────────────────────────────

  - name: TWGAELG_coif2_bd6_td3_ld16_gd5_n5
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 5
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 5

  - name: TWGAELG_coif2_bd6_td3_ld16_gd5_n15
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 15
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 15

  - name: TWGAELG_coif2_bd6_td3_ld16_gd5_n20
    category: stack_depth_sweep
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 20
    block_params:
      generic_dim: 5
    extra_fields:
      generic_dim_cfg: 5
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      n_stacks: 20

  # ══════════════════════════════════════════════════════════════════════════
  # BASELINES: No-generic-branch reference at basis_dim=6 (eq_fcast)
  # generic_dim_cfg=0 enables numeric regression across [0,3,5,8,16].
  # TW (RootBlock) excluded — proven weaker than AE variants in prior studies.
  # ══════════════════════════════════════════════════════════════════════════

  - name: TWAE_coif2_bd6_td3_ld16_baseline
    category: no_generic_baseline
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    extra_fields:
      generic_dim_cfg: 0
      block_type: TrendWaveletAE
      backbone: AERootBlock
      n_stacks: 10

  - name: TWAELG_coif2_bd6_td3_ld16_baseline
    category: no_generic_baseline
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    extra_fields:
      generic_dim_cfg: 0
      block_type: TrendWaveletAELG
      backbone: AERootBlockLG
      n_stacks: 10

# Single pass (active_g: false defined globally above)
# No 'passes' key → single pass named after experiment_name

# Base run count; overridden per round by the search schedule
runs:
  n_runs: 3
  base_seed: 42

# Successive halving search
# Round 1 (10 epochs): 23 configs × 3 runs = 69  → keep top 67% (~15 configs)
# Round 2 (15 epochs): ~15 configs × 3 runs = ~45 → keep top 67% (~10 configs)
# Round 3 (50 epochs): top_k=10              × 3 runs = ~30 runs
search:
  enabled: true
  rounds:
    - max_epochs: 10
      n_runs: 3
      keep_fraction: 0.67
    - max_epochs: 15
      n_runs: 3
      keep_fraction: 0.67
    - max_epochs: 50
      n_runs: 3
      top_k: 10

output:
  results_dir: experiments/results
  csv_filename: generic_dim_sweep_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0
  worker_id: ""

analysis:
  enabled: true
  ranking: true
