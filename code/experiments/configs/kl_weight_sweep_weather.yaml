experiment_name: kl_weight_sweep_weather
dataset: weather
periods: [Weather-96]
category: kl_weight_sweep
description: >
  KL weight sweep on TrendVAE+HaarWaveletV3 (10 stacks) for Weather-96.
  Tests kl_weight in [0.001, 0.01, 0.1, 1.0]. All other params held constant.

protocol:
  normalize: true
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true
  forecast_multiplier: 5
  batch_size: 256

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true
  skip_distance: 0
  skip_alpha: 0.0

runs:
  n_runs: 5
  seed_mode: sequential
  base_seed: 42

extra_csv_columns:
  - architecture
  - n_stacks
  - kl_weight_cfg

configs:
  - name: TVH10_kl0001
    category: kl_weight_sweep
    stacks: {type: alternating, blocks: [TrendVAE, HaarWaveletV3], repeats: 5}
    block_params: {kl_weight: 0.001}
    extra_fields:
      architecture: TrendVAE_HaarWaveletV3
      n_stacks: 10
      kl_weight_cfg: 0.001

  - name: TVH10_kl001
    category: kl_weight_sweep
    stacks: {type: alternating, blocks: [TrendVAE, HaarWaveletV3], repeats: 5}
    block_params: {kl_weight: 0.01}
    extra_fields:
      architecture: TrendVAE_HaarWaveletV3
      n_stacks: 10
      kl_weight_cfg: 0.01

  - name: TVH10_kl01
    category: kl_weight_sweep
    stacks: {type: alternating, blocks: [TrendVAE, HaarWaveletV3], repeats: 5}
    block_params: {kl_weight: 0.1}
    extra_fields:
      architecture: TrendVAE_HaarWaveletV3
      n_stacks: 10
      kl_weight_cfg: 0.1

  - name: TVH10_kl1
    category: kl_weight_sweep
    stacks: {type: alternating, blocks: [TrendVAE, HaarWaveletV3], repeats: 5}
    block_params: {kl_weight: 1.0}
    extra_fields:
      architecture: TrendVAE_HaarWaveletV3
      n_stacks: 10
      kl_weight_cfg: 1.0

output:
  results_dir: experiments/results
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
