# ============================================================
# ResNet-Style Skip Connection Study v3 — Long Backcast
#
# Follow-up to v1/v2 skip studies. Tests whether a longer
# backcast horizon (7×H instead of default 5×H) stabilizes
# block types that were unstable on M4-Yearly:
#
#   - GenericAELG: bimodal collapse at 30 stacks on M4
#     (SMAPE 36 without skip, ~14 with skip in v1)
#   - GenericVAE: never tested in v1/v2, but VAE backbone
#     known to compound reparameterization noise. Longer
#     backcast may give the stochastic latent space more
#     context to work with.
#
# Key hypotheses:
#   H1: 7×H backcast stabilizes GenericAELG at depth,
#       reducing or eliminating the bimodal collapse seen
#       at 5×H without needing skip connections.
#   H2: GenericVAE performs better with longer backcast
#       because the reparameterization noise is less
#       destructive when the encoder sees more context.
#   H3: If longer backcast alone stabilizes these blocks,
#       skip connections become redundant (as with
#       TrendWavelet families in v2).
#
# Design: 2 block types × 3 depths × 2 skip modes = 12 base
#   configs, plus 6 additional configs with skip_distance=3
#   for the deepest stacks. 30 configs total.
#
# Comparison reference: v1/v2 used forecast_multiplier=5
# (default). This study uses forecast_multiplier=7.
#
# Two-pass design:
#   Pass 1 (baseline): active_g=false
#   Pass 2 (activeG_fcast): active_g=forecast
#
# Method: 3-round successive halving (30 configs × 2 passes)
#   Round 1:  15 epochs, 3 runs, keep 50% -> ~15 survive
#   Round 2:  30 epochs, 3 runs, keep 50% -> ~8 survive
#   Round 3: 100 epochs, 5 runs -> final (early stopping)
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study_v3.yaml --dry-run
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study_v3.yaml
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study_v3.yaml --analyze-only
# ============================================================

experiment_name: resnet_skip_study_v3
dataset: m4
periods: [Yearly]
category: skip_connection_study_v3
description: >
  Long-backcast rescue study for unstable block types.
  Tests GenericAELG (bimodal collapse at depth) and GenericVAE
  (never tested in skip studies) with forecast_multiplier=7
  (backcast=42 for M4-Yearly H=6) instead of the default 5
  (backcast=30). Hypothesis: longer context stabilizes the
  learned gate (AELG) and stochastic latent space (VAE),
  reducing or eliminating the need for skip connections.

# ── Shared training defaults ──────────────────────────────────
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true
  forecast_multiplier: 7     # 7×H backcast (42 for M4-Yearly)

# Default block params
block_params:
  thetas_dim: 5

# Cosine annealing with warmup
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

# Two-pass design: baseline then active_g forecast
passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

# Successive halving search
search:
  enabled: true
  rounds:
    - {max_epochs: 15,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 30,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 100, n_runs: 5}

# Meta-forecaster disabled (unreliable per v1 analysis)
meta_forecaster:
  enabled: false

# Study-specific CSV columns
extra_csv_columns:
  - search_round
  - architecture
  - n_stacks
  - skip_distance_cfg
  - skip_alpha_cfg
  - forecast_multiplier_cfg

runs:
  n_runs: 3
  base_seed: 42

# ---------------------------------------------------------------------------
# 30 experimental configurations
# ---------------------------------------------------------------------------
configs:

  # ══════════════════════════════════════════════════════════════════════════
  # Section A: GenericAELG homogeneous — long backcast (15 configs)
  #
  #   v1 showed bimodal collapse at 30 stacks with 5×H backcast:
  #     GAELG30_no_skip: SMAPE ~36 (some seeds collapse to >60)
  #     GAELG30_skip5_a01: SMAPE ~13.8 (skip rescues)
  #   This section tests whether 7×H backcast alone prevents collapse,
  #   and whether skip remains necessary at extended lookback.
  #
  #   Block params: latent_dim=16, thetas_dim=5 (matches v1/v2)
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip, 7×H backcast) ──────────────────────────────────

  - name: GAELG10_7x_no_skip
    category: genAELG_long_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  - name: GAELG20_7x_no_skip
    category: genAELG_long_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  - name: GAELG30_7x_no_skip
    category: genAELG_long_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  # ── Skip distance=5, fixed alpha (matches v1 best) ─────────────────────

  - name: GAELG20_7x_skip5_a01
    category: genAELG_long_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  - name: GAELG30_7x_skip5_a01
    category: genAELG_long_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  - name: GAELG30_7x_skip5_learn
    category: genAELG_long_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable
      forecast_multiplier_cfg: 7

  # ── Skip distance=3, fixed alpha (short skip, deeper rescue) ───────────

  - name: GAELG20_7x_skip3_a01
    category: genAELG_long_skip_short
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  - name: GAELG30_7x_skip3_a01
    category: genAELG_long_skip_short
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  # ── 5×H control group (reproduce v1 collapse for comparison) ───────────

  - name: GAELG10_5x_no_skip
    category: genAELG_short_control
    stacks: {type: homogeneous, block: GenericAELG, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 5

  - name: GAELG20_5x_no_skip
    category: genAELG_short_control
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 5

  - name: GAELG30_5x_no_skip
    category: genAELG_short_control
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 5

  - name: GAELG30_5x_skip5_a01
    category: genAELG_short_control
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 5

  # ══════════════════════════════════════════════════════════════════════════
  # Section B: GenericVAE homogeneous — long backcast (15 configs)
  #
  #   GenericVAE uses AERootBlockVAE (reparameterization trick).
  #   Double-VAE pairing was catastrophic in v2, but homogeneous
  #   GenericVAE has never been tested at depth with skip or with
  #   extended backcast. The VAE backbone stores kl_loss which is
  #   added to training loss with weight 0.001.
  #
  #   Block params: latent_dim=16, thetas_dim=5 (matched to AELG)
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip, 7×H backcast) ──────────────────────────────────

  - name: GVAE10_7x_no_skip
    category: genVAE_long_baseline
    stacks: {type: homogeneous, block: GenericVAE, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  - name: GVAE20_7x_no_skip
    category: genVAE_long_baseline
    stacks: {type: homogeneous, block: GenericVAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  - name: GVAE30_7x_no_skip
    category: genVAE_long_baseline
    stacks: {type: homogeneous, block: GenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  # ── Skip distance=5, fixed alpha ───────────────────────────────────────

  - name: GVAE20_7x_skip5_a01
    category: genVAE_long_skip
    stacks: {type: homogeneous, block: GenericVAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  - name: GVAE30_7x_skip5_a01
    category: genVAE_long_skip
    stacks: {type: homogeneous, block: GenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  - name: GVAE30_7x_skip5_learn
    category: genVAE_long_skip
    stacks: {type: homogeneous, block: GenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable
      forecast_multiplier_cfg: 7

  # ── Skip distance=3, fixed alpha ───────────────────────────────────────

  - name: GVAE20_7x_skip3_a01
    category: genVAE_long_skip_short
    stacks: {type: homogeneous, block: GenericVAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 20
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  - name: GVAE30_7x_skip3_a01
    category: genVAE_long_skip_short
    stacks: {type: homogeneous, block: GenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 30
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 7

  # ── 5×H control group (baseline for comparison) ────────────────────────

  - name: GVAE10_5x_no_skip
    category: genVAE_short_control
    stacks: {type: homogeneous, block: GenericVAE, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 5

  - name: GVAE20_5x_no_skip
    category: genVAE_short_control
    stacks: {type: homogeneous, block: GenericVAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 5

  - name: GVAE30_5x_no_skip
    category: genVAE_short_control
    stacks: {type: homogeneous, block: GenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 5

  - name: GVAE30_5x_skip5_a01
    category: genVAE_short_control
    stacks: {type: homogeneous, block: GenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1, forecast_multiplier: 5}
    extra_fields:
      architecture: GenericVAE
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"
      forecast_multiplier_cfg: 5

  # ══════════════════════════════════════════════════════════════════════════
  # Section C: BottleneckGenericVAE — long backcast sanity check (3 configs)
  #
  #   BottleneckGenericVAE uses rank-d factorized basis expansion on top
  #   of the VAE backbone. Tests whether the bottleneck projection
  #   provides additional regularization that helps at depth with 7×H.
  #   Minimal section: 10/20/30 stacks, no skip, 7×H only.
  # ══════════════════════════════════════════════════════════════════════════

  - name: BGVAE10_7x_no_skip
    category: bottleneckVAE_probe
    stacks: {type: homogeneous, block: BottleneckGenericVAE, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: BottleneckGenericVAE
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  - name: BGVAE20_7x_no_skip
    category: bottleneckVAE_probe
    stacks: {type: homogeneous, block: BottleneckGenericVAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: BottleneckGenericVAE
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

  - name: BGVAE30_7x_no_skip
    category: bottleneckVAE_probe
    stacks: {type: homogeneous, block: BottleneckGenericVAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: BottleneckGenericVAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none
      forecast_multiplier_cfg: 7

output:
  results_dir: experiments/results
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
