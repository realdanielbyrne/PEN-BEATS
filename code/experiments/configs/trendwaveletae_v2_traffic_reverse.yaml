study_name: trendwaveletae_v2_study_traffic_reverse_f5

dataset: traffic
period: Traffic-96
# IMPORTANT: Traffic-96 requires forecast_multiplier >= 5 (backcast_length=480, L=5H) for reliable
# convergence. The default forecast_multiplier=2 (backcast_length=192, L=2H) causes 86-100%
# divergence across all block types. This was identified as the root cause of all pre-2026-03-09
# Traffic failures. See AsymWavelet Diagnostic study for confirmation.

architecture:
  block_type: [TrendWaveletAE, TrendWaveletAELG]
  repeats: 20

training:
  forecast_multiplier: 5  # L=5H required for Traffic convergence
  active_g: false
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search_space:
  # Reverse order: skip Haar, test non-Haar wavelets first
  wavelet_types: [sym10, sym3, sym2, coif10, coif3, coif2, coif1, db20, db10, db4, db3, db2]
  basis_labels: [eq_fcast, lt_fcast]
  trend_dims: [3]
  latent_dims: [8, 12]

search:
  rounds:
    - max_epochs: 15
      n_runs: 2
      keep_fraction: 0.50
    - max_epochs: 50
      n_runs: 3
      top_k: 5

meta_forecaster:
  enabled: true
  cache_dir: experiments/results/.meta_cache
  training_csvs:
    - experiments/results/m4/unified_benchmark_results.csv
    - experiments/results/m4/block_benchmark_results.csv
    - experiments/results/traffic/block_benchmark_results.csv
    - experiments/results/m4/convergence_study_results_v1.csv
    - experiments/results/weather/convergence_study_results_v1.csv
    - experiments/results/traffic/convergence_study_results_v1.csv

output:
  results_dir: experiments/results
  search_csv_filename: trendwaveletae_v2_study_results.csv
  cross_csv_path: experiments/results/trendwaveletae_v2_cross_dataset_results.csv

hardware:
  accelerator: auto
  num_workers: 0

runs:
  base_seed: 42

