# ============================================================
# Follow-up to comprehensive_m4_paper_sample: parity fills.
#
# Per the prior analysis report
# (experiments/analysis/analysis_reports/comprehensive_m4_paper_sample_analysis.md):
#   * sym10 was the best generalist wavelet (T+Sym10V3_30s_bdeq, mean rank 6.83/53)
#     but several architectural slots that already covered haar/coif2/db3 had
#     no sym10 entry. These are the natural fills.
#   * coif3 produced no per-period winner — dropped from this follow-up.
#
# Original sym10 fills (7 configs):
#   * TWAE / TWAELG sym10 (parents had db3 only, 10-stack, ld=32, ag0+agf)
#   * Alt TrendAE+Sym10V3AE at 10s and 30s (parent grid had haar/coif2/db3 only)
#   * Alt TrendAELG+Sym10V3ALG at 10s (parent 10s grid had db3 only)
#
# Appended parity fills (8 configs, see groups A/B/C below):
#   A. Alt Trend+WaveletV3 RootBlock at 10-stack (haar/coif2/db3/sym10) — parent
#      had only the 30-stack alternating-RB family; this provides the matching
#      low-budget comparator.
#   B. Alt TrendAELG+WaveletAELG at 10-stack for haar/coif2 — completes the
#      4-wavelet × 2-depth alt_aelg grid (sym10 done above; db3 in parent).
#   C. TrendWaveletAELG at latent_dim=16 (db3, 10s, ag0+agf) — parent and the
#      sym10 fills above test TWAELG only at ld=32; this exercises the AELG
#      gate at the smaller latent dim used by TWGAELG and the alt_aelg family.
#
# Total configs: 15 (× 6 periods × 10 runs = 900 runs total; ~480 new
# vs the 420 from the original 7).
# save_predictions: true so per-seed forecasts are kept on disk and a true
# forecast-level ensemble can be built later (averaging metrics is not the
# same as averaging forecasts).
#
# Top-level block_params.wavelet_type: sym10 is a DEFAULT — Group A/B/C
# configs override it locally where needed.
#
# Protocol matches comprehensive_m4_paper_sample.yaml exactly, so results are
# directly comparable to the existing sweep CSV.
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/comprehensive_m4_paper_sample_sym10_fills.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/comprehensive_m4_paper_sample_sym10_fills.yaml
# ============================================================

experiment_name: comprehensive_m4_paper_sample_sym10_fills
category: comprehensive_sweep_followup
description: >
  Sym10 fills for architectural slots that already covered haar/coif2/db3
  in comprehensive_m4_paper_sample. Same paper-sampling protocol; predictions
  saved for future ensemble construction.

dataset: m4
periods:
  - Yearly
  - Quarterly
  - Monthly
  - Weekly
  - Daily
  - Hourly

protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Yearly: 1.5
    Quarterly: 1.5
    Monthly: 10
    Weekly: 10
    Daily: 10
    Hourly: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

lr_scheduler:
  type: multistep
  n_milestones: 10
  gamma: 0.5

block_params:
  wavelet_type: sym10

runs:
  n_runs: 10
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: comprehensive_m4_paper_sample_sym10_fills_results.csv
  save_predictions: true

logging:
  wandb:
    enabled: true
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 3
  pin_memory: true

analysis:
  enabled: true
  ranking: true

extra_csv_columns:
  - arch_family
  - block_type_primary
  - backbone
  - stack_pattern
  - n_stacks
  - wavelet_family
  - basis_dim_label
  - latent_dim_cfg
  - trend_thetas_dim_cfg
  - skip_distance_cfg
  - active_g_cfg
  - kl_weight_cfg
  - share_weights_cfg

configs:

  # ── TrendWaveletAE sym10 (parent had db3 only) ─────────────────────────
  - name: TWAE_10s_ld32_sym10_ag0
    category: trendwaveletae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: sym10
      latent_dim: 32
    extra_fields:
      arch_family: trendwavelet_ae
      block_type_primary: TrendWaveletAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: TWAE_10s_ld32_sym10_agf
    category: trendwaveletae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    training:
      active_g: forecast
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: sym10
      latent_dim: 32
    extra_fields:
      arch_family: trendwavelet_ae
      block_type_primary: TrendWaveletAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: forecast

  # ── TrendWaveletAELG sym10 (parent had db3 only) ───────────────────────
  - name: TWAELG_10s_ld32_sym10_ag0
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: sym10
      latent_dim: 32
    extra_fields:
      arch_family: trendwavelet_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: TWAELG_10s_ld32_sym10_agf
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    training:
      active_g: forecast
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: sym10
      latent_dim: 32
    extra_fields:
      arch_family: trendwavelet_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: forecast

  # ── Alternating TrendAE+Sym10V3AE (parent had haar/coif2/db3 only) ─────
  - name: TAE+Sym10V3AE_30s_ld32_ag0
    category: alt_ae
    stacks:
      type: alternating
      blocks: [TrendAE, Symlet10WaveletV3AE]
      repeats: 15
    training:
      active_g: false
    block_params:
      latent_dim: 32
    extra_fields:
      arch_family: alt_ae
      block_type_primary: TrendAE+Symlet10WaveletV3AE
      backbone: AERootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: null
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: null
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: TAE+Sym10V3AE_10s_ld32_ag0
    category: alt_ae
    stacks:
      type: alternating
      blocks: [TrendAE, Symlet10WaveletV3AE]
      repeats: 5
    training:
      active_g: false
    block_params:
      latent_dim: 32
    extra_fields:
      arch_family: alt_ae
      block_type_primary: TrendAE+Symlet10WaveletV3AE
      backbone: AERootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: null
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: null
      skip_distance_cfg: 0
      active_g_cfg: false

  # ── Alt TrendAELG+Sym10V3AELG 10-stack (parent had db3 10-stack only) ──
  - name: TALG+Sym10V3ALG_10s_ag0
    category: alt_aelg
    stacks:
      type: alternating
      blocks: [TrendAELG, Symlet10WaveletV3AELG]
      repeats: 5
    training:
      active_g: false
    block_params:
      latent_dim: 16
    extra_fields:
      arch_family: alt_aelg
      block_type_primary: TrendAELG+Symlet10WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: null
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: null
      skip_distance_cfg: 0
      active_g_cfg: false

  # ── Group A: Alt Trend+WaveletV3 RootBlock at 10-stack ──────────────────
  # Parent has only the 30-stack alt-T+W RB family (T+{Haar,Coif2,Db3,Sym10,Coif3}V3_30s_bdeq).
  # These are the matching 10-stack comparators (skip coif3 per drop list).
  - name: T+HaarV3_10s_bdeq
    category: alt_trend_wavelet_rb
    stacks:
      type: alternating
      blocks: [Trend, HaarWaveletV3]
      repeats: 5
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: haar
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+HaarWaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: haar
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: T+Coif2V3_10s_bdeq
    category: alt_trend_wavelet_rb
    stacks:
      type: alternating
      blocks: [Trend, Coif2WaveletV3]
      repeats: 5
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: coif2
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Coif2WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: coif2
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: T+Db3V3_10s_bdeq
    category: alt_trend_wavelet_rb
    stacks:
      type: alternating
      blocks: [Trend, DB3WaveletV3]
      repeats: 5
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: db3
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+DB3WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: db3
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: T+Sym10V3_10s_bdeq
    category: alt_trend_wavelet_rb
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: sym10
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  # ── Group B: Alt TrendAELG+WaveletAELG 10-stack haar/coif2 ──────────────
  # Completes the 4-wavelet × 2-depth alt_aelg grid: parent has
  # TALG+DB3V3ALG_10s_ag0 (db3) and the sym10 fill above; these add haar+coif2.
  - name: TAELG+HaarV3ALG_10s_ag0
    category: alt_aelg
    stacks:
      type: alternating
      blocks: [TrendAELG, HaarWaveletV3AELG]
      repeats: 5
    training:
      active_g: false
    block_params:
      latent_dim: 16
      wavelet_type: haar
    extra_fields:
      arch_family: alt_aelg
      block_type_primary: TrendAELG+HaarWaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: haar
      basis_dim_label: null
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: null
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: TAELG+Coif2V3ALG_10s_ag0
    category: alt_aelg
    stacks:
      type: alternating
      blocks: [TrendAELG, Coif2WaveletV3AELG]
      repeats: 5
    training:
      active_g: false
    block_params:
      latent_dim: 16
      wavelet_type: coif2
    extra_fields:
      arch_family: alt_aelg
      block_type_primary: TrendAELG+Coif2WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: coif2
      basis_dim_label: null
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: null
      skip_distance_cfg: 0
      active_g_cfg: false

  # ── Group C: TrendWaveletAELG at latent_dim=16 ──────────────────────────
  # Parent and the sym10 fills above test TWAELG only at ld=32. AELG's design
  # rationale is that the learned latent-gate makes lower latent dims viable;
  # TWGAELG (a related distinct block) is tested at ld=16 only — TWAELG should
  # be too. agf included because parent TWAELG_ld32_db3 ranks top-5 on Yearly
  # and Hourly (both periods where memory says agf helps).
  - name: TWAELG_10s_ld16_db3_ag0
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    training:
      active_g: false
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: db3
      latent_dim: 16
    extra_fields:
      arch_family: trendwavelet_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: db3
      basis_dim_label: eq_fcast
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: false

  - name: TWAELG_10s_ld16_db3_agf
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    training:
      active_g: forecast
    block_params:
      trend_thetas_dim: 3
      basis_dim: eq_fcast
      wavelet_type: db3
      latent_dim: 16
    extra_fields:
      arch_family: trendwavelet_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: db3
      basis_dim_label: eq_fcast
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: 3
      skip_distance_cfg: 0
      active_g_cfg: forecast
