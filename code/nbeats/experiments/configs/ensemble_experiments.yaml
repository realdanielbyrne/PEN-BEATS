# ensemble_experiments.yaml
# Architecture-diversity ensemble experiments for N-BEATS Lightning
# 5 ensemble proposals tested with 6 forecast multipliers [2,3,4,5,6,7]
# 2D factorial: horizon_only / arch_only / combined
# Mirrors: experiments/run_ensemble_experiments.py
#
# NOTE: This YAML drives individual member training + prediction saving.
# The ensemble aggregation (median/mean across members × multipliers) is
# performed by run_ensemble_experiments.py using saved NPZ predictions.
# Use this YAML to (re)train members and save predictions; then run the
# original script for ensemble aggregation and OWA scoring.
#
# All members trained at the 5H forecast multiplier (standard), predictions
# saved to experiments/results/m4/predictions/ for reuse across multipliers.
# Multipliers [2,3,4,5,6,7] are tested at inference time.

experiment_name: ensemble_experiments
description: >
  Architecture-diversity ensemble study. 5 proposals testing whether diverse
  block architectures provide additive ensemble benefit over horizon diversity.
  Members: NBEATS-G, NBEATS-I, NBEATS-I+G (paper baselines) + GenericAE,
  Trend+Coif2WaveletV3, Coif2WaveletV3 (novel blocks). 3 runs each.
output_csv: ensemble_individual_results.csv

dataset: m4
periods:
  - Yearly

runs:
  n_runs: 3
  seeds: [42, 43, 44]

training:
  max_epochs: 100
  patience: 10
  learning_rate: 0.001
  loss: SMAPELoss
  n_blocks_per_stack: 1
  share_weights: true
  lr_scheduler: null

extra_csv_columns:
  - forecast_multiplier
  - ensemble_member

# Train all unique members across all 5 proposals
# Members in baseline pass (active_g=false):
#   NBEATS-G, NBEATS-I, NBEATS-I+G, GenericAE, Trend+Coif2WaveletV3
# Members in activeG_fcast pass (active_g=forecast):
#   Coif2WaveletV3

passes:
  - pass_name: baseline
    pass_params:
      active_g: false
    configs:
      # Paper-Horizon: single arch, all 6 multipliers → re-uses NBEATS-I+G baseline preds
      - name: NBEATS-I+G
        category: ensemble_member
        stacks: {builtin: NBEATS-I+G}
        extra_fields: {ensemble_member: NBEATS-I+G, forecast_multiplier: 5}

      # Paper-Diverse members (additional to NBEATS-I+G above)
      - name: NBEATS-G
        category: ensemble_member
        stacks: {builtin: NBEATS-G}
        extra_fields: {ensemble_member: NBEATS-G, forecast_multiplier: 5}

      - name: NBEATS-I
        category: ensemble_member
        stacks: {builtin: NBEATS-I}
        extra_fields: {ensemble_member: NBEATS-I, forecast_multiplier: 5}

      # Basis-Diverse / Efficient-Diverse / Full-Spectrum additional members
      - name: Trend+Coif2WaveletV3
        category: ensemble_member
        stacks: {builtin: Trend+Coif2WaveletV3}
        extra_fields: {ensemble_member: Trend+Coif2WaveletV3, forecast_multiplier: 5}

      - name: GenericAE
        category: ensemble_member
        stacks: {builtin: GenericAE}
        extra_fields: {ensemble_member: GenericAE, forecast_multiplier: 5}

  - pass_name: activeG_fcast
    pass_params:
      active_g: forecast
    configs:
      # Full-Spectrum: Coif2WaveletV3 with active_g=forecast
      - name: Coif2WaveletV3
        category: ensemble_member
        stacks: {builtin: Coif2WaveletV3}
        extra_fields: {ensemble_member: Coif2WaveletV3_activeG, forecast_multiplier: 5}

# ---------------------------------------------------------------------------
# Ensemble Proposals Reference (for documentation — aggregation runs separately)
# ---------------------------------------------------------------------------
# Paper-Horizon:
#   members: [(NBEATS-I+G, baseline)]
#   multipliers: [2, 3, 4, 5, 6, 7]
#   description: Paper replication — single arch, multi-horizon diversity
#
# Paper-Diverse:
#   members: [(NBEATS-G, baseline), (NBEATS-I, baseline), (NBEATS-I+G, baseline)]
#   multipliers: [2, 3, 4, 5, 6, 7]
#   description: Paper baselines with architecture diversity
#
# Basis-Diverse:
#   members: [(NBEATS-G, baseline), (NBEATS-I, baseline),
#             (Trend+Coif2WaveletV3, baseline), (GenericAE, baseline)]
#   multipliers: [2, 3, 4, 5, 6, 7]
#   description: Maximum basis-function diversity
#
# Efficient-Diverse:
#   members: [(NBEATS-I, baseline), (GenericAE, baseline),
#             (Trend+Coif2WaveletV3, baseline)]
#   multipliers: [2, 3, 4, 5, 6, 7]
#   description: Parameter-efficient diverse ensemble
#
# Full-Spectrum:
#   members: [(NBEATS-G, baseline), (NBEATS-I, baseline),
#             (Trend+Coif2WaveletV3, baseline),
#             (Coif2WaveletV3, activeG_fcast), (GenericAE, baseline)]
#   multipliers: [2, 3, 4, 5, 6, 7]
#   description: Cross-pass + architecture + backbone diversity
