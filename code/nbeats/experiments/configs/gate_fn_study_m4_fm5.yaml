# ============================================================
# Latent Gate Function Study — M4-Yearly (forecast_multiplier=5)
#
# Identical to gate_fn_study_m4.yaml but uses a lookback
# horizon multiplier of 5 instead of 7.  Results are written
# to the same gate_fn_study_results.csv file so the two
# multiplier conditions can be compared side-by-side.
#
# Tests sigmoid vs wavy_sigmoid vs wavelet_sigmoid across
# 4 AELG architectures at 20-21 stacks with ResNet skip
# connections (skip_distance=5, skip_alpha=0.1).
#
# Non-LG controls included for each architecture family.
#
# 16 configs × 5 runs = 80 runs
#
# Supports multi-worker execution via claim system:
#   python experiments/run_from_yaml.py experiments/configs/gate_fn_study_m4_fm5.yaml --gpu-id 0 --worker-id w0a
#   python experiments/run_from_yaml.py experiments/configs/gate_fn_study_m4_fm5.yaml --gpu-id 0 --worker-id w0b
#   python experiments/run_from_yaml.py experiments/configs/gate_fn_study_m4_fm5.yaml --gpu-id 1 --worker-id w1a
#   python experiments/run_from_yaml.py experiments/configs/gate_fn_study_m4_fm5.yaml --gpu-id 1 --worker-id w1b
# ============================================================

experiment_name: gate_fn_study_fm5
description: >
  Latent gate function ablation: sigmoid vs wavy_sigmoid vs wavelet_sigmoid
  across 4 AELG architectures with non-LG controls. 20-21 stacks,
  skip_distance=5, skip_alpha=0.1, forecast_multiplier=5 on M4-Yearly.

dataset: m4
periods: [Yearly]
category: gate_fn_study

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 100
  patience: 25
  forecast_multiplier: 5
  n_blocks_per_stack: 1
  share_weights: true
  skip_distance: 5
  skip_alpha: 0.1

block_params:
  latent_dim: 16
  trend_thetas_dim: 3
  wavelet_type: coif3
  basis_dim: 128
  generic_dim: 5

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

runs:
  n_runs: 5
  base_seed: 42

output:
  csv_filename: gate_fn_study_results.csv

logging:
  wandb:
    enabled: true
    project: anon-forecasting-experiments
  tensorboard: false

extra_csv_columns:
  - gate_fn
  - architecture
  - block_type
  - backbone

configs:

  # ══════════════════════════════════════════════════════════════════
  # Section A: TrendWaveletAELG homogeneous × 20 (3 gate fns)
  # ══════════════════════════════════════════════════════════════════

  - name: TWALG20_sigmoid
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 20}
    block_params: {latent_gate_fn: sigmoid}
    extra_fields:
      gate_fn: sigmoid
      architecture: TrendWavelet_pure
      block_type: TrendWaveletAELG
      backbone: AELG

  - name: TWALG20_wavy
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 20}
    block_params: {latent_gate_fn: wavy_sigmoid}
    extra_fields:
      gate_fn: wavy_sigmoid
      architecture: TrendWavelet_pure
      block_type: TrendWaveletAELG
      backbone: AELG

  - name: TWALG20_wavelet
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 20}
    block_params: {latent_gate_fn: wavelet_sigmoid}
    extra_fields:
      gate_fn: wavelet_sigmoid
      architecture: TrendWavelet_pure
      block_type: TrendWaveletAELG
      backbone: AELG

  # ══════════════════════════════════════════════════════════════════
  # Section E: TrendWaveletAE control (non-LG)
  # ══════════════════════════════════════════════════════════════════

  - name: TWA20_control
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 20}
    extra_fields:
      gate_fn: none
      architecture: TrendWavelet_pure
      block_type: TrendWaveletAE
      backbone: AE

  # ══════════════════════════════════════════════════════════════════
  # Section B: TrendWaveletGenericAELG homogeneous × 20 (3 gate fns)
  # ══════════════════════════════════════════════════════════════════

  - name: TWGLG20_sigmoid
    stacks: {type: homogeneous, block: TrendWaveletGenericAELG, n: 20}
    block_params: {latent_gate_fn: sigmoid}
    extra_fields:
      gate_fn: sigmoid
      architecture: TrendWaveletGeneric_pure
      block_type: TrendWaveletGenericAELG
      backbone: AELG

  - name: TWGLG20_wavy
    stacks: {type: homogeneous, block: TrendWaveletGenericAELG, n: 20}
    block_params: {latent_gate_fn: wavy_sigmoid}
    extra_fields:
      gate_fn: wavy_sigmoid
      architecture: TrendWaveletGeneric_pure
      block_type: TrendWaveletGenericAELG
      backbone: AELG

  - name: TWGLG20_wavelet
    stacks: {type: homogeneous, block: TrendWaveletGenericAELG, n: 20}
    block_params: {latent_gate_fn: wavelet_sigmoid}
    extra_fields:
      gate_fn: wavelet_sigmoid
      architecture: TrendWaveletGeneric_pure
      block_type: TrendWaveletGenericAELG
      backbone: AELG

  # ══════════════════════════════════════════════════════════════════
  # Section F: TrendWaveletGenericAE control (non-LG)
  # ══════════════════════════════════════════════════════════════════

  - name: TWGA20_control
    stacks: {type: homogeneous, block: TrendWaveletGenericAE, n: 20}
    extra_fields:
      gate_fn: none
      architecture: TrendWaveletGeneric_pure
      block_type: TrendWaveletGenericAE
      backbone: AE

  # ══════════════════════════════════════════════════════════════════
  # Section C: TrendAELG + WaveletV3AELG alternating × 10 = 20 stacks
  # ══════════════════════════════════════════════════════════════════

  - name: TALG_WV3LG20_sigmoid
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 10}
    block_params: {latent_gate_fn: sigmoid}
    extra_fields:
      gate_fn: sigmoid
      architecture: Trend_Wavelet_alt
      block_type: TrendAELG+WaveletV3AELG
      backbone: AELG

  - name: TALG_WV3LG20_wavy
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 10}
    block_params: {latent_gate_fn: wavy_sigmoid}
    extra_fields:
      gate_fn: wavy_sigmoid
      architecture: Trend_Wavelet_alt
      block_type: TrendAELG+WaveletV3AELG
      backbone: AELG

  - name: TALG_WV3LG20_wavelet
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 10}
    block_params: {latent_gate_fn: wavelet_sigmoid}
    extra_fields:
      gate_fn: wavelet_sigmoid
      architecture: Trend_Wavelet_alt
      block_type: TrendAELG+WaveletV3AELG
      backbone: AELG

  # ══════════════════════════════════════════════════════════════════
  # Section G: TrendAE + WaveletV3AE alternating control (non-LG)
  # ══════════════════════════════════════════════════════════════════

  - name: TA_WV3A20_control
    stacks: {type: alternating, blocks: [TrendAE, WaveletV3AE], repeats: 10}
    extra_fields:
      gate_fn: none
      architecture: Trend_Wavelet_alt
      block_type: TrendAE+WaveletV3AE
      backbone: AE

  # ══════════════════════════════════════════════════════════════════
  # Section D: TrendAELG + WaveletV3AELG + GenericAELG alt × 7 = 21
  # ══════════════════════════════════════════════════════════════════

  - name: TALG_WV3LG_GALG21_sigmoid
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG, GenericAELG], repeats: 7}
    block_params: {latent_gate_fn: sigmoid}
    extra_fields:
      gate_fn: sigmoid
      architecture: Trend_Wavelet_Generic_alt
      block_type: TrendAELG+WaveletV3AELG+GenericAELG
      backbone: AELG

  - name: TALG_WV3LG_GALG21_wavy
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG, GenericAELG], repeats: 7}
    block_params: {latent_gate_fn: wavy_sigmoid}
    extra_fields:
      gate_fn: wavy_sigmoid
      architecture: Trend_Wavelet_Generic_alt
      block_type: TrendAELG+WaveletV3AELG+GenericAELG
      backbone: AELG

  - name: TALG_WV3LG_GALG21_wavelet
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG, GenericAELG], repeats: 7}
    block_params: {latent_gate_fn: wavelet_sigmoid}
    extra_fields:
      gate_fn: wavelet_sigmoid
      architecture: Trend_Wavelet_Generic_alt
      block_type: TrendAELG+WaveletV3AELG+GenericAELG
      backbone: AELG

  # ══════════════════════════════════════════════════════════════════
  # Section H: TrendAE + WaveletV3AE + GenericAE alt control (non-LG)
  # ══════════════════════════════════════════════════════════════════

  - name: TA_WV3A_GA21_control
    stacks: {type: alternating, blocks: [TrendAE, WaveletV3AE, GenericAE], repeats: 7}
    extra_fields:
      gate_fn: none
      architecture: Trend_Wavelet_Generic_alt
      block_type: TrendAE+WaveletV3AE+GenericAE
      backbone: AE
