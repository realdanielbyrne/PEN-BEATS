# Single-pass (no two-pass design — active_g is per-config above)
# experiment_name used as pass name
# passes key is absent → single pass

# Runs per config per round
runs:
  n_runs: 3     # overridden per round by the search schedule below
  base_seed: 42

# Successive halving search
search:
  enabled: true
  rounds:
    - max_epochs: 8
      n_runs: 3
      keep_fraction: 0.50
    - max_epochs: 15
      n_runs: 3
      keep_fraction: 0.50
    - max_epochs: 50
      n_runs: 3
      top_k: 5

output:
  results_dir: experiments/results
  csv_filename: genericae_pure_stack_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
