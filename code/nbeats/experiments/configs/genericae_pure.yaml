# ============================================================
# GenericAE Pure-Stack Study — Successive Halving Search
# Mirrors the core search logic of run_generic_ae_study.py
#
# Searches latent_dim and active_g for pure GenericAE and
# BottleneckGenericAE stacks (10 stacks, M4-Yearly).
#
# Usage:
#   # Full pipeline (all 3 rounds)
#   python experiments/run_from_yaml.py experiments/configs/genericae_pure.yaml
#
#   # Smoke test — 2 epochs per round
#   python experiments/run_from_yaml.py experiments/configs/genericae_pure.yaml \
#       --max-epochs 2
#
#   # Run on Tourism
#   python experiments/run_from_yaml.py experiments/configs/genericae_pure.yaml \
#       --dataset tourism --periods Tourism-Yearly
#
#   # Analyze existing results
#   python experiments/run_from_yaml.py experiments/configs/genericae_pure.yaml \
#       --analyze-only
# ============================================================

experiment_name: genericae_pure_stack
category: ae_pure_search
description: >
  GenericAE and BottleneckGenericAE pure-stack successive halving study.
  Searches latent_dim in [2, 4, 8, 16] and active_g in [false, forecast]
  for both block types. Uses 3 successive halving rounds, eliminating 50%
  of configs per round.

dataset: m4
periods:
  - Yearly

# Global defaults (overridden per config below)
training:
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  basis_dim: 128

# LR scheduler — cosine annealing after warmup (matches run_generic_ae_study.py)
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001
  # T_max: null  → auto = max_epochs - warmup_epochs

# Extra CSV columns matching run_generic_ae_study.py STUDY_CSV_COLUMNS
extra_csv_columns:
  - search_round
  - block_type
  - latent_dim_cfg
  - thetas_dim_cfg

# --- Multi-config search grid ---
# 40 total configs: GenericAE (4 ld × 2 ag = 8) + BottleneckGenericAE (4 ld × 4 td × 2 ag = 32)
configs:
  # ── GenericAE: latent_dim × active_g ──────────────────────────────────
  - name: GenericAE_ld2_td5_ag0
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 2, thetas_dim: 5}
    training: {active_g: false}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 2, thetas_dim_cfg: 5}

  - name: GenericAE_ld2_td5_agF
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 2, thetas_dim: 5}
    training: {active_g: forecast}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 2, thetas_dim_cfg: 5}

  - name: GenericAE_ld4_td5_ag0
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 4, thetas_dim: 5}
    training: {active_g: false}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 4, thetas_dim_cfg: 5}

  - name: GenericAE_ld4_td5_agF
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 4, thetas_dim: 5}
    training: {active_g: forecast}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 4, thetas_dim_cfg: 5}

  - name: GenericAE_ld8_td5_ag0
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 8, thetas_dim: 5}
    training: {active_g: false}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 8, thetas_dim_cfg: 5}

  - name: GenericAE_ld8_td5_agF
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 8, thetas_dim: 5}
    training: {active_g: forecast}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 8, thetas_dim_cfg: 5}

  - name: GenericAE_ld16_td5_ag0
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 16, thetas_dim: 5}
    training: {active_g: false}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 16, thetas_dim_cfg: 5}

  - name: GenericAE_ld16_td5_agF
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 16, thetas_dim: 5}
    training: {active_g: forecast}
    extra_fields: {block_type: GenericAE, latent_dim_cfg: 16, thetas_dim_cfg: 5}

  # ── BottleneckGenericAE: latent_dim × thetas_dim × active_g ───────────
  - name: BottleneckGenericAE_ld2_td3_ag0
    stacks: {type: homogeneous, block: BottleneckGenericAE, n: 10}
    block_params: {latent_dim: 2, thetas_dim: 3}
    training: {active_g: false}
    extra_fields: {block_type: BottleneckGenericAE, latent_dim_cfg: 2, thetas_dim_cfg: 3}

