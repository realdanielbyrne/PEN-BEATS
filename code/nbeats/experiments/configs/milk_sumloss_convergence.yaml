# ============================================================
# Milk Production sum_losses Convergence Study — 2×2 Factorial
# Mirrors run_milk_sumloss_convergence.py
#
# 2×2 factorial design: active_g × sum_losses.
# Measures whether sum_losses regularisation improves convergence
# stability and final forecast accuracy on the Milk production dataset.
# 100 independent random-seed runs per configuration (400 total).
#
# Experimental conditions:
#   - MilkSL_baseline:     active_g=False, sum_losses=False  (control)
#   - MilkSL_activeG:      active_g=True,  sum_losses=False  (active_g effect)
#   - MilkSL_sumLosses:    active_g=False, sum_losses=True   (sum_losses effect)
#   - MilkSL_activeG+sumL: active_g=True,  sum_losses=True   (interaction)
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/milk_sumloss_convergence.yaml
# ============================================================

experiment_name: milk_sumloss_convergence
category: convergence_study
description: >
  2x2 factorial active_g × sum_losses convergence study on Milk production
  dataset (6-stack Generic). When sum_losses=True, training loss adds 0.25×
  backcast reconstruction term. 100 runs per config with random seeds.

dataset: milk
periods: [Milk]

training:
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 500
  patience: 20
  n_blocks_per_stack: 1
  share_weights: true
  batch_size: 64

block_params:
  thetas_dim: 5
  latent_dim: 4

lr_scheduler: null

extra_csv_columns:
  - sum_losses

configs:
  - name: MilkSL_baseline
    category: convergence_baseline
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: false
      sum_losses: false
    extra_fields: {sum_losses: false}

  - name: MilkSL_activeG
    category: convergence_activeg
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: true
      sum_losses: false
    extra_fields: {sum_losses: false}

  - name: MilkSL_sumLosses
    category: convergence_sumloss
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: false
      sum_losses: true
    extra_fields: {sum_losses: true}

  - name: MilkSL_activeG+sumL
    category: convergence_interaction
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: true
      sum_losses: true
    extra_fields: {sum_losses: true}

runs:
  n_runs: 100
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: milk_sumloss_convergence_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: false
