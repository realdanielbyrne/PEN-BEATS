# ============================================================
# Milk Production Unbalanced active_g Convergence Study
# Mirrors run_milk_unbalanced_activeg.py + run_milk_convergence.py
#
# Extends the balanced active_g study with forecast-only and backcast-only
# conditions. All four conditions share the same result CSV so this YAML
# includes all 4 configs (baseline and activeG from run_milk_convergence.py
# are included for completeness; skip already-run rows via resumability).
#
# Experimental conditions:
#   - Milk6_baseline:         active_g=False      (balanced control)
#   - Milk6_activeG:          active_g=True       (balanced both-path)
#   - Milk6_activeG_forecast: active_g="forecast" (forecast path only)
#   - Milk6_activeG_backcast: active_g="backcast" (backcast path only)
#
# Each condition: 100 runs with random seeds. Results appended to shared CSV.
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/milk_unbalanced_activeg.yaml
# ============================================================

experiment_name: milk_unbalanced_activeg
category: convergence_study
description: >
  All four active_g conditions for the Milk 6-stack convergence study:
  False (baseline), True (balanced), "forecast" (unbalanced), "backcast" (unbalanced).
  100 random-seed runs per config. Skip with resumability if baseline/activeG
  already completed via milk_convergence.yaml.

dataset: milk
periods: [Milk]

training:
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 500
  patience: 20
  n_blocks_per_stack: 1
  share_weights: true
  batch_size: 64
  sum_losses: false

block_params:
  thetas_dim: 5
  latent_dim: 4

lr_scheduler: null

configs:
  # -- Conditions from run_milk_convergence.py (skip if already run) --
  - name: Milk6_baseline
    category: convergence_baseline
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: false

  - name: Milk6_activeG
    category: convergence_activeg
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: true

  # -- New unbalanced conditions from run_milk_unbalanced_activeg.py --
  - name: Milk6_activeG_forecastOnly
    category: convergence_activeg_unbalanced
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: forecast

  - name: Milk6_activeG_backcastOnly
    category: convergence_activeg_unbalanced
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: backcast

runs:
  n_runs: 100
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: milk_convergence_results.csv   # shared with milk_convergence.yaml
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: false
