# ============================================================
# Mixed-Block-Type Stack Successive Halving Experiment
#
# Tests whether heterogeneous stacks mixing 2-5 blocks from
# different backbone families (AE, AELG, VAE2) can outperform
# simpler homogeneous or alternating architectures.
#
# latent_dim is global per model instance, so it is varied
# across config groups: ld=4 (MX01-MX08), ld=8 (MX09-MX16),
# ld=12 (MX17-MX24).
#
# Usage:
#   # Dry-run to validate parsing and block name resolution
#   python experiments/run_from_yaml.py experiments/configs/mixed_block_halving.yaml --dry-run
#
#   # Quick smoke test (2 epochs, overrides all rounds)
#   python experiments/run_from_yaml.py experiments/configs/mixed_block_halving.yaml \
#       --max-epochs 2
#
#   # Full run
#   python experiments/run_from_yaml.py experiments/configs/mixed_block_halving.yaml
#
#   # Post-hoc analysis
#   python experiments/run_from_yaml.py experiments/configs/mixed_block_halving.yaml \
#       --analyze-only
# ============================================================

experiment_name: mixed_block_halving
category: mixed_block_search
description: >
  Mixed-block-type stack successive halving study. Tests 24 heterogeneous
  stack compositions mixing 2-5 blocks from AE, AELG, and VAE2 backbone
  families. Latent dim varies across groups (4, 8, 12). Three rounds of
  successive halving: 24 -> 17 -> 10 -> 3.

dataset: m4
periods:
  - Yearly

training:
  active_g: false
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  activation: ReLU

block_params:
  trend_thetas_dim: 3
  thetas_dim: 5
  basis_dim: 128

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

extra_csv_columns:
  - search_round
  - latent_dim_cfg
  - n_stacks
  - anchor_block
  - companion_families
  - stack_pattern
  - backbone_mix

# --- 24 mixed-block configs ---
configs:

  # ------------------------------------------------------------
  # GROUP A: latent_dim = 4 (MX01-MX08)
  # ------------------------------------------------------------

  - name: MX01_ld4
    stacks:
      - TrendAE
      - GenericAE
      - SeasonalityAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 3
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+Generic+Seasonality
      backbone_mix: pure_AE

  - name: MX02_ld4
    stacks:
      - TrendAE
      - HaarWaveletV3AE
      - GenericAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 3
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+HaarWav+Generic
      backbone_mix: pure_AE

  - name: MX03_ld4
    stacks:
      - TrendAE
      - DB3WaveletV3AE
      - TrendAE
      - Coif1WaveletV3AE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 4
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+DB3Wav+Trend+Coif1Wav
      backbone_mix: pure_AE

  - name: MX04_ld4
    stacks:
      - TrendAE
      - GenericVAE2
      - SeasonalityAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 3
      anchor_block: TrendAE
      companion_families: AE+VAE2
      stack_pattern: Trend+GenericVAE2+Seasonality
      backbone_mix: mixed_AE_VAE2

  - name: MX05_ld4
    stacks:
      - TrendAE
      - HaarWaveletV3AE
      - DB4WaveletV3AE
      - GenericAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 4
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+HaarWav+DB4Wav+Generic
      backbone_mix: pure_AE

  - name: MX06_ld4
    stacks:
      - TrendAE
      - BottleneckGenericAE
      - BottleneckGenericAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 3
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+BnkGeneric+BnkGeneric
      backbone_mix: pure_AE

  - name: MX07_ld4
    stacks:
      - TrendAE
      - AutoEncoderAE
      - SeasonalityAE
      - GenericAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 4
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+AutoEnc+Seasonality+Generic
      backbone_mix: pure_AE

  - name: MX08_ld4
    stacks:
      - TrendWaveletAE
      - GenericAE
      - SeasonalityAE
    block_params: {latent_dim: 4}
    extra_fields:
      latent_dim_cfg: 4
      n_stacks: 3
      anchor_block: TrendWaveletAE
      companion_families: AE
      stack_pattern: TrendWav+Generic+Seasonality
      backbone_mix: pure_AE

  # ------------------------------------------------------------
  # GROUP B: latent_dim = 8 (MX09-MX16)
  # ------------------------------------------------------------

  - name: MX09_ld8
    stacks:
      - TrendAELG
      - GenericAELG
      - SeasonalityAELG
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 3
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+Generic+Seasonality
      backbone_mix: pure_AELG

  - name: MX10_ld8
    stacks:
      - TrendAELG
      - HaarWaveletV3AELG
      - TrendAELG
      - Coif1WaveletV3AELG
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 4
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+HaarWav+Trend+Coif1Wav
      backbone_mix: pure_AELG

  - name: MX11_ld8
    stacks:
      - TrendAE
      - GenericAELG
      - DB3WaveletV3VAE2
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 3
      anchor_block: TrendAE
      companion_families: AE+AELG+VAE2
      stack_pattern: Trend+GenericLG+DB3WavVAE2
      backbone_mix: mixed_AE_AELG_VAE2

  - name: MX12_ld8
    stacks:
      - TrendAELG
      - HaarWaveletV3AELG
      - SeasonalityAELG
      - GenericAELG
      - BottleneckGenericAELG
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 5
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+HaarWav+Season+Generic+BnkGeneric
      backbone_mix: pure_AELG

  - name: MX13_ld8
    stacks:
      - TrendAE
      - Symlet3WaveletV3AE
      - DB2WaveletV3AE
      - Coif2WaveletV3AE
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 4
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+Sym3Wav+DB2Wav+Coif2Wav
      backbone_mix: pure_AE

  - name: MX14_ld8
    stacks:
      - TrendVAE2
      - SeasonalityVAE2
      - GenericAE
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 3
      anchor_block: TrendVAE2
      companion_families: VAE2+AE
      stack_pattern: TrendVAE2+SeasonVAE2+Generic
      backbone_mix: mixed_VAE2_AE

  - name: MX15_ld8
    stacks:
      - TrendWaveletAELG
      - GenericAELG
      - TrendWaveletAELG
      - SeasonalityAELG
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 4
      anchor_block: TrendWaveletAELG
      companion_families: AELG
      stack_pattern: TrendWav+Generic+TrendWav+Seasonality
      backbone_mix: pure_AELG

  - name: MX16_ld8
    stacks:
      - TrendAELG
      - GenericAEBackcastAELG
      - GenericAELG
    block_params: {latent_dim: 8}
    extra_fields:
      latent_dim_cfg: 8
      n_stacks: 3
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+GenericBkcast+Generic
      backbone_mix: pure_AELG

  # ------------------------------------------------------------
  # GROUP C: latent_dim = 12 (MX17-MX24)
  # ------------------------------------------------------------

  - name: MX17_ld12
    stacks:
      - TrendAELG
      - SeasonalityAELG
      - HaarWaveletV3AELG
      - GenericAELG
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 4
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+Season+HaarWav+Generic
      backbone_mix: pure_AELG

  - name: MX18_ld12
    stacks:
      - TrendAE
      - HaarWaveletV3VAE2
      - Coif1WaveletV3VAE2
      - GenericAE
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 4
      anchor_block: TrendAE
      companion_families: AE+VAE2
      stack_pattern: Trend+HaarWavVAE2+Coif1WavVAE2+Generic
      backbone_mix: mixed_AE_VAE2

  - name: MX19_ld12
    stacks:
      - TrendVAE2
      - GenericVAE2
      - SeasonalityVAE2
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 3
      anchor_block: TrendVAE2
      companion_families: VAE2
      stack_pattern: Trend+Generic+Seasonality
      backbone_mix: pure_VAE2

  - name: MX20_ld12
    stacks:
      - TrendAELG
      - DB4WaveletV3AELG
      - SeasonalityAELG
      - TrendAELG
      - Symlet3WaveletV3AELG
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 5
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+DB4Wav+Season+Trend+Sym3Wav
      backbone_mix: pure_AELG

  - name: MX21_ld12
    stacks:
      - TrendAE
      - BottleneckGenericAE
      - Coif2WaveletV3AE
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 3
      anchor_block: TrendAE
      companion_families: AE
      stack_pattern: Trend+BnkGeneric+Coif2Wav
      backbone_mix: pure_AE

  - name: MX22_ld12
    stacks:
      - TrendAELG
      - GenericVAE2
      - HaarWaveletV3AE
      - AutoEncoderAELG
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 4
      anchor_block: TrendAELG
      companion_families: AELG+VAE2+AE
      stack_pattern: TrendLG+GenericVAE2+HaarWav+AutoEncLG
      backbone_mix: mixed_AELG_VAE2_AE

  - name: MX23_ld12
    stacks:
      - TrendWaveletAELG
      - GenericVAE2
      - BottleneckGenericAELG
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 3
      anchor_block: TrendWaveletAELG
      companion_families: AELG+VAE2
      stack_pattern: TrendWavLG+GenericVAE2+BnkGenericLG
      backbone_mix: mixed_AELG_VAE2

  - name: MX24_ld12
    stacks:
      - TrendAELG
      - SeasonalityAELG
      - Symlet3WaveletV3AELG
      - GenericAELG
    block_params: {latent_dim: 12}
    extra_fields:
      latent_dim_cfg: 12
      n_stacks: 4
      anchor_block: TrendAELG
      companion_families: AELG
      stack_pattern: Trend+Season+Sym3Wav+Generic
      backbone_mix: pure_AELG

# Single-pass (no two-pass design)
# experiment_name used as pass name

runs:
  n_runs: 1
  base_seed: 42

# Successive halving: 24 -> 17 -> 10 -> 3
search:
  enabled: true
  rounds:
    - max_epochs: 10
      n_runs: 1
      top_k: 17
    - max_epochs: 25
      n_runs: 1
      top_k: 10
    - max_epochs: 50
      n_runs: 1
      top_k: 3

output:
  results_dir: experiments/results
  csv_filename: mixed_block_halving_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
