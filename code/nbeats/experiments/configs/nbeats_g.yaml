# ============================================================
# N-BEATS-G — Paper baseline, 30-stack homogeneous Generic
# Replicates the "NBEATS-G" entry in run_unified_benchmark.py
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/nbeats_g.yaml
#   python experiments/run_from_yaml.py experiments/configs/nbeats_g.yaml \
#       --dataset m4 --periods Yearly --n-runs 3
# ============================================================

experiment_name: NBEATS-G
description: >
  N-BEATS Generic (paper baseline). 30 homogeneous Generic stacks,
  share_weights=True. Two-pass design: baseline (active_g=false) and
  activeG_fcast (active_g=forecast) to replicate the unified benchmark.

# Dataset — run on all six M4 periods by default
dataset: m4
# periods: [Yearly, Quarterly, Monthly, Weekly, Daily, Hourly]  # default: all

# Architecture
stacks:
  type: homogeneous
  block: Generic
  n: 30

# Per-block architecture parameters
block_params:
  thetas_dim: 5
  latent_dim: 4
  basis_dim: 128

# Training hyperparameters (shared across passes unless overridden)
training:
  sum_losses: false
  activation: ReLU
  max_epochs: 100
  patience: 10
  # batch_size: null  # auto-resolved per dataset/period
  # forecast_multiplier: null  # auto-resolved per dataset (M4 → 5)

# Two-pass design: matches run_unified_benchmark.py passes
passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

# Experiment runs
runs:
  n_runs: 10
  base_seed: 42

# Output
output:
  results_dir: experiments/results
  csv_filename: nbeats_g_results.csv
  save_predictions: true
  predictions_subdir: predictions

# Logging
logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
    group: null
  tensorboard: false

# Hardware
hardware:
  accelerator: auto
  num_workers: 0
  gpu_id: null

# Post-experiment analysis
analysis:
  enabled: true
  ranking: true
