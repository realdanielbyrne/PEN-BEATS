# ============================================================
# N-BEATS-I+G — Paper baseline, Interpretable + Generic stack
# Replicates "NBEATS-I+G" in run_unified_benchmark.py
#
# Architecture: [Trend, Seasonality] + [Generic] * 28  (30 stacks total)
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/nbeats_ig.yaml
#   python experiments/run_from_yaml.py experiments/configs/nbeats_ig.yaml \
#       --dataset m4 --periods Yearly Monthly
# ============================================================

experiment_name: NBEATS-I+G
description: >
  N-BEATS Interpretable + Generic (paper baseline). One Trend stack,
  one Seasonality stack, then 28 Generic stacks. Two-pass design.

dataset: m4

# Architecture: prefix_body — Trend + Seasonality prefix, Generic body
stacks:
  type: prefix_body
  prefix:
    - Trend
    - Seasonality
  body: Generic
  total: 30

block_params:
  thetas_dim: 5
  latent_dim: 4
  basis_dim: 128
  trend_thetas_dim: 3    # cubic polynomial for Trend block (paper-faithful)

training:
  sum_losses: false
  activation: ReLU
  max_epochs: 200
  patience: 20

passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

runs:
  n_runs: 10
  base_seed: 42

output:
  results_dir: experiments/results
  csv_filename: nbeats_ig_results.csv
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
