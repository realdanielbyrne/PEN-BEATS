# ============================================================
# NHiTS-Protocol Benchmark — Weather Dataset
#
# Aligns evaluation with the NHiTS paper protocol:
#   - Global per-column z-score normalization using training-split stats
#     (neuralforecast's scaler_type='standard' — the NHiTS paper's default).
#     RevIN / per-window normalization is NOT part of the NHiTS protocol.
#   - 70/10/20 train/val/test split
#   - All 21 columns including OT target

# Usage (standalone runner):
#   python experiments/run_nhits_benchmark.py --yaml experiments/configs/nhits_benchmark_weather.yaml --worker-id w1
#
# Top-level flags:
#   skip_horizon_overrides (bool, default false) — when true, the
#   NHITS_HORIZON_OVERRIDES grid-search winners in run_nhits_benchmark.py are
#   ignored and the per-config n_pools_kernel_size / n_freq_downsample values
#   (or NHiTSNet defaults) are used as-is.
# ============================================================

experiment_name: NHiTS-Protocol-Weather
description: >
  Benchmark of novel block types against NHiTS published
  baselines on Weather dataset, using the NHiTS evaluation protocol.
  Tests NHiTSNet (3-stack) architectures.

output_csv: experiments/results/nhits/weather_sampling_window_results_s1024.csv

dataset: weather
horizons: [96, 192, 336, 720]

# NHiTS evaluation protocol
protocol:
  normalize: true
  # 'global' = per-column z-score using training-split stats (the NHiTS
  # paper's 'standard' scaler). Set to 'window' only for RevIN-style
  # experiments; note that per-window normalization rescales y by the
  # input window's stats and tends to destabilize MSE for trending data
  # like Weather at long horizons.
  normalization_style: global
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true     # 21 columns (with OT)
  loss: MSELoss
  forecast_multiplier: 5
  batch_size: 256

  # ── Paper-faithful batch sampling ───────────────────────────────────
  # NHiTS (Challu et al. 2023) trains by sampling (series, start_idx)
  # uniformly at random per gradient step, not by iterating the dense
  # sliding-window dataset. Under 'nhits_paper', one "epoch" = steps_per_epoch
  # gradient updates; batches are drawn with replacement.
  sampling_style: nhits_paper    # sliding (default) | nhits_paper | nbeats_paper
  steps_per_epoch: 1000          # required under 'nhits_paper'; paper default
  # 'uniform'   = draw uniformly over all valid (series, start) windows
  #               — matches the NHiTS paper protocol. For Weather (21
  #               equal-length columns) it's also equivalent to 'by_series'.
  # 'by_series' = weight each window by 1 / n_windows_in_its_column so
  #               every series has equal per-step probability. Mainly
  #               useful when column lengths differ.
  sampling_weights: uniform

runs:
  n_runs: 7
  base_seed: 1

training:
  # Under protocol.sampling_style='nhits_paper', one "epoch" = steps_per_epoch
  # gradient updates. max_steps is the total gradient-step budget and
  # takes precedence over max_epochs. Setting max_steps is REQUIRED when
  # sampling_style='nhits_paper' (unless protocol.acknowledge_epoch_semantics
  # is set to true).
  max_steps: 25600         # 25 epochs × 1024 steps/epoch (paper-scale)
  max_epochs: 25           # Upper cap only; max_steps stops training first
  early_stopping: false    # Paper setting (disabled)
  #val_check_interval: 512  # Validate every 512 steps
  activation: ReLU
  active_g: false
  sum_losses: false
  num_workers: 2
  learning_rate: 0.001     
  
  # NHiTS paper uses a 3-step StepLR decay (gamma=0.5). With max_epochs=30
  # and step_size=8 the LR steps at epochs 8 / 16 / 24 for 3 total decays.
  lr_scheduler:
    type: step
    step_size: 8
    gamma: 0.5

block_params:
  thetas_dim: 5
  latent_dim: 16           # Research-confirmed optimal (ld=16 >> ld=4/8)
  basis_dim: eq_fcast      # Dynamic: set to forecast_length per horizon


# NHiTS published baselines for comparison (Table 1)
baselines:
  NHiTS:
    Weather-96:  {mse: 0.158, mae: 0.209}
    Weather-192: {mse: 0.211, mae: 0.253}
    Weather-336: {mse: 0.272, mae: 0.296}
    Weather-720: {mse: 0.348, mae: 0.349}


# Selection rationale:
#   Reference baselines: NHiTS-Generic (NHiTS-G)
# Per-horizon n_pools_kernel_size and n_freq_downsample are supplied by
# NHITS_HORIZON_OVERRIDES in run_nhits_benchmark.py (grid-search winners).
# Configs below differ only in stack_types (and active_g where noted).
configs:
  # --- Reference baselines (vanilla blocks, same pipeline) ---
  # NHiTSGenericRoot uses a 2-layer MLP tower matching the NHiTS paper
  # (neuralforecast mlp_units=[[512,512]]), not the 4-layer N-BEATS tower.
  - name: NHiTS-Generic
    model: NHiTSNet
    stack_types: ['NHiTSGenericRoot', 'NHiTSGenericRoot', 'NHiTSGenericRoot']

  # --- NHiTSNet (3-stack with hierarchical pooling, 3 configs) ---
  - name: NHiTS-TrendWaveletAELG
    model: NHiTSNet
    stack_types: ['TrendWaveletAELG', 'TrendWaveletAELG', 'TrendWaveletAELG']

  - name: NHiTS-TrendWaveletAE
    model: NHiTSNet
    stack_types: ['TrendWaveletAE', 'TrendWaveletAE', 'TrendWaveletAE']

  - name: NHiTS-GenericAELG
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']

  - name: NHiTS-GenericAE
    model: NHiTSNet
    stack_types: ['GenericAE', 'GenericAE', 'GenericAE']

  - name: NHiTS-GenericVAE
    model: NHiTSNet
    stack_types: ['GenericVAE', 'GenericVAE', 'GenericVAE']

  # --- New: Alternating TrendAE + WaveletAE + TrendAE(3 wavelet families) (3-stack with hierarchical pooling) ---
  - name: NHiTS-TrendAELG+Coif2V3AELG+GenericAELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'Coif2WaveletV3AELG', 'GenericAELG']

  - name: NHiTS-Coif2WaveletV3AELG+TrendAELG+GenericAELG
    model: NHiTSNet
    stack_types: ['Coif2WaveletV3AELG', 'TrendAELG', 'GenericAELG']

  - name: NHiTS-TrendAE+GenericAE+Coif2WaveletV3AE
    model: NHiTSNet
    stack_types: ['TrendAE', 'GenericAE', 'Coif2WaveletV3AE']

  - name: NHiTS-TrendAE+Coif2WaveletV3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'GenericAE']

  - name: NHiTS-TrendAE+Coif2WaveletV3AE+Coif2WaveletV3AE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'Coif2WaveletV3AE']

  - name: NHiTS-TrendAE+DB3V3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'DB3WaveletV3AE', 'TrendAE']

  - name: NHiTS-TrendAE+Coif2V3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'TrendAE']

  - name: NHiTS-TrendAE+Symlet10WaveletV3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Symlet10WaveletV3AE', 'TrendAE']    

  - name: NHiTS-TrendAE+HaarV3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'HaarWaveletV3AE', 'TrendAE']

  - name: NHiTS-TrendAE+Coif2V3AE+HaarWaveletV3AE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'HaarWaveletV3AE']

  - name: NHiTS-TrendAE+HaarWaveletV3AE+Coif2V3AE
    model: NHiTSNet
    stack_types: ['TrendAE', 'HaarWaveletV3AE', 'Coif2WaveletV3AE']

  # --- New: Alternating TrendAE + WaveletAE + GenericAE (3 wavelet families) (3-stack with hierarchical pooling)  ---
  - name: NHiTS-TrendAE+DB3V3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'DB3WaveletV3AE', 'GenericAE']

  - name: NHiTS-TrendAE+HaarV3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'HaarWaveletV3AE', 'GenericAE']

  - name: NHiTS-TrendAE+Coif2V3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'GenericAE']

  # --- New: BottleneckGenericAELG (3-stack with hierarchical pooling)
  - name: NHiTS-BottleneckGenericAELG
    model: NHiTSNet
    stack_types: ['BottleneckGenericAELG', 'BottleneckGenericAELG', 'BottleneckGenericAELG']

  - name: NHiTS-BottleneckGenericAE
    model: NHiTSNet
    stack_types: ['BottleneckGenericAE', 'BottleneckGenericAE', 'BottleneckGenericAE']

  # active_g = forecast configs
  - name: NHiTS-Generic
    model: NHiTSNet
    stack_types: ['NHiTSGenericRoot', 'NHiTSGenericRoot', 'NHiTSGenericRoot']
    active_g: ['forecast', 'forecast', false]

  - name: NHiTS-BottleneckGenericAELG-agF
    model: NHiTSNet
    stack_types: ['BottleneckGenericAELG', 'BottleneckGenericAELG', 'BottleneckGenericAELG']
    active_g: ['forecast', 'forecast', false]

  - name: NHiTS-BottleneckGenericAE-agF
    model: NHiTSNet
    stack_types: ['BottleneckGenericAE', 'BottleneckGenericAE', 'BottleneckGenericAE']
    active_g: ['forecast', 'forecast', false]

  - name: NHiTS-GenericAELG-agF
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']
    active_g: ['forecast', 'forecast', false]

  - name: NHiTS-GenericAE-agF
    model: NHiTSNet
    stack_types: ['GenericAE', 'GenericAE', 'GenericAE']
    active_g: ['forecast', 'forecast', false]

  # --- NHiTSNet (3-stack with hierarchical pooling): TrendWaveletGeneric-family ---
  - name: NHiTS-TrendWaveletGeneric-agF
    model: NHiTSNet
    stack_types: ['TrendWaveletGeneric', 'TrendWaveletGeneric', 'TrendWaveletGeneric']
    active_g: ['forecast', 'forecast', false]

  - name: NHiTS-TrendWaveletGenericAELG-agF
    model: NHiTSNet
    stack_types: ['TrendWaveletGenericAELG', 'TrendWaveletGenericAELG', 'TrendWaveletGenericAELG']
    active_g: ['forecast', 'forecast', false]

  - name: NHiTS-TrendWaveletGenericVAE-agF
    model: NHiTSNet
    stack_types: ['TrendWaveletGenericVAE', 'TrendWaveletGenericVAE', 'TrendWaveletGenericVAE']
    active_g: ['forecast', 'forecast', false]
