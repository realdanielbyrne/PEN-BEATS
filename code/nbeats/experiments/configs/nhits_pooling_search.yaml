# ============================================================
# NHiTS Pooling Parameter Search
#
# Grid search over the paper's n_pools_kernel_size and
# n_freq_downsample candidates 
#
# Usage:
#   # Dry run — inspect the plan
#   python experiments/run_nhits_benchmark.py \
#       --yaml experiments/configs/nhits_pooling_search.yaml --dry-run
#
#   # Run the full search (all horizons, 2 runs each = 48 jobs)
#   python experiments/run_nhits_benchmark.py --yaml experiments/configs/nhits_pooling_search.yaml -
#
#   # Run a single horizon quickly
#   python experiments/run_nhits_benchmark.py \
#       --yaml experiments/configs/nhits_pooling_search.yaml \
#       --horizons 96 \
#       --csv-path experiments/results/nhits_pooling_search_sample.csv
#
#   # Analyze results
#   python experiments/run_nhits_benchmark.py --analyze
# ============================================================

experiment_name: NHiTS-Pooling-Search
description: >
  Grid search over n_pools_kernel_size × n_freq_downsample to
  identify the best pooling configuration per forecast horizon.
  Uses the paper's candidate values on NHiTS-GenericAE baseline.

output_csv: experiments/results/nhits/AEsample_pooling_search.csv

dataset: weather
horizons: [96, 192, 336, 720]

# IMPORTANT: disable horizon-adaptive overrides so each config's
# explicit pooling values are used as-is at every horizon.
skip_horizon_overrides: true


# NHiTS evaluation protocol
protocol:
  normalize: true
  # 'global' = per-column z-score using training-split stats (the NHiTS
  # paper's 'standard' scaler). Set to 'window' only for RevIN-style
  # experiments; note that per-window normalization rescales y by the
  # input window's stats and tends to destabilize MSE for trending data
  # like Weather at long horizons.
  normalization_style: global
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true     # 21 columns (with OT)
  loss: MSELoss
  forecast_multiplier: 5
  batch_size: 256

  # ── Paper-faithful batch sampling ───────────────────────────────────
  # NHiTS (Challu et al. 2023) trains by sampling (series, start_idx)
  # uniformly at random per gradient step, not by iterating the dense
  # sliding-window dataset. Under 'paper', one "epoch" = steps_per_epoch
  # gradient updates; batches are drawn with replacement.
  sampling_style: paper          # sliding (default) | paper
  steps_per_epoch: 1000          # required under 'paper'; paper default
  # 'uniform'   = draw uniformly over all valid (series, start) windows
  #               — matches the N-BEATS / NHiTS paper protocol. For
  #               Weather (21 equal-length columns) it's also equivalent
  #               to 'by_series'.
  # 'by_series' = weight each window by 1 / n_windows_in_its_column so
  #               every series has equal per-step probability. Mainly
  #               useful when column lengths differ.
  sampling_weights: uniform

runs:
  n_runs: 5
  base_seed: 1

training:
  # Under protocol.sampling_style='paper', one "epoch" = steps_per_epoch
  # gradient updates. max_steps is the total gradient-step budget and
  # takes precedence over max_epochs. Setting max_steps is REQUIRED when
  # sampling_style='paper' (unless protocol.acknowledge_epoch_semantics
  # is set to true).
  max_steps: 25000         # 25 epochs × 1000 steps/epoch (paper-scale)
  max_epochs: 25           # Upper cap only; max_steps stops training first
  early_stopping: false    # Paper setting (disabled)
  val_check_interval: 1000 # Validate every 1000 steps
  patience: 25             # Unused when early_stopping=false
  activation: ReLU
  active_g: false
  sum_losses: false
  num_workers: 5
  learning_rate: 0.001     
  
  # NHiTS paper uses a 3-step StepLR decay (gamma=0.5). With max_epochs=30
  # and step_size=8 the LR steps at epochs 8 / 16 / 24 for 3 total decays.
  lr_scheduler:
    type: step
    step_size: 8
    gamma: 0.5

block_params:
  thetas_dim: 5
  latent_dim: 16
  basis_dim: eq_fcast


configs:
  # --- Pool [2,2,2] × 3 freq options ---
  - name: Pool-2x2x2_Freq-168x24x1
