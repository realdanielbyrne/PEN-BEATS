    n_pools_kernel_size: [32, 16, 1]
    n_freq_downsample: [1, 1, 1]

  # ================================================================
  # Physics-motivated n_freq_downsample per horizon
  #
  # Design: ~5 knots for synoptic trend, ~20 knots for diurnal,
  # full resolution for sub-diurnal residual.
  #   n_freq_coarse ≈ H/5,  n_freq_mid ≈ H/20,  n_freq_fine = 1
  #
  # Each runs at ALL horizons so we can measure degradation at
  # non-target horizons.  Filter analysis by config name suffix.
  #
  #   H=96  (16h, <1 diurnal): [48, 12, 1] → 2, 8, 96 knots
  #   H=192 (32h, 1.3 diurnal): [48, 12, 1] → 4, 16, 192 knots
  #   H=336 (56h, 2.3 diurnal): [72, 18, 1] → 4, 18, 336 knots
  #   H=720 (5d,  5.0 diurnal): [144, 36, 1] → 5, 20, 720 knots
  # ================================================================

  # --- Ideal for H=96/192: [48,12,1] × 4 pool kernels ---
  - name: Pool-2x2x2_Freq-48x12x1
    model: NHiTSNet
    stack_types: ['GenericAE', 'GenericAE', 'GenericAE']
    n_pools_kernel_size: [2, 2, 2]
    n_freq_downsample: [48, 12, 1]

