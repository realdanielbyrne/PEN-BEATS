# ============================================================
# ResNet-Style Skip Connection Study — Tourism-Yearly
#
# Port of resnet_skip_study.yaml (v1) from M4-Yearly to
# Tourism-Yearly (H=4, backcast=8 with forecast_multiplier=2).
#
# Same 24 configs, 3 architectures:
#   A) GenericAELG homogeneous (9 configs)
#   B) TrendAELG + WaveletV3AELG alternating (10 configs)
#   C) Generic homogeneous (5 configs)
#
# Key adaptation: basis_dim=4, forecast_basis_dim=4 (eq_fcast
# for H=4) instead of 6 (M4-Yearly H=6).
#
# Method: 3-round successive halving
#   Round 1:  10 epochs, 3 runs, keep 50%
#   Round 2:  25 epochs, 3 runs, keep 50%
#   Round 3: 100 epochs, 5 runs → final
# ============================================================

experiment_name: resnet_skip_study_tourism
dataset: tourism
periods: [Tourism-Yearly]
category: skip_connection_study_tourism
description: >
  ResNet-style skip connection ablation on Tourism-Yearly.
  Port of M4-Yearly v1 study. Tests depth scaling (10-30
  stacks), skip_distance (4-10), and alpha mode (fixed vs
  learnable) across GenericAELG, TrendAELG+WaveletV3AELG,
  and legacy Generic architectures.

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  thetas_dim: 5

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search:
  enabled: true
  rounds:
    - {max_epochs: 10,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 25,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 100, n_runs: 5}

meta_forecaster:
  enabled: false

extra_csv_columns:
  - search_round
  - architecture
  - n_stacks
  - skip_distance_cfg
  - skip_alpha_cfg

runs:
  n_runs: 3
  base_seed: 42

configs:

  # ══════════════════════════════════════════════════════════════════════════
  # Section A: GenericAELG homogeneous (9 configs)
  # ══════════════════════════════════════════════════════════════════════════

  - name: GAELG10_no_skip
    category: genAELG_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAELG20_no_skip
    category: genAELG_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAELG30_no_skip
    category: genAELG_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAELG10_skip5_learn
    category: genAELG_control
    stacks: {type: homogeneous, block: GenericAELG, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 10
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  - name: GAELG20_skip5_a01
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAELG20_skip5_learn
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  - name: GAELG30_skip5_a01
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAELG30_skip5_learn
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  - name: GAELG30_skip10_learn
    category: genAELG_distance_sweep
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 10, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 10
      skip_alpha_cfg: learnable

  # ══════════════════════════════════════════════════════════════════════════
  # Section B: TrendAELG + WaveletV3AELG alternating (10 configs)
  #   basis_dim=4 (eq_fcast for Tourism-Yearly H=4)
  # ══════════════════════════════════════════════════════════════════════════

  - name: TW8_no_skip
    category: trendwav_baseline
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 8
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TW16_no_skip
    category: trendwav_baseline
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TW24_no_skip
    category: trendwav_baseline
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TW8_skip4_learn
    category: trendwav_control
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 4, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 8
      skip_distance_cfg: 4
      skip_alpha_cfg: learnable

  - name: TW16_skip4_a01
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TW16_skip4_learn
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 4, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: learnable

  - name: TW16_skip8_learn
    category: trendwav_distance_sweep
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 8, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 8
      skip_alpha_cfg: learnable

  - name: TW24_skip4_a01
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TW24_skip4_learn
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 4, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: learnable

  - name: TW24_skip8_learn
    category: trendwav_distance_sweep
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 8, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 8
      skip_alpha_cfg: learnable

  # ══════════════════════════════════════════════════════════════════════════
  # Section C: Generic legacy (5 configs)
  # ══════════════════════════════════════════════════════════════════════════

  - name: G30_no_skip
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: G30_skip5_a01
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: G30_skip5_learn
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  - name: G30_skip10_a01
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 10, skip_alpha: 0.1}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 10
      skip_alpha_cfg: "0.1"

  - name: G30_skip10_learn
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 10, skip_alpha: learnable}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 10
      skip_alpha_cfg: learnable

output:
  results_dir: experiments/results
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
