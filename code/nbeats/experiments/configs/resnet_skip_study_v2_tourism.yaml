  - name: TWA30_no_skip
    category: trendWaveletAE_baseline
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TWA20_skip3_a01
    category: trendWaveletAE_skip
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 20}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 20
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  - name: TWA30_skip3_a01
    category: trendWaveletAE_skip
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 30
      skip_distance_cfg: 3
