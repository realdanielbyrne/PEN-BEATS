  - name: TV2_24_skip3_a01
    category: trendVAE2_skip
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 24
      skip_distance_cfg: 3
