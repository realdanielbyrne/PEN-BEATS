  # ══════════════════════════════════════════════════════════════════════════
  # Section D: TrendWaveletAE homogeneous (6 configs)
  #   basis_dim=4 (eq_fcast for Tourism-Yearly H=4)
  # ══════════════════════════════════════════════════════════════════════════

  - name: TWA10_no_skip
    category: trendWaveletAE_baseline
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 10}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
