      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TVAE24_skip3_a01
    category: trendVAE_skip
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 24
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  # ══════════════════════════════════════════════════════════════════════════
  # Section C: TrendVAE2 + WaveletV3VAE2 alternating (6 configs)
