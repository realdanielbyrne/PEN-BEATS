# ============================================================
# ResNet-Style Skip Connection Study v2 — Tourism-Yearly
#
# Port of resnet_skip_study_v2.yaml from M4-Yearly to
# Tourism-Yearly (H=4, backcast=8 with forecast_multiplier=2).
#
# 36 configs across 6 sections:
#   A) GenericAE homogeneous (6 configs)
#   B) TrendVAE + WaveletV3VAE alternating (6 configs)
#   C) TrendVAE2 + WaveletV3VAE2 alternating (6 configs)
#   D) TrendWaveletAE homogeneous (6 configs)
#   E) TrendWaveletAELG homogeneous (6 configs)
#   F) TrendVAE + HaarWaveletV3 alternating (6 configs)
#
# Key adaptation: basis_dim=4, forecast_basis_dim=4 (eq_fcast
# for H=4) instead of 6 (M4-Yearly H=6).
#
# Method: 3-round successive halving
#   Round 1:  15 epochs, 3 runs, keep 50%
#   Round 2:  30 epochs, 3 runs, keep 50%
#   Round 3: 100 epochs, 5 runs → final (early stopping)
# ============================================================

experiment_name: resnet_skip_study_v2_tourism
dataset: tourism
periods: [Tourism-Yearly]
category: skip_connection_study_v2_tourism
description: >
  Skip connection follow-up on Tourism-Yearly. Port of M4
  v2 study. Tests GenericAE depth scaling, TrendVAE+WaveletV3VAE,
  TrendVAE2+WaveletV3VAE2, TrendWaveletAE, TrendWaveletAELG,
  and TrendVAE+HaarWaveletV3 at deep stacks with skip.

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  thetas_dim: 5

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search:
  enabled: true
  rounds:
    - {max_epochs: 15,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 30,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 100, n_runs: 5}

meta_forecaster:
  enabled: false

extra_csv_columns:
  - search_round
  - architecture
  - n_stacks
  - skip_distance_cfg
  - skip_alpha_cfg

runs:
  n_runs: 3
  base_seed: 42

configs:

  # ══════════════════════════════════════════════════════════════════════════
  # Section A: GenericAE homogeneous (6 configs)
  # ══════════════════════════════════════════════════════════════════════════

  - name: GAE10_no_skip
    category: genericAE_baseline
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAE
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAE20_no_skip
    category: genericAE_baseline
    stacks: {type: homogeneous, block: GenericAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAE
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAE30_no_skip
    category: genericAE_baseline
    stacks: {type: homogeneous, block: GenericAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAE20_skip5_a01
    category: genericAE_skip
    stacks: {type: homogeneous, block: GenericAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAE
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAE30_skip5_a01
    category: genericAE_skip
    stacks: {type: homogeneous, block: GenericAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAE
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAE30_skip3_a01
    category: genericAE_skip
    stacks: {type: homogeneous, block: GenericAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAE
      n_stacks: 30
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  # ══════════════════════════════════════════════════════════════════════════
  # Section B: TrendVAE + WaveletV3VAE alternating (6 configs)
  #   basis_dim=4 (eq_fcast for Tourism-Yearly H=4)
  # ══════════════════════════════════════════════════════════════════════════

  - name: TVAE8_no_skip
    category: trendVAE_baseline
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 8
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TVAE16_no_skip
    category: trendVAE_baseline
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 16
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TVAE24_no_skip
    category: trendVAE_baseline
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 24
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TVAE16_skip4_a01
    category: trendVAE_skip
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 4, forecast_basis_dim: 4}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TVAE24_skip4_a01
    category: trendVAE_skip
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 12}
