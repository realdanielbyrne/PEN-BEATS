# ============================================================
# Short experiment to validate the early-stopping fix for
# nbeats_paper sampling. Trains ONE configuration
# (NBEATS-G_10s_ag0) on M4 Yearly for 3 runs with the new
# val_check_interval / min_delta settings, so results can be
# compared against the baseline runs already in
# comprehensive_m4_paper_sample_results.csv.
#
# Baseline (bug present, epochs_trained=2-3):
#   SMAPE ≈ 13.63   OWA ≈ 0.813
# Paper (N-BEATS-G ensemble, Oreshkin 2020 Table 3):
#   SMAPE ≈ 13.49   OWA ≈ 0.799
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/test_earlystop_fix.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/test_earlystop_fix.yaml
# ============================================================

experiment_name: test_earlystop_fix
category: methodology_test
description: >
  Validate val_check_interval=100 + min_delta=0.001 early-stopping
  fix for nbeats_paper sampling on NBEATS-G_10s_ag0 / M4 Yearly.

dataset: m4
periods:
  - Monthly

protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Yearly: 1.5
    Monthly: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100      # validate every 100 steps
  min_delta: 0.001             # require 0.1% improvement
  min_epochs: 0
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

lr_scheduler:
  type: multistep
  n_milestones: 10
  gamma: 0.5

block_params:
  wavelet_type: db3

runs:
  n_runs: 3
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: test_earlystop_fix_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 3
  pin_memory: true

analysis:
  enabled: false
  ranking: false

configs:
  - name: NBEATS-G_10s_ag0
    category: paper_baseline
    stacks:
      type: homogeneous
      block: Generic
      n: 10
    training:
      active_g: false
