      active_g_cfg: false
      tiered: ascend
      plateau_cell: p5_loose
      plateau_patience: 5
      plateau_factor: 0.5
      plateau_cooldown: 2

  # ── A2: TAELG+Sym10V3AELG_30s_tiered × 4 plateauLR cells ──────────

  - name: TAELG+Sym10V3AELG_30s_tiered_p1_baseline
