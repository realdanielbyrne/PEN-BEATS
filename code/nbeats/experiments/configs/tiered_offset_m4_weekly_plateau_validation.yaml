  csv_filename: tiered_offset_m4_weekly_plateau_validation_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 2
  pin_memory: true

analysis:
  enabled: true
  ranking: true
