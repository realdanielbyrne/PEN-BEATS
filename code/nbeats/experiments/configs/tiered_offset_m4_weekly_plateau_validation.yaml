# ============================================================
# Weekly PlateauLR Patience Validation
#
# Goal: arbitrate whether the M4 Weekly tiered regression observed in
# `tiered_offset_m4_allperiods_results.csv` is a plateauLR
# `patience=1, factor=0.75` artefact at the shortest M4 horizon
# (H=13, noisy val_loss), or a genuine cascade reversal.
#
# Companion stepLR rerun (`tiered_offset_m4_allperiods_paperlr_results.csv`)
# already showed:
#   - 11/16 tiered Weekly configs improve under stepLR
#   - mean Δ −0.042 SMAPE vs plateauLR
#   - best stepLR tiered Weekly = TAELG+Sym10V3AELG_30s_tiered = 6.810 (n=5)
#     vs plateauLR = 7.146 (Δ −0.336)
#   - best vs non-tiered SOTA (T+Coif2V3_30s_bdeq, 6.735): MWU p=0.59 (no longer significant)
#
# This experiment isolates the plateauLR `patience` axis directly while
# keeping the architecture, sampling, and training perimeter identical
# to the original Weekly cells in `tiered_offset_m4_allperiods.yaml`.
#
# ── Experiment design ────────────────────────────────────────
# 2 architectures × 4 plateauLR cells × 10 seeds = 80 runs
#
# Architectures (chosen for largest stepLR recovery + diagnostic span):
#   A1: T+Sym10V3_30s_tiered_ag0       — RootBlock, paper-faithful (ag0)
#   A2: TAELG+Sym10V3AELG_30s_tiered   — AELG, biggest stepLR recovery (Δ−0.336)
#
# PlateauLR cells (factor 0.75 → 0.5 in 3/4 of cells; one drop ≈ one halving):
#   p1_baseline:  patience=1, factor=0.75, cooldown=0  ← replicates the regression
#   p2_tight:     patience=2, factor=0.5,  cooldown=0  ← fast fallback if p3 too slow
#   p3_recommended: patience=3, factor=0.5, cooldown=1 ← main hypothesis
#   p5_loose:     patience=5, factor=0.5,  cooldown=2  ← stale-comment claim
#
# ── Success criteria ─────────────────────────────────────────
# Recommended setting (p3) succeeds if ALL of:
#   • mean SMAPE within 0.05 of stepLR result for both A1 and A2
#   • best_epoch=0 fraction <10% (current p1 baseline = 22%)
#   • epochs_trained median ≥ stepLR median (no faster collapse)
#
# Falsification: if all four cells regress vs stepLR by a similar margin,
# Weekly is a genuine cascade reversal (uniform basis_dim is locally
# optimal at H=13) and the plateauLR-confound hypothesis is rejected.
#
# Note: ReduceLROnPlateau `threshold` is not exposed by the YAML builder
# (`models.py:161-176`) — defaults to 1e-4. Patience × factor × cooldown
# is the only testable axis without code changes.
#
# ------------------------------------------------------------
# CLI usage
# ------------------------------------------------------------
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_offset_m4_weekly_plateau_validation.yaml --dry-run
#
#   python experiments/run_from_yaml.py experiments/configs/tiered_offset_m4_weekly_plateau_validation.yaml
#
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_offset_m4_weekly_plateau_validation.yaml --analyze-only
# ============================================================

experiment_name: tiered_offset_m4_weekly_plateau_validation
category: weekly_plateau_validation
description: >
  Validation of plateauLR patience/factor/cooldown for M4 Weekly tiered
  configurations. Tests four scheduler cells (p1 baseline, p2 tight,
  p3 recommended, p5 loose) on two diagnostic architectures
  (T+Sym10V3_30s_tiered_ag0, TAELG+Sym10V3AELG_30s_tiered).

dataset: m4
periods:
  - Weekly

protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Weekly: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

# Top-level lr_scheduler is overridden per-config below.
lr_scheduler:
  type: plateau
  factor: 0.5
  patience: 3
  cooldown: 1
  min_lr: 1.0e-06
  mode: min
  monitor: val_loss
  interval: step
  frequency: 100

block_params:
  trend_thetas_dim: 3
  basis_dim: eq_fcast
  basis_offset: 0
  latent_dim: 32

extra_csv_columns:
  - basis_dim
  - basis_offset
  - stack_basis_offsets
  - arch_family
  - block_type_primary
  - backbone
  - stack_pattern
  - n_stacks
  - wavelet_family
  - basis_dim_label
  - latent_dim_cfg
  - trend_thetas_dim_cfg
  - active_g_cfg
  - tiered
  - plateau_cell
  - plateau_patience
  - plateau_factor
  - plateau_cooldown

configs:

  # ── A1: T+Sym10V3_30s_tiered_ag0 × 4 plateauLR cells ──────────────

  - name: T+Sym10V3_30s_tiered_ag0_p1_baseline
    category: validation_rb_sym10_30s
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 0, 0, 0, 0, 8, 0, 8, 0, 8, 0, 16, 0, 16, 0, 16, 0, 24, 0, 24, 0, 24, 0, 32, 0, 32, 0, 32]
    lr_scheduler:
      type: plateau
      factor: 0.75
      patience: 1
      cooldown: 0
      min_lr: 1.0e-06
      mode: min
      monitor: val_loss
      interval: step
      frequency: 100
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend
      plateau_cell: p1_baseline
      plateau_patience: 1
      plateau_factor: 0.75
      plateau_cooldown: 0

  - name: T+Sym10V3_30s_tiered_ag0_p2_tight
    category: validation_rb_sym10_30s
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 0, 0, 0, 0, 8, 0, 8, 0, 8, 0, 16, 0, 16, 0, 16, 0, 24, 0, 24, 0, 24, 0, 32, 0, 32, 0, 32]
    lr_scheduler:
      type: plateau
      factor: 0.5
      patience: 2
      cooldown: 0
      min_lr: 1.0e-06
      mode: min
      monitor: val_loss
      interval: step
      frequency: 100
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
