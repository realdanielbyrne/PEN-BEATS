# ============================================================
# Tiered Offset Step=3 — M4 Daily Only
#
# Motivation: The existing step=8 tiered study (tiered_offset_m4_allperiods)
# only produces 3 distinct wavelet offsets on Daily (H=14, basis_dim=14):
#   Effective offsets: {0, 8, 13, 13, 13}  — tiers 3-5 all clamp to 13
#
# This study uses step=3 to fully utilise the [0, H-1] = [0, 13] range:
#   Effective offsets: {0, 3, 6, 9, 12}  — 5 distinct, no clamping
#
# Experiment matrix:
#   Wavelets:  sym10, db3, haar, coif2
#   Depths:    10s, 30s
#   Backbones: RootBlock (ag0), AELG (ld32)
#   Schemes:   step3_asc, step3_desc, uniform [0,3,7,10,13]
#
# ── Offset schemes ──────────────────────────────────────────
#   10s step3_asc:  [0,0, 0,3, 0,6, 0,9, 0,12]
#   10s step3_desc: [0,12, 0,9, 0,6, 0,3, 0,0]
#   10s uniform:    [0,0, 0,3, 0,7, 0,10, 0,13]
#   30s step3_asc:  [0,0, 0,0, 0,0, 0,3, 0,3, 0,3, 0,6, 0,6, 0,6,
#                    0,9, 0,9, 0,9, 0,12, 0,12, 0,12]
#
# ── Comparable controls ──────────────────────────────────────
#   From tiered_offset_m4_allperiods_results.csv (Daily):
#     T+Sym10V3_10s_tiered_ag0    3.014  (step=8, asc)
#     T+DB3V3_10s_tiered_ag0      3.023  (step=8, asc)
#
# ── agf note ─────────────────────────────────────────────────
#   agf at 10s diverges on Daily tiered (22.75 SMAPE observed).
#   agf is excluded at 10s. agf at 30s was safe (3.014) but
#   not included here — focus is on offset scheme comparison.
#
# CLI usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_step3_m4_daily.yaml --dry-run
#
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_step3_m4_daily.yaml
# ============================================================

experiment_name: tiered_step3_m4_daily
category: wavelet_offset_study
description: >
  Tiered basis_offset with step=3 for M4 Daily. Fixes the clamping problem
  in the step=8 study where tiers 3-5 collapsed to offset=13. Tests ascending
  vs descending direction and untested wavelets (Haar, Coif2).

dataset: m4
periods:
  - Daily

protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Daily: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

lr_scheduler:
  type: plateau
  factor: 0.5
  patience: 3
  cooldown: 1
  min_lr: 1.0e-06
  mode: min
  monitor: val_loss
  interval: step
  frequency: 100

block_params:
  trend_thetas_dim: 3
  basis_dim: eq_fcast
  basis_offset: 0
  latent_dim: 32

extra_csv_columns:
  - basis_dim
  - basis_offset
  - stack_basis_offsets
  - arch_family
  - block_type_primary
  - backbone
  - stack_pattern
  - n_stacks
  - wavelet_family
  - basis_dim_label
  - latent_dim_cfg
  - trend_thetas_dim_cfg
  - active_g_cfg
  - tiered

configs:

  # ── Sym10 · 10s · ascending step=3 ────────────────────────
  - name: T+Sym10V3_10s_step3_asc_ag0
    category: tiered_rb_sym10_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── Sym10 · 10s · descending step=3 ───────────────────────
  - name: T+Sym10V3_10s_step3_desc_ag0
    category: tiered_rb_sym10_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 12, 0, 9, 0, 6, 0, 3, 0, 0]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_desc

  # ── Sym10 · 10s · uniform [0,3,7,10,13] ──────────────────
  - name: T+Sym10V3_10s_unif_ag0
    category: tiered_rb_sym10_10s_unif
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 3, 0, 7, 0, 10, 0, 13]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: uniform

  # ── DB3 · 10s · ascending step=3 ──────────────────────────
  - name: T+DB3V3_10s_step3_asc_ag0
    category: tiered_rb_db3_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, DB3WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+DB3WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: db3
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── DB3 · 10s · descending step=3 ─────────────────────────
  - name: T+DB3V3_10s_step3_desc_ag0
    category: tiered_rb_db3_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, DB3WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 12, 0, 9, 0, 6, 0, 3, 0, 0]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+DB3WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: db3
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_desc

  # ── Haar · 10s · ascending step=3 (untested on Daily tiered)
  - name: T+HaarV3_10s_step3_asc_ag0
    category: tiered_rb_haar_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, HaarWaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+HaarWaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: haar
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── Haar · 10s · descending step=3 ───────────────────────
  - name: T+HaarV3_10s_step3_desc_ag0
    category: tiered_rb_haar_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, HaarWaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 12, 0, 9, 0, 6, 0, 3, 0, 0]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+HaarWaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: haar
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_desc

  # ── Coif2 · 10s · ascending step=3 (untested on Daily tiered)
  - name: T+Coif2V3_10s_step3_asc_ag0
    category: tiered_rb_coif2_10s_step3
    stacks:
      type: alternating
      blocks: [Trend, Coif2WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Coif2WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: coif2
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── AELG · Sym10 · 10s · ascending step=3 ────────────────
  - name: TAELG+Sym10V3AELG_10s_step3_asc
    category: tiered_aelg_sym10_10s_step3
    stacks:
      type: alternating
      blocks: [TrendAELG, Symlet10WaveletV3AELG]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_aelg_sym10
      block_type_primary: TrendAELG+Symlet10WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── AELG · DB3 · 10s · ascending step=3 ──────────────────
  - name: TAELG+DB3V3AELG_10s_step3_asc
    category: tiered_aelg_db3_10s_step3
    stacks:
      type: alternating
      blocks: [TrendAELG, DB3WaveletV3AELG]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_aelg_db3
      block_type_primary: TrendAELG+DB3WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: db3
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── AELG · Haar · 10s · ascending step=3 ─────────────────
  - name: TAELG+HaarV3AELG_10s_step3_asc
    category: tiered_aelg_haar_10s_step3
    stacks:
      type: alternating
      blocks: [TrendAELG, HaarWaveletV3AELG]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 3, 0, 6, 0, 9, 0, 12]
    extra_fields:
      arch_family: alt_aelg_haar
      block_type_primary: TrendAELG+HaarWaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: haar
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── Sym10 · 30s · ascending step=3 ───────────────────────
  - name: T+Sym10V3_30s_step3_asc_ag0
    category: tiered_rb_sym10_30s_step3
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0,0, 0,0, 0,0, 0,3, 0,3, 0,3, 0,6, 0,6, 0,6, 0,9, 0,9, 0,9, 0,12, 0,12, 0,12]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── Haar · 30s · ascending step=3 ─────────────────────────
  - name: T+HaarV3_30s_step3_asc_ag0
    category: tiered_rb_haar_30s_step3
    stacks:
      type: alternating
      blocks: [Trend, HaarWaveletV3]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0,0, 0,0, 0,0, 0,3, 0,3, 0,3, 0,6, 0,6, 0,6, 0,9, 0,9, 0,9, 0,12, 0,12, 0,12]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+HaarWaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: haar
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

  # ── AELG · Sym10 · 30s · ascending step=3 ────────────────
  - name: TAELG+Sym10V3AELG_30s_step3_asc
    category: tiered_aelg_sym10_30s_step3
    stacks:
      type: alternating
      blocks: [TrendAELG, Symlet10WaveletV3AELG]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0,0, 0,0, 0,0, 0,3, 0,3, 0,3, 0,6, 0,6, 0,6, 0,9, 0,9, 0,9, 0,12, 0,12, 0,12]
    extra_fields:
      arch_family: alt_aelg_sym10
      block_type_primary: TrendAELG+Symlet10WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: step3_asc

runs:
  n_runs: 10
  base_seed: 42
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: tiered_step3_m4_daily_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 2
  pin_memory: true

analysis:
  enabled: true
  ranking: true
