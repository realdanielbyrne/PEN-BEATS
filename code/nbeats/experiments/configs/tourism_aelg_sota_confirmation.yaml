study_name: tourism_aelg_sota_confirmation

dataset: tourism
period: Tourism-Yearly

architecture:
  block_type: TrendWaveletAELG
  repeats: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search_space:
  wavelet_types:
    - coif3
  basis_labels: [eq_bcast]
  trend_dims: [3]
  latent_dims: [16]

search:
  rounds:
    - max_epochs: 50
      n_runs: 10
      top_k: 1

output:
  results_dir: experiments/results
  search_csv_filename: tourism_aelg_sota_confirmation_results.csv

hardware:
  accelerator: auto
  num_workers: 0

runs:
  base_seed: 42
