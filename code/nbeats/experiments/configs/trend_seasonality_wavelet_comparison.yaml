# ============================================================
# Trend+Seasonality vs Trend+Wavelet Head-to-Head Comparison
#
# Scientific question: Do wavelet blocks (DWT basis) actually
# outperform seasonality blocks (Fourier basis) when paired
# with trend blocks, or does *any* structured basis expansion
# work equally well?
#
# Design:
#   - 24 Seasonality pairings (6 block combos × 2 arch × 2 ld)
#   - 16 Wavelet pairings (4 block combos × 2 arch × 2 ld)
#   - All with ttd=3, basis_dim=6 (eq_fcast for M4-Yearly)
#   - I-style: 2 stacks (repeats=1), n_blocks=3, share_weights
#   - Alternating: 10 stacks (repeats=5), n_blocks=1, share_weights
#   - Compare against TrendWaveletAE v2 top-1 (13.60 SMAPE)
#
# Total: 40 configs × 5 runs × 50 epochs = 200 runs
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/trend_seasonality_wavelet_comparison.yaml --dry-run
#   python experiments/run_from_yaml.py \
#       experiments/configs/trend_seasonality_wavelet_comparison.yaml
# ============================================================

experiment_name: trend_seas_wav_comparison
category: trend_seas_wav
description: >
  Controlled head-to-head comparison of TrendAE/TrendAELG paired with
  Seasonality-family blocks (Fourier basis) vs Wavelet-family blocks
  (DWT basis). Tests whether wavelet blocks provide genuine improvement
  over seasonality blocks or if any structured basis expansion suffices.

dataset: m4
periods:
  - Yearly

# Global training defaults (alternating style)
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 50
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  trend_thetas_dim: 3
  basis_dim: 6

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

extra_csv_columns:
  - trend_block
  - second_block
  - basis_type
  - arch_style
  - latent_dim_cfg

# ============================================================
#  40 configs: 24 Seasonality + 16 Wavelet
# ============================================================
configs:

  # ────────────────────────────────────────────────────────────
  #  SEASONALITY PAIRINGS (24 configs)
  # ────────────────────────────────────────────────────────────

  # ── TrendAE + SeasonalityAE ─────────────────────────────────

  - name: TrendAE+SeasonalityAE_I_ld8
    stacks: {type: alternating, blocks: [TrendAE, SeasonalityAE], repeats: 1}
    training: {n_blocks_per_stack: 3}
    block_params: {latent_dim: 8}
    extra_fields:
      trend_block: TrendAE
      second_block: SeasonalityAE
      basis_type: fourier
      arch_style: I-style
      latent_dim_cfg: 8

  - name: TrendAE+SeasonalityAE_I_ld12
    stacks: {type: alternating, blocks: [TrendAE, SeasonalityAE], repeats: 1}
    training: {n_blocks_per_stack: 3}
    block_params: {latent_dim: 12}
    extra_fields:
      trend_block: TrendAE
      second_block: SeasonalityAE
      basis_type: fourier
      arch_style: I-style
      latent_dim_cfg: 12

  - name: TrendAE+SeasonalityAE_Alt_ld8
    stacks: {type: alternating, blocks: [TrendAE, SeasonalityAE], repeats: 5}
    block_params: {latent_dim: 8}
    extra_fields:
      trend_block: TrendAE
      second_block: SeasonalityAE
      basis_type: fourier
      arch_style: alternating
      latent_dim_cfg: 8

  - name: TrendAE+SeasonalityAE_Alt_ld12
    stacks: {type: alternating, blocks: [TrendAE, SeasonalityAE], repeats: 5}
    block_params: {latent_dim: 12}
    extra_fields:
      trend_block: TrendAE
      second_block: SeasonalityAE
      basis_type: fourier
      arch_style: alternating
      latent_dim_cfg: 12

  # ── TrendAE + SeasonalityAELG ───────────────────────────────

  - name: TrendAE+SeasonalityAELG_I_ld8
    stacks: {type: alternating, blocks: [TrendAE, SeasonalityAELG], repeats: 1}
    training: {n_blocks_per_stack: 3}
    block_params: {latent_dim: 8}
    extra_fields:
      trend_block: TrendAE
      second_block: SeasonalityAELG
      basis_type: fourier
      arch_style: I-style
      latent_dim_cfg: 8

  - name: TrendAE+SeasonalityAELG_I_ld12
