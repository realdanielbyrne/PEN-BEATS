# ============================================================
# TrendAE + AutoEncoder Alternating Stack
# Mirrors run_trendae_study.py architecture pattern:
#   ["TrendAE", AE_variant] * 5  (10 stacks total, alternating)
#
# This config runs a concise 4-config benchmark of the most
# promising TrendAE+AE alternating patterns.  For the full
# successive halving search see trendae_search.yaml.
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendae_ae_alternating.yaml
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendae_ae_alternating.yaml \
#       --dataset tourism --periods Tourism-Yearly
# ============================================================

experiment_name: trendae_ae_alternating
category: trendae_alternating
description: >
  TrendAE alternating with AE-backbone variants (AutoEncoder, GenericAE,
  BottleneckGenericAE). 10 stacks total: [TrendAE, AE] repeated 5 times.
  Representative configs from run_trendae_study.py best-performing families.

dataset: m4
periods:
  - Yearly

# Global training defaults
training:
  sum_losses: false
  activation: ReLU
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

# LR scheduler — cosine annealing (matches run_trendae_study.py)
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

block_params:
  basis_dim: 128

# Extra CSV columns for study metadata
extra_csv_columns:
  - arch_pattern
  - ae_variant

# Four representative TrendAE+AE alternating configs
configs:
  # ── TrendAE + AutoEncoder (baseline) ──────────────────────────────────
  - name: TrendAE+AutoEncoder_ld4_ag0
    category: trendae_alternating
    stacks:
      type: alternating
      blocks: [TrendAE, AutoEncoder]
      repeats: 5
    block_params:
      latent_dim: 4
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: false
    extra_fields:
      arch_pattern: trendae_ae_alternating
      ae_variant: AutoEncoder

  - name: TrendAE+AutoEncoder_ld8_ag0
    category: trendae_alternating
    stacks:
      type: alternating
      blocks: [TrendAE, AutoEncoder]
      repeats: 5
    block_params:
      latent_dim: 8
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: false
    extra_fields:
      arch_pattern: trendae_ae_alternating
      ae_variant: AutoEncoder

  # ── TrendAE + GenericAE ────────────────────────────────────────────────
  - name: TrendAE+GenericAE_ld4_ag0
    category: trendae_alternating
    stacks:
      type: alternating
      blocks: [TrendAE, GenericAE]
      repeats: 5
    block_params:
      latent_dim: 4
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: false
    extra_fields:
      arch_pattern: trendae_ae_alternating
      ae_variant: GenericAE

  - name: TrendAE+GenericAE_ld4_agF
    category: trendae_alternating
    stacks:
      type: alternating
      blocks: [TrendAE, GenericAE]
      repeats: 5
    block_params:
      latent_dim: 4
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: forecast
    extra_fields:
      arch_pattern: trendae_ae_alternating
      ae_variant: GenericAE

  # ── TrendAE + BottleneckGenericAE ─────────────────────────────────────
  - name: TrendAE+BottleneckGenericAE_ld4_td5_ag0
    category: trendae_alternating
    stacks:
      type: alternating
      blocks: [TrendAE, BottleneckGenericAE]
      repeats: 5
    block_params:
      latent_dim: 4
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: false
    extra_fields:
      arch_pattern: trendae_ae_alternating
      ae_variant: BottleneckGenericAE

  - name: TrendAE+BottleneckGenericAE_ld8_td5_agF
    category: trendae_alternating
    stacks:
      type: alternating
      blocks: [TrendAE, BottleneckGenericAE]
      repeats: 5
    block_params:
      latent_dim: 8
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: forecast
    extra_fields:
      arch_pattern: trendae_ae_alternating
      ae_variant: BottleneckGenericAE

  # ── NBEATS-I+G 10-stack baseline for comparison ───────────────────────
  - name: NBEATS-I+G_10stack
    category: baseline
    stacks:
      type: prefix_body
      prefix: [Trend, Seasonality]
      body: Generic
      total: 10
    block_params:
      latent_dim: 4
      thetas_dim: 5
      trend_thetas_dim: 3
    training:
      active_g: false
    extra_fields:
      arch_pattern: nbeats_ig
      ae_variant: ""

# Single pass (active_g defined per config above)
# No 'passes' key → single pass named after experiment_name

runs:
  n_runs: 10
  base_seed: 42

output:
  results_dir: experiments/results
  csv_filename: trendae_ae_alternating_results.csv
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
