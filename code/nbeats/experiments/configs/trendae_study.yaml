# trendae_study.yaml
# Successive halving search: TrendAE + AE alternating stacks
# Architecture: [TrendAE, AE_variant] * 5 (10 stacks), 6 AE variants
# Search: same grid as ae_trend_study but TrendAE backbone for Trend stacks
# Rounds: 10/15/30 epochs, keep 33%, top_k=2 final
# Datasets: M4-Yearly + Tourism-Yearly + Weather-96
# Mirrors: experiments/run_trendae_study.py
# 90 configs total

experiment_name: trendae_study
description: >
  Successive halving search for best TrendAE+AE alternating architecture.
  6 AE variants × latent/thetas/active_g/trend_thetas_dim = 90 configs.
  Architecture: [TrendAE, AE]*5 (10 stacks). Datasets: M4-Yearly, Tourism-Yearly, Weather-96.
output_csv: trendae_search_results.csv

dataset: [m4, tourism, weather]
periods:
  - Yearly
  - Tourism-Yearly
  - Weather-96

runs:
  n_runs: 3
  base_seed: 42

training:
  max_epochs: 30
  patience: 10
  learning_rate: 0.001
  loss: SMAPELoss
  n_blocks_per_stack: 1
  share_weights: true
  lr_scheduler:
    warmup_epochs: 15
    eta_min: 0.000001

search:
  enabled: true
  rounds:
    - {max_epochs: 10, n_runs: 3, keep_fraction: 0.33, top_k: null}
    - {max_epochs: 15, n_runs: 3, keep_fraction: 0.33, top_k: null}
    - {max_epochs: 30, n_runs: 3, keep_fraction: 0.33, top_k: 2}

extra_csv_columns:
  - search_round
  - arch_pattern
  - ae_variant
  - latent_dim_cfg
  - thetas_dim_cfg
  - trend_thetas_dim_cfg
  - meta_predicted_best
  - meta_convergence_score

configs:
  - {name: AutoEncoder_ld2_td5_ttd3_ag0, category: trendae_search, stacks: {type: alternating, blocks: [TrendAE, AutoEncoder], repeats: 5}, block_params: {thetas_dim: 2, latent_dim: 4, trend_thetas_dim: 3}, training: {active_g: false}, extra_fields: {ae_variant: AutoEncoder, arch_pattern: trendae_ae_alternating, latent_dim_cfg: 2, thetas_dim_cfg: 5, trend_thetas_dim_cfg: 3}}
  - {name: AutoEncoder_ld2_td5_ttd5_ag0, category: trendae_search, stacks: {type: alternating, blocks: [TrendAE, AutoEncoder], repeats: 5}, block_params: {thetas_dim: 2, latent_dim: 4, trend_thetas_dim: 5}, training: {active_g: false}, extra_fields: {ae_variant: AutoEncoder, arch_pattern: trendae_ae_alternating, latent_dim_cfg: 2, thetas_dim_cfg: 5, trend_thetas_dim_cfg: 5}}
