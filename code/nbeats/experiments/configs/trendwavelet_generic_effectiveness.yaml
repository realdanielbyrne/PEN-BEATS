# ============================================================
# TrendWaveletGeneric Family — Basic Effectiveness Test (M4 Yearly)
#
# Tests all 4 new TrendWaveletGeneric block types against their
# parent TrendWavelet/TrendWaveletAE/TrendWaveletAELG baselines.
# Each block type is run under two active_g passes (false / forecast).
#
# 7 configs × 2 passes × 5 runs = 70 runs total
#
# Smart defaults from prior TrendWavelet studies (M4 Yearly):
#   trend_thetas_dim=3  (winner in all TrendWavelet experiments)
#   basis_dim=4         (lt_fcast: max(6//2, 6-2)=4, matches SOTA config)
#   generic_dim=5       (default rank for learned generic branch)
#   wavelet_type=coif2  (best for M4 AE variants)
#   latent_dim=16       (critical for AE/AELG on M4)
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_generic_effectiveness.yaml --dry-run
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_generic_effectiveness.yaml
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_generic_effectiveness.yaml --worker-id gpu0
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_generic_effectiveness.yaml --worker-id gpu1
#
# Parallel note:
#   YAML/unified runs claim jobs atomically under experiments/results/.claims/.
#   The filename shape stays <config>__<dataset>__<horizon>__run<idx>.claim, but
#   the pass name is prefixed into the config segment so baseline and
#   activeG_fcast do not collide.
# ============================================================

experiment_name: trendwavelet_generic_effectiveness
category: trendwavelet_generic
description: >
  Effectiveness test for TrendWaveletGeneric block family (polynomial + DWT +
  learned generic basis). 10 stacks, M4 Yearly, two active_g passes.
  Includes TrendWavelet/AE/AELG baselines for direct comparison.

dataset: m4
periods:
  - Yearly

# Two-pass design: paper-faithful baseline vs forecast-path activation
passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

# Global training defaults
training:
  sum_losses: false
  activation: ReLU
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

# LR scheduler — cosine annealing (matches all prior TrendWavelet configs)
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

# Global block params (applied to all configs; latent_dim ignored by non-AE blocks)
block_params:
  trend_thetas_dim: 3
  basis_dim: 4
  generic_dim: 5
  wavelet_type: coif2
  latent_dim: 16

# Extra CSV columns for study metadata
extra_csv_columns:
  - block_type
  - backbone
  - active_g_cfg

# ── 4 New TrendWaveletGeneric blocks ──────────────────────────────────────────
configs:
  - name: TWG_coif2_td3_bd4_gd5
    category: trendwavelet_generic_new
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    extra_fields:
      block_type: TrendWaveletGeneric
      backbone: RootBlock
      active_g_cfg: per_pass

  - name: TWGAE_coif2_td3_bd4_gd5_ld16
    category: trendwavelet_generic_new
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAE
      n: 10
    extra_fields:
      block_type: TrendWaveletGenericAE
      backbone: AERootBlock
      active_g_cfg: per_pass

  - name: TWGAELG_coif2_td3_bd4_gd5_ld16
    category: trendwavelet_generic_new
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    extra_fields:
      block_type: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      active_g_cfg: per_pass

  - name: TWGVAE_coif2_td3_bd4_gd5_ld16
    category: trendwavelet_generic_new
    stacks:
      type: homogeneous
      block: TrendWaveletGenericVAE
      n: 10
    extra_fields:
      block_type: TrendWaveletGenericVAE
      backbone: AERootBlockVAE
      active_g_cfg: per_pass

# ── Reference baselines (no learned generic branch) ───────────────────────────
  - name: TW_coif2_td3_bd4
    category: trendwavelet_generic_reference
    stacks:
      type: homogeneous
      block: TrendWavelet
      n: 10
    extra_fields:
      block_type: TrendWavelet
      backbone: RootBlock
      active_g_cfg: per_pass

  - name: TWAE_coif2_td3_bd4_ld16
    category: trendwavelet_generic_reference
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    extra_fields:
      block_type: TrendWaveletAE
      backbone: AERootBlock
      active_g_cfg: per_pass

  - name: TWAELG_coif2_td3_bd4_ld16
    category: trendwavelet_generic_reference
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    extra_fields:
      block_type: TrendWaveletAELG
      backbone: AERootBlockLG
      active_g_cfg: per_pass

runs:
  n_runs: 5
  base_seed: 42

output:
  results_dir: experiments/results
  csv_filename: trendwavelet_generic_effectiveness_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0
  worker_id: ""

analysis:
  enabled: true
  ranking: true
