study_name: trendwaveletae_v2_study_m4

dataset: m4
period: Yearly

architecture:
  block_type: [TrendWaveletAE, TrendWaveletAELG]
  repeats: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search_space:
  wavelet_types: [haar, db3, db20, coif2, sym10]
  basis_labels: [eq_fcast, lt_fcast]
  trend_dims: [3]
  latent_dims: [8, 12]

search:
  rounds:
    - max_epochs: 15
      n_runs: 3
      keep_fraction: 0.50
    - max_epochs: 50
      n_runs: 5
      top_k: 10

meta_forecaster:
  enabled: true
  cache_dir: experiments/results/.meta_cache
  training_csvs:
    - experiments/results/m4/unified_benchmark_results.csv
    - experiments/results/m4/block_benchmark_results.csv
    - experiments/results/traffic/block_benchmark_results.csv
    - experiments/results/m4/convergence_study_results_v1.csv
    - experiments/results/weather/convergence_study_results_v1.csv
    - experiments/results/traffic/convergence_study_results_v1.csv

output:
  results_dir: experiments/results
  search_csv_filename: trendwaveletae_v2_study_results.csv
  cross_csv_path: experiments/results/trendwaveletae_v2_cross_dataset_results.csv

hardware:
  accelerator: auto
  num_workers: 0

runs:
  base_seed: 42
