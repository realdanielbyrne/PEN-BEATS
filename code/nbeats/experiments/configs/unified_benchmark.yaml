# ============================================================
# Unified Benchmark — All 16 Configs, Two-Pass Design
# Mirrors run_unified_benchmark.py (H1/H2/H3 hypotheses)
#
# Datasets: M4 (all 6 periods) + Tourism (all 3 periods)
# For Milk see unified_benchmark_milk.yaml (6-stack scaled variant).
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/unified_benchmark.yaml
#   python experiments/run_from_yaml.py experiments/configs/unified_benchmark.yaml \
#       --dataset m4 --periods Yearly --n-runs 3
#   python experiments/run_from_yaml.py experiments/configs/unified_benchmark.yaml \
#       --dataset tourism --max-epochs 100
# ============================================================

experiment_name: unified_benchmark
category: unified_benchmark
description: >
  Two-pass benchmark of 16 architectures testing three hypotheses:
  H1 (basis invariance), H2 (active_g stabilization), H3 (AE efficiency).
  Pass 1 (baseline): active_g=False. Pass 2 (activeG_fcast): active_g=forecast.
  16 configs: 3 paper baselines + 3 AE backbone + 3 novel basis + 7 novel mixed.

dataset: [m4, tourism]
periods: null   # null = all periods for each dataset

# Shared training hyperparameters
training:
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1   # overridden per-config where needed (NBEATS-I uses 3)
  share_weights: true

# Block parameters (defaults; NBEATS-I+G uses trend_thetas_dim: 3)
block_params:
  thetas_dim: 5
  latent_dim: 4
  basis_dim: 128
  trend_thetas_dim: 3   # cubic polynomial for Trend block (paper-faithful)

# No LR scheduler in the original unified benchmark (constant LR throughout)
lr_scheduler: null

# Two-pass design
passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

# ── 16 Unified Configs ────────────────────────────────────────────────────
# Uses builtin references to UNIFIED_CONFIGS in run_unified_benchmark.py
configs:

  # --- Paper Baselines (3) ---
  - name: NBEATS-G
    category: paper_baseline
    stacks: {builtin: NBEATS-G}

  - name: NBEATS-I
    category: paper_baseline
    stacks: {builtin: NBEATS-I}
    n_blocks_per_stack: 3     # 3 blocks per stack (interpretable, paper-faithful)

  - name: NBEATS-I+G
    category: paper_baseline
    stacks: {builtin: NBEATS-I+G}

  # --- Novel Homogeneous — AE Backbone (3) ---
  - name: GenericAE
    category: novel_ae
    stacks: {builtin: GenericAE}

  - name: BottleneckGenericAE
    category: novel_ae
    stacks: {builtin: BottleneckGenericAE}

  - name: AutoEncoder
    category: novel_ae
    stacks: {builtin: AutoEncoder}

  # --- Novel Homogeneous — Basis Alternatives (3) ---
  - name: BottleneckGeneric
    category: novel_basis
    stacks: {builtin: BottleneckGeneric}

  - name: Coif2WaveletV3
    category: novel_basis
    stacks: {builtin: Coif2WaveletV3}

  - name: DB4WaveletV3
    category: novel_basis
    stacks: {builtin: DB4WaveletV3}

  # --- Novel Mixed Stacks (7) ---
  - name: Trend+Coif2WaveletV3
    category: novel_mixed
    stacks: {builtin: Trend+Coif2WaveletV3}

  - name: Trend+DB3WaveletV3
    category: novel_mixed
    stacks: {builtin: Trend+DB3WaveletV3}

  - name: Trend+HaarWaveletV3
    category: novel_mixed
    stacks: {builtin: Trend+HaarWaveletV3}

  - name: Generic+DB3WaveletV3
    category: novel_mixed
    stacks: {builtin: Generic+DB3WaveletV3}

  - name: NBEATS-I+GenericAE
    category: novel_mixed
    stacks: {builtin: NBEATS-I+GenericAE}

  - name: NBEATS-I+BottleneckGeneric
    category: novel_mixed
    stacks: {builtin: NBEATS-I+BottleneckGeneric}

  - name: NBEATS-I-AE
    category: novel_mixed
    stacks: {builtin: NBEATS-I-AE}
    n_blocks_per_stack: 3     # 3 blocks per stack (interpretable variant)

runs:
  n_runs: 10
  base_seed: 42
  seed_mode: sequential

output:
  results_dir: experiments/results
  csv_filename: unified_benchmark_results.csv
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
    group: null
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0
  gpu_id: null

analysis:
  enabled: true
  ranking: true
