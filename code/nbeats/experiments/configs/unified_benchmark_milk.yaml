# ============================================================
# Unified Benchmark — Milk Dataset (6-Stack Scaled Variant)
# Mirrors run_unified_benchmark.py Milk logic (scale_config_for_milk)
#
# All 16 UNIFIED_CONFIGS scaled to 6 stacks per the benchmark rules:
#   - Homogeneous 30-stack → 6 stacks
#   - 2-stack interpretable (NBEATS-I, NBEATS-I-AE) → unchanged
#   - I+G pattern (2+28) → 2+4
#   - Alternating [A,B]*15 → [A,B]*3
#
# Training: max_epochs=500, patience=20, n_runs=100, batch_size=128 (auto)
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/unified_benchmark_milk.yaml
# ============================================================

experiment_name: unified_benchmark_milk
category: unified_benchmark
description: >
  Two-pass benchmark of 16 architectures on the Milk production dataset.
  Configs are scaled down to 6 stacks (from 30) per run_unified_benchmark.py
  scale_config_for_milk() logic. 100 runs per config.

dataset: milk
periods: [Milk]

# Milk-specific training (different epochs/patience from M4 benchmark)
training:
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 500
  patience: 20

block_params:
  thetas_dim: 5
  latent_dim: 4
  basis_dim: 128
  trend_thetas_dim: 3

lr_scheduler: null

passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

configs:

  # --- Paper Baselines (3) ---
  - name: NBEATS-G
    category: paper_baseline
    stacks: {type: homogeneous, block: Generic, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  - name: NBEATS-I
    category: paper_baseline
    stacks:
      - Trend
      - Seasonality
    n_blocks_per_stack: 3
    share_weights: true

  - name: NBEATS-I+G
    category: paper_baseline
    stacks:
      type: prefix_body
      prefix: [Trend, Seasonality]
      body: Generic
      total: 6
    n_blocks_per_stack: 1
    share_weights: true

  # --- Novel Homogeneous — AE Backbone (3) ---
  - name: GenericAE
    category: novel_ae
    stacks: {type: homogeneous, block: GenericAE, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  - name: BottleneckGenericAE
    category: novel_ae
    stacks: {type: homogeneous, block: BottleneckGenericAE, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  - name: AutoEncoder
    category: novel_ae
    stacks: {type: homogeneous, block: AutoEncoder, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  # --- Novel Homogeneous — Basis Alternatives (3) ---
  - name: BottleneckGeneric
    category: novel_basis
    stacks: {type: homogeneous, block: BottleneckGeneric, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  - name: Coif2WaveletV3
    category: novel_basis
    stacks: {type: homogeneous, block: Coif2WaveletV3, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  - name: DB4WaveletV3
    category: novel_basis
    stacks: {type: homogeneous, block: DB4WaveletV3, n: 6}
    n_blocks_per_stack: 1
    share_weights: true

  # --- Novel Mixed Stacks (7) ---
  - name: Trend+Coif2WaveletV3
    category: novel_mixed
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 3}
    n_blocks_per_stack: 1
    share_weights: true

  - name: Trend+DB3WaveletV3
    category: novel_mixed
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 3}
    n_blocks_per_stack: 1
    share_weights: true

  - name: Trend+HaarWaveletV3
    category: novel_mixed
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 3}
    n_blocks_per_stack: 1
    share_weights: true

  - name: Generic+DB3WaveletV3
    category: novel_mixed
    stacks: {type: alternating, blocks: [Generic, DB3WaveletV3], repeats: 3}
    n_blocks_per_stack: 1
    share_weights: true

  - name: NBEATS-I+GenericAE
    category: novel_mixed
    stacks:
      type: prefix_body
      prefix: [Trend, Seasonality]
      body: GenericAE
      total: 6
    n_blocks_per_stack: 1
    share_weights: true

  - name: NBEATS-I+BottleneckGeneric
    category: novel_mixed
    stacks:
      type: prefix_body
      prefix: [Trend, Seasonality]
      body: BottleneckGeneric
      total: 6
    n_blocks_per_stack: 1
    share_weights: true

  - name: NBEATS-I-AE
    category: novel_mixed
    stacks:
      - TrendAE
      - SeasonalityAE
    n_blocks_per_stack: 3
    share_weights: true

runs:
  n_runs: 100
  base_seed: 42
  seed_mode: sequential

output:
  results_dir: experiments/results
  csv_filename: unified_benchmark_milk_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
