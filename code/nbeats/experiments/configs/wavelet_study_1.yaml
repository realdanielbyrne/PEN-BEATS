# ============================================================
# Wavelet Study 1 — Hierarchical Frequency-Band Experiment
# Mirrors run_wavelet_study_1.py
#
# Pilot study testing targeted frequency-band Trend+Wavelet architectures
# using a narrow basis_dim=16 window. Tests three groups:
#   Group B: Trend + targeted wavelet (LF offset=0, MF offset=16)
#   Group C: N-HiTS-style 3-tier hierarchical stacking (stable variant)
#
# Note: Group A configs (offset sweep) were commented out in the original
# script and are excluded here. Group C uses stack_basis_offsets (per-stack
# frequency targeting), which requires basis_offset support in run_from_yaml.py.
# For full Group C fidelity (stack_basis_offsets), use run_wavelet_study_1.py.
#
# Two-pass design: baseline (active_g=False) + activeG_fcast (active_g=forecast)
# Datasets: M4-Yearly (primary), Traffic-96, Weather-96
# Runs: 3 per config per pass per dataset
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/wavelet_study_1.yaml
#   python experiments/run_from_yaml.py experiments/configs/wavelet_study_1.yaml \
#       --dataset traffic --periods Traffic-96
# ============================================================

experiment_name: wavelet_study_1
category: wavelet_study
description: >
  Wavelet frequency-band pilot study using narrow basis_dim=16 window.
  Group B: Trend+Wavelet at LF (offset=0) and MF (offset=16) bands.
  Group C: Stable 3-tier hierarchical architecture (Trend+Wav+Wav)*3 per tier.
  NOTE: basis_offset and stack_basis_offsets are study-specific parameters
  documented here; extend run_from_yaml.py or use run_wavelet_study_1.py
  for full Group C fidelity (per-stack frequency offsets).

dataset: [m4, traffic, weather]
periods: null   # Yearly for M4, Traffic-96 for traffic, Weather-96 for weather

training:
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  thetas_dim: 5
  latent_dim: 4
  basis_dim: 16    # narrow window — key parameter for this study

lr_scheduler: null

extra_csv_columns:
  - basis_dim
  - basis_offset
  - forecast_basis_dim

passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

configs:

  # ── Group B — Trend + targeted frequency band (4 configs) ─────────────
  # Basis offset sweeps Coif2 and DB3 at LF (offset=0) and MF (offset=16)
  # basis_offset is documented in extra_fields; run_from_yaml.py uses basis_dim=16
  # (basis_offset requires run_wavelet_study_1.py for non-zero values)

  - name: Trend+Coif2_LF
    category: group_b
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 10}
    block_params: {basis_dim: 16}
    extra_fields: {basis_dim: 16, basis_offset: 0, forecast_basis_dim: ""}

  - name: Trend+Coif2_MF
    category: group_b
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 10}
    block_params: {basis_dim: 16}
    extra_fields: {basis_dim: 16, basis_offset: 16, forecast_basis_dim: ""}
    # NOTE: basis_offset=16 requires run_wavelet_study_1.py for full fidelity

  - name: Trend+DB3_LF
    category: group_b
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 10}
    block_params: {basis_dim: 16}
    extra_fields: {basis_dim: 16, basis_offset: 0, forecast_basis_dim: ""}

  - name: Trend+DB3_MF
    category: group_b
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 10}
    block_params: {basis_dim: 16}
    extra_fields: {basis_dim: 16, basis_offset: 16, forecast_basis_dim: ""}
    # NOTE: basis_offset=16 requires run_wavelet_study_1.py for full fidelity

  # ── Group C — 3-tier hierarchical (stable variant, 2 configs) ─────────
  # Pattern: [Trend, Wav, Wav] * 3 tiers × 3 repeats/tier = 27 stacks
  # Tier 1: LF (offset=0), Tier 2: MF (offset=16), Tier 3: HF (offset=32)
  # stack_basis_offsets: [0,0,0]*3 + [0,16,16]*3 + [0,32,32]*3
  # NOTE: stack_basis_offsets requires run_wavelet_study_1.py for full fidelity;
  # run_from_yaml.py will run these with default offset=0 (all LF band).

  - name: Coif2_3tier_stable
    category: group_c
    stacks:
      type: concat
      parts:
        - {type: explicit, blocks: [Trend, Coif2WaveletV3, Coif2WaveletV3, Trend, Coif2WaveletV3, Coif2WaveletV3, Trend, Coif2WaveletV3, Coif2WaveletV3]}
        - {type: explicit, blocks: [Trend, Coif2WaveletV3, Coif2WaveletV3, Trend, Coif2WaveletV3, Coif2WaveletV3, Trend, Coif2WaveletV3, Coif2WaveletV3]}
        - {type: explicit, blocks: [Trend, Coif2WaveletV3, Coif2WaveletV3, Trend, Coif2WaveletV3, Coif2WaveletV3, Trend, Coif2WaveletV3, Coif2WaveletV3]}
    block_params: {basis_dim: 16}
    extra_fields: {basis_dim: 16, basis_offset: 0, forecast_basis_dim: ""}
    # stack_basis_offsets: [0,0,0]*3 + [0,16,16]*3 + [0,32,32]*3

  - name: DB3_3tier_stable
    category: group_c
    stacks:
      type: concat
      parts:
        - {type: explicit, blocks: [Trend, DB3WaveletV3, DB3WaveletV3, Trend, DB3WaveletV3, DB3WaveletV3, Trend, DB3WaveletV3, DB3WaveletV3]}
        - {type: explicit, blocks: [Trend, DB3WaveletV3, DB3WaveletV3, Trend, DB3WaveletV3, DB3WaveletV3, Trend, DB3WaveletV3, DB3WaveletV3]}
        - {type: explicit, blocks: [Trend, DB3WaveletV3, DB3WaveletV3, Trend, DB3WaveletV3, DB3WaveletV3, Trend, DB3WaveletV3, DB3WaveletV3]}
    block_params: {basis_dim: 16}
    extra_fields: {basis_dim: 16, basis_offset: 0, forecast_basis_dim: ""}
    # stack_basis_offsets: [0,0,0]*3 + [0,16,16]*3 + [0,32,32]*3

runs:
  n_runs: 3
  base_seed: 42
  seed_mode: sequential

output:
  results_dir: experiments/results
  csv_filename: wavelet_study_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
