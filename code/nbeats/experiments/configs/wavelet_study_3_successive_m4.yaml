# ============================================================
# Wavelet Study 3 — Successive Halving Search (M4-Yearly)
# Mirrors run_wavelet_study_3_successive.py — M4-Yearly variant
#
# Applies successive halving to find the best Trend+WaveletV3 configurations
# across all 14 wavelet families, 4 basis_dim levels, and 2 trend_thetas_dim
# values, with a two-pass design.
#
# Config space: 14 wavelets × 4 basis_dims × 2 ttd = 112 configs per pass
#   Wavelet families: all 14 WaveletV3 variants
#   basis_dim (M4-Yearly, horizon=6, backcast=30):
#     eq_fcast=6, lt_fcast=4, eq_bcast=30, lt_bcast=15
#   trend_thetas_dim: 3, 5
#
# Architecture: [Trend, WaveletV3] * 5 = 10 stacks
#   For Traffic-96 / Weather-96 use wavelet_study_3_successive_traffic.yaml
#   or wavelet_study_3_successive_weather.yaml (20 stacks, 84 configs each)
#
# Successive halving (3 rounds, 3 runs each, keep top 33%):
#   Round 1: 7 epochs,  3 runs/config → meta-forecaster ranking → top 33%
#   Round 2: 15 epochs, 3 runs/config → median val_loss → top 33%
#   Round 3: 50 epochs, 3 runs/config → final validation → top 2
#
# Two-pass design: baseline (active_g=False) + activeG_fcast (active_g=forecast)
# LR scheduler: warmup 15 epochs, then CosineAnnealingLR
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/wavelet_study_3_successive_m4.yaml
# ============================================================

experiment_name: wavelet_study_3_successive
category: wavelet_search
description: >
  Successive halving search across 14 WaveletV3 families, 4 basis_dim levels,
  and 2 trend polynomial degrees. Two-pass design (baseline + active_g=forecast).
  Primary dataset: M4-Yearly. Architecture: [Trend, WaveletV3] * 5 (10 stacks).

dataset: m4
periods: [Yearly]

training:
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  latent_dim: 4
  thetas_dim: 5
  # basis_dim and trend_thetas_dim set per config

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001
  # T_max: null  →  auto = max_epochs - warmup_epochs

passes:
  - name: baseline
    training:
      active_g: false
  - name: activeG_fcast
    training:
      active_g: forecast

extra_csv_columns:
  - search_round
  - basis_dim
  - basis_offset
  - trend_thetas_dim_cfg
  - wavelet_family
  - bd_label
  - active_g_cfg
  - meta_predicted_best
  - meta_convergence_score

