# ── Successive Halving Schedule ───────────────────────────────────────────
search:
  enabled: true
  rounds:
    - max_epochs: 7
      n_runs: 3
      keep_fraction: 0.33
    - max_epochs: 15
      n_runs: 3
      keep_fraction: 0.33
    - max_epochs: 50
      n_runs: 3
      top_k: 2

runs:
  n_runs: 3
  base_seed: 42
  seed_mode: sequential

output:
  results_dir: experiments/results
  csv_filename: wavelet_study_3_successive_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: anon-forecasting-experiments
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
