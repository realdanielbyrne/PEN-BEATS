# wavelet_trendae_comparison.yaml
# TrendAE backbone evaluation: top 10 WaveletV3 configs from wavelet_study_3 × latent_dims=[2,5,8]
# Architecture: [TrendAE, <WaveletV3>] * 5 (10 stacks), M4-Yearly
# Fixed: active_g=False, sum_losses=False, trend_thetas_dim=3 (from study_3 winners)
# Mirrors: experiments/run_wavelet_trendae_comparison.py
# 30 configs total (10 top × 3 latent_dims), 3 runs, seeds=[42,43,44], 50 epochs

experiment_name: wavelet_trendae_comparison
description: >
  Evaluates whether TrendAE backbone improves top WaveletV3 configs from wavelet_study_3.
  Top 10 configs from round 3 × latent_dims=[2,5,8] = 30 total.
  Architecture: [TrendAE, WaveletV3]*5 (10 stacks). M4-Yearly only.
output_csv: wavelet_trendae_comparison_results.csv

dataset: m4
periods:
  - Yearly

runs:
  n_runs: 3
  seeds: [42, 43, 44]

training:
  max_epochs: 50
  patience: 10
  learning_rate: 0.001
  loss: SMAPELoss
  active_g: false
  lr_scheduler:
    warmup_epochs: 15
    eta_min: 0.000001

extra_csv_columns:
  - basis_dim
  - basis_offset
  - trend_thetas_dim_cfg
  - wavelet_family
  - bd_label
  - latent_dim_cfg
  - trend_block

configs:
  - {name: DB20_bd15_lt_bcast_ttd3_ld2, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, DB20WaveletV3], repeats: 5}, block_params: {basis_dim: 15, latent_dim: 2, trend_thetas_dim: 3}, extra_fields: {wavelet_family: DB20WaveletV3, bd_label: lt_bcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 2, trend_block: TrendAE}}
  - {name: DB20_bd15_lt_bcast_ttd3_ld5, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, DB20WaveletV3], repeats: 5}, block_params: {basis_dim: 15, latent_dim: 5, trend_thetas_dim: 3}, extra_fields: {wavelet_family: DB20WaveletV3, bd_label: lt_bcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 5, trend_block: TrendAE}}
  - {name: DB20_bd15_lt_bcast_ttd3_ld8, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, DB20WaveletV3], repeats: 5}, block_params: {basis_dim: 15, latent_dim: 8, trend_thetas_dim: 3}, extra_fields: {wavelet_family: DB20WaveletV3, bd_label: lt_bcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 8, trend_block: TrendAE}}
  - {name: Coif2_bd4_lt_fcast_ttd3_ld2, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, Coif2WaveletV3], repeats: 5}, block_params: {basis_dim: 4, latent_dim: 2, trend_thetas_dim: 3}, extra_fields: {wavelet_family: Coif2WaveletV3, bd_label: lt_fcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 2, trend_block: TrendAE}}
  - {name: Coif2_bd4_lt_fcast_ttd3_ld5, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, Coif2WaveletV3], repeats: 5}, block_params: {basis_dim: 4, latent_dim: 5, trend_thetas_dim: 3}, extra_fields: {wavelet_family: Coif2WaveletV3, bd_label: lt_fcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 5, trend_block: TrendAE}}
  - {name: Coif2_bd4_lt_fcast_ttd3_ld8, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, Coif2WaveletV3], repeats: 5}, block_params: {basis_dim: 4, latent_dim: 8, trend_thetas_dim: 3}, extra_fields: {wavelet_family: Coif2WaveletV3, bd_label: lt_fcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 8, trend_block: TrendAE}}
  - {name: Coif3_bd4_lt_fcast_ttd3_ld2, category: trendae_comparison, stacks: {type: alternating, blocks: [TrendAE, Coif3WaveletV3], repeats: 5}, block_params: {basis_dim: 4, latent_dim: 2, trend_thetas_dim: 3}, extra_fields: {wavelet_family: Coif3WaveletV3, bd_label: lt_fcast, trend_thetas_dim_cfg: 3, latent_dim_cfg: 2, trend_block: TrendAE}}
