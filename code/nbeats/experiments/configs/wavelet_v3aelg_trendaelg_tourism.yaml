study_name: v3aelg_stackheight_sweep_tourism

dataset: tourism
period: Tourism-Yearly

architecture:
  trend_block: TrendAELG

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search_space:
  wavelets:
    - HaarWaveletV3AELG
    - DB2WaveletV3AELG
    - DB3WaveletV3AELG
    - DB4WaveletV3AELG
    - Coif1WaveletV3AELG
    - Coif2WaveletV3AELG
    - Coif3WaveletV3AELG
    - Symlet2WaveletV3AELG
    - Symlet3WaveletV3AELG
  basis_labels: [eq_fcast, lt_fcast, eq_bcast, lt_bcast]
  trend_thetas_dims: [3]
  latent_dim: 32
  repeats: [2, 3, 4, 5]

search:
  rounds:
    - max_epochs: 15
      n_runs: 3
      keep_fraction: 0.5
    - max_epochs: 25
      n_runs: 3
      keep_fraction: 0.5
    - max_epochs: 100
      n_runs: 3
      top_k: 10

meta_forecaster:
  enabled: true
  cache_dir: experiments/results/.meta_cache
  training_csvs:
    # M4
    - experiments/results/m4/unified_benchmark_results.csv
    - experiments/results/m4/block_benchmark_results.csv
    - experiments/results/m4/convergence_study_results_v1.csv
    - experiments/results/m4/trendwaveletae_pure_study_results.csv
    - experiments/results/m4/wavelet_v3ae_study_results.csv
    - experiments/results/m4/lg_vae_study_results.csv
    - experiments/results/m4/vae2_study_results.csv
    - experiments/results/m4/wavelet_v3aelg_trendaelg_study_results.csv
    # Weather
    - experiments/results/weather/convergence_study_results_v1.csv
    - experiments/results/weather/wavelet_study_3_successive_trendae_results.csv
    - experiments/results/weather/vae2_study_results.csv
    - experiments/results/weather/lg_vae_study_results.csv
    # Tourism
    - experiments/results/tourism/wavelet_v3aelg_trendaelg_study_results.csv
    - experiments/results/tourism/trendae_study_results.csv
    # Traffic
    - experiments/results/traffic/lg_vae_study_results.csv

output:
  results_dir: experiments/results
  search_csv_filename: v3aelg_stackheight_sweep_results.csv
  cross_csv_path: experiments/results/v3aelg_stackheight_sweep_cross_dataset_results.csv

hardware:
  accelerator: auto
  num_workers: 0

runs:
  base_seed: 42
