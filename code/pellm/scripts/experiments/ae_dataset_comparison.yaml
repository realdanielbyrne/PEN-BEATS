# Experiment: FineWeb vs WikiText-2 for AE activation caching
#
# Tests whether diverse FineWeb activations improve AE pre-training
# vs narrow WikiText-2, and whether the fc2/fc3 init strategy (svd vs
# algo-specific) interacts with dataset choice and latent dimension.
#
# Grid: 2 datasets × 3 latent dims × 2 mlp modes × 2 inner inits × 5 seeds = 120 runs
# Split into 2 config blocks by dataset for separate activation caches.

experiment:
  name: "ae_dataset_comparison"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true
  local_files_only: true
  pe_mlp_layer_indices: [[15]]
  ae_init: ["pretrained", "cur", "fourier", "svd"]
  ae_latent_dim: [32, 256, 512]
  ae_pretrain_epochs: 5
  ae_pretrain_early_stopping: true
  ae_pretrain_warmup: 2
  ae_pretrain_patience: 3
  ae_cache_num_samples: 10000
  lr: 1.0e-4
  patience: 0
  epochs: 1

configs:
  - name: "wikitext2"
    ae_dataset: "wikitext2"
    ae_cache_dir: "scripts/experiments/results/ae_dataset_comparison/logs/ae_cache_wikitext2"
    pe_mlp_mode: ["ae", "ae_lg"]
    ae_inner_init: ["svd", "match"]
    seed: [42, 123, 456, 789, 1024]

  - name: "fineweb"
    ae_dataset: "fineweb"
    ae_cache_dir: "scripts/experiments/results/ae_dataset_comparison/logs/ae_cache_fineweb"
    pe_mlp_mode: ["ae", "ae_lg"]
    ae_inner_init: ["svd", "match"]
    seed: [42, 123, 456, 789, 1024]
