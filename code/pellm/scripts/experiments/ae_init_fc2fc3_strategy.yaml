# AE Init fc2/fc3 Strategy Comparison
#
# Focused experiment comparing algorithm-specific fc2/fc3 initialization
# strategies (introduced after the prior ae_vs_aelg_layer15_sweep).
#
# Previously all init modes fell back to SVD for the inner bottleneck
# (fc2/fc3). Now each mode uses its own strategy throughout:
#   - pretrained: truncation for fc2/fc3
#   - cur:        CUR leverage-score selection for fc2/fc3
#   - fourier:    Fourier filtering for fc2/fc3
#   - svd:        SVD for fc2/fc3 (unchanged, serves as control)
#
# This sweep isolates the effect of the fc2/fc3 strategy change by
# holding all other variables constant: layer 15, lr=1e-4, latent_dim=512,
# 0 LM fine-tuning epochs (AE pre-training only).
#
# 3 seeds per config for statistical power.
#
# Total configurations: 2 modes × 4 inits × 3 seeds = 24 runs
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_init_fc2fc3_strategy.yaml
#
# Dry run:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_init_fc2fc3_strategy.yaml --dry-run

experiment:
  name: "ae_init_fc2fc3_strategy"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  patience: 3
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true
  local_files_only: true
  pe_mlp_layer_indices: [[15]]
  ae_pretrain_epochs: 10
  ae_pretrain_early_stopping: true
  ae_pretrain_warmup: 3
  ae_pretrain_patience: 5
  lr: 1.0e-4
  ae_latent_dim: 512
  epochs: 0

configs:
  - name: "ae_ld512"
    pe_mlp_mode: ["ae", "ae_lg"]
    ae_init: ["pretrained", "cur", "fourier", "svd"]
    seed: [42, 123, 456]

  - name: "ae_lg_ld512"
    pe_mlp_mode: "ae_lg"
    ae_init: ["pretrained", "cur", "fourier", "svd"]
    seed: [42, 123, 456]
