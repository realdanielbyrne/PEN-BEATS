# AE Init Methods Layer 15 Sweep
#
# Benchmarks all 5 AE initialization strategies on decoder layer 15:
#   pretrained, svd, cur, fourier, random
#
# Uses the same experimental setup as ae_vs_aelg_layer15_sweep but focuses
# on the two new init modes (cur, fourier) and compares them against the
# established baselines (pretrained, svd, random).
#
# Sweeps ae_latent_dim across [128, 256, 384, 512] for both ae and ae_lg modes.
# Uses only lr=1e-4 (previously established as optimal).
#
# Total configurations: 2 modes x 4 latent dims x 5 inits = 40 runs
#
# Analysis goal:
#   Determine whether CUR decomposition (leverage-score row/column selection)
#   or Fourier filtering (FFT denoising of truncated weights) outperforms
#   the current best init (pretrained/truncation) for AE bottleneck MLP.
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_init_methods_layer15_sweep.yaml
#
# Dry run to preview commands:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_init_methods_layer15_sweep.yaml --dry-run

experiment:
  name: "ae_init_methods_layer15_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  patience: 3
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true
  local_files_only: true
  pe_mlp_layer_indices: [[15]]
  ae_pretrain_epochs: 10
  ae_pretrain_early_stopping: true
  ae_pretrain_warmup: 3
  ae_pretrain_patience: 5
  lr: 1.0e-4
  epochs: 0

configs:
  # --- PEBottleneckMLP (ae) — no learned gating ---
  - name: "ae_latent128"
    pe_mlp_mode: "ae"
    ae_latent_dim: 128
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  - name: "ae_latent256"
    pe_mlp_mode: "ae"
    ae_latent_dim: 256
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  - name: "ae_latent384"
    pe_mlp_mode: "ae"
    ae_latent_dim: 384
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  - name: "ae_latent512"
    pe_mlp_mode: "ae"
    ae_latent_dim: 512
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  # --- PEBottleneckMLPLG (ae_lg) — with learned sigmoid gating ---
  - name: "ae_lg_latent128"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 128
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  - name: "ae_lg_latent256"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 256
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  - name: "ae_lg_latent384"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 384
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]

  - name: "ae_lg_latent512"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 512
    ae_init: ["pretrained", "random", "svd", "cur", "fourier"]
