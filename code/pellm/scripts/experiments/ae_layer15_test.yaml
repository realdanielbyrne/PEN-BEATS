# AE MLP Layer 15 Test Experiment
#
# Tests autoencoder MLP replacement on decoder layer 15 only.
# All other layers are frozen (freeze_base + pe_mlp_layer_indices=[15]).
#
# Logging includes:
#   - original_ppl:       vanilla Llama-3.2-1B-Instruct perplexity
#   - baseline_ppl:       after replacing layer 15 MLP with AE, before any training
#   - ae_pretrain_ppl:    after AE reconstruction pre-training, before LM fine-tune
#   - ae_pretrain_stats:  per-epoch MSE loss during AE pre-training
#   - per_epoch_stats:    per-epoch train_loss and val_ppl during LM fine-tuning
#   - final_ppl:          after LM fine-tuning
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_layer15_test.yaml
#
# Dry run to preview commands:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_layer15_test.yaml --dry-run

experiment:
  name: "ae_layer15_test"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false
  wandb_project: "pellm-ae-layer15"
  # Logs  → scripts/experiments/results/ae_layer15_test/logs/
  # Models → trainedmodels/ae_layer15_test/

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-4
  patience: 3
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true

configs:
  - name: "ae_lg_layer15"
    # Replace only the MLP in decoder layer 15 with PEBottleneckMLPLG (AE + gating)
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [[15]]   # list-of-lists → single nargs arg: --pe-mlp-layer-indices 15
    ae_latent_dim: 256
    ae_init: "pretrained"          # initialise AE weights via SVD projection from LlamaMLP

    # Phase 1: AE reconstruction pre-training
    # Teaches the AE to reconstruct the original LlamaMLP output before LM fine-tuning.
    # Logs per-epoch MSE to ae_pretrain_stats and (optionally) wandb.
    ae_pretrain_epochs: 5

    # Phase 2: LM fine-tuning
    # Fine-tune with language modelling objective for 3 epochs after AE pre-training.
    epochs: 0
