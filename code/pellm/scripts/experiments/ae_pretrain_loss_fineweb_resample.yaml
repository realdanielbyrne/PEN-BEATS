experiment:
  name: "ae_pretrain_loss_fineweb_resample"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false
  wandb_project: "pellm-ae-loss-fineweb"

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-4
  patience: 3
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true
  pe_mlp_mode: "ae_lg"
  pe_mlp_layer_indices: [[15]]
  ae_latent_dim: 256
  ae_init: "pretrained"
  ae_pretrain_epochs: 5
  ae_dataset: "fineweb"
  ae_cache_num_samples: 10000
  ae_pretrain_resample: true
  epochs: 0

configs:
  - name: "loss_mse_resample"
    ae_pretrain_loss: "mse"

  - name: "loss_huber_resample"
    ae_pretrain_loss: "huber"
