experiment:
  name: "ae_pretrain_loss_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false
  wandb_project: "pellm-ae-loss-sweep"

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-4
  patience: 3
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true
  pe_mlp_mode: "ae_lg"
  pe_mlp_layer_indices: [[15]]
  ae_latent_dim: 256
  ae_init: "pretrained"
  ae_pretrain_epochs: 5
  epochs: 0

configs:
  - name: "loss_mse"
    ae_pretrain_loss: "mse"

  - name: "loss_cosine"
    ae_pretrain_loss: "cosine"

  - name: "loss_huber"
    ae_pretrain_loss: "huber"

  - name: "loss_soft_kl_t2"
    ae_pretrain_loss: "soft_kl"
    ae_pretrain_loss_temperature: 2.0

  - name: "loss_soft_kl_t4"
    ae_pretrain_loss: "soft_kl"
    ae_pretrain_loss_temperature: 4.0

  - name: "loss_combined_a05"
    ae_pretrain_loss: "combined"
    ae_pretrain_loss_alpha: 0.5

  - name: "loss_combined_a08"
    ae_pretrain_loss: "combined"
    ae_pretrain_loss_alpha: 0.8
