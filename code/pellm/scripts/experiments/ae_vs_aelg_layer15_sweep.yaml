# AE vs AE-LG Layer 15 Sweep
#
# Systematically compares PEBottleneckMLP (ae) and PEBottleneckMLPLG (ae_lg)
# MLP replacement variants on decoder layer 15 only, sweeping ae_latent_dim
# across [32, 64, 128, 256], ae_init across [pretrained, random, svd],
# and lr across [1e-4, 1e-5].
#
# Total configurations: 2 modes × 4 latent dims × 3 init modes × 2 lr = 48 runs
#
# Analysis goal:
#   Determine which combination of pe_mlp_mode (ae vs ae_lg), ae_latent_dim,
#   init strategy, and learning rate achieves the lowest perplexity after AE
#   pre-training, isolating the effectiveness of SVD-based weight initialization
#   and learned gating.
#
# AE pre-training uses early stopping (patience=5) with 3 warmup epochs,
# up to 10 epochs max.
#
# Logging includes:
#   - original_ppl:       vanilla Llama-3.2-1B-Instruct perplexity
#   - baseline_ppl:       after replacing layer 15 MLP with AE, before any training
#   - ae_pretrain_ppl:    after AE reconstruction pre-training completes
#   - ae_pretrain_stats:  per-epoch MSE loss during AE pre-training (list of dicts)
#   - final_ppl:          same as ae_pretrain_ppl since epochs=0
#
# Results:
#   JSON → scripts/experiments/results/ae_vs_aelg_layer15_sweep/logs/
#   CSV  → scripts/experiments/results/ae_vs_aelg_layer15_sweep/logs/
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_vs_aelg_layer15_sweep.yaml
#
# Dry run to preview commands:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/ae_vs_aelg_layer15_sweep.yaml --dry-run

experiment:
  name: "ae_vs_aelg_layer15_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false
  wandb_project: "pellm-ae-vs-aelg-layer15"
  # Logs   → scripts/experiments/results/ae_vs_aelg_layer15_sweep/logs/
  # Models → trainedmodels/ae_vs_aelg_layer15_sweep/

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  patience: 3
  max_length: 512
  max_eval_batches: 50
  pe_attn_mode: "standard"
  freeze_base: true
  local_files_only: true
  pe_mlp_layer_indices: [[15]]
  ae_pretrain_epochs: 10
  ae_pretrain_early_stopping: true
  ae_pretrain_warmup: 3
  ae_pretrain_patience: 10
  epochs: 0

configs:
  # --- PEBottleneckMLP (ae) — no learned gating ---
  - name: "ae_latent32"
    pe_mlp_mode: "ae"
    ae_latent_dim: 32
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  - name: "ae_latent64"
    pe_mlp_mode: "ae"
    ae_latent_dim: 64
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  - name: "ae_latent128"
    pe_mlp_mode: "ae"
    ae_latent_dim: 128
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  - name: "ae_latent256"
    pe_mlp_mode: "ae"
    ae_latent_dim: 256
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  # --- PEBottleneckMLPLG (ae_lg) — with learned sigmoid gating ---
  - name: "ae_lg_latent32"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 32
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  - name: "ae_lg_latent64"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 64
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  - name: "ae_lg_latent128"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 128
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]

  - name: "ae_lg_latent256"
    pe_mlp_mode: "ae_lg"
    ae_latent_dim: 256
    ae_init: ["pretrained", "random", "svd"]
    lr: [1.0e-4, 1.0e-5]
