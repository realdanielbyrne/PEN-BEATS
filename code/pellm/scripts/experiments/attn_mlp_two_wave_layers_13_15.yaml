# Two-wave pipeline: TrendWavelet-LG attention + AE-LG MLP on layers 13-15
#
# Wave 1: Replace attention projections with trend_wavelet_lg (active_g=true),
#          finetune 5 epochs on FineWeb.
# Wave 2: Resume from wave 1, replace MLP with ae_lg (latent_dim=256),
#          AE pretrain 10 epochs (exponential LR decay, warmup 2 epochs),
#          then finetune 5 epochs on FineWeb.
#
# Space-constrained: wave 1 model files are deleted after wave 2 uses them.
#
# Usage:
#   python scripts/run_wave_pipeline.py scripts/experiments/attn_mlp_two_wave_layers_13_15.yaml
#   python scripts/run_wave_pipeline.py scripts/experiments/attn_mlp_two_wave_layers_13_15.yaml --dry-run

pipeline:
  name: "attn_mlp_two_wave_layers_13_15"
  description: "TrendWavelet-LG attention + AE-LG MLP replacement on layers 13-15"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  dataset: "fineweb"
  dataset_num_samples: 50000
  epochs: 5
  lr: 1.0e-3
  patience: 3
  batch_size: 2
  grad_accum_steps: 8
  dtype: "bfloat16"
  freeze_base: true
  seed: 42

waves:
  # Wave 1: TrendWavelet-LG attention on layers 13-15
  - name: "wave1_attn_layers_13_15"
    pe_attn_mode: "trend_wavelet_lg"
    pe_layer_indices: [13, 14, 15]
    pe_mlp_mode: "standard"
    trend_dim: 3
    wavelet_dim: 28
    attn_init: "pretrained"
    active_g_finetune: true
    attn_pretrain_epochs: 0
    ae_pretrain_epochs: 0
    cleanup_intermediate: true

  # Wave 2: AE-LG MLP on layers 13-15 (resume from wave 1 as teacher)
  - name: "wave2_mlp_layers_13_15"
    resume_from: "wave1_attn_layers_13_15"
    pe_attn_mode: "trend_wavelet_lg"
    pe_layer_indices: [13, 14, 15]
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [13, 14, 15]
    ae_latent_dim: 256
    ae_init: "pretrained"
    trend_dim: 3
    wavelet_dim: 28
    attn_init: "pretrained"
    active_g_finetune: true
    # AE pre-training with exponential LR decay
    ae_pretrain_epochs: 10
    ae_pretrain_lr: 0.001
    ae_pretrain_scheduler: "exponential"
    ae_pretrain_lr_warmup: 2
    ae_pretrain_gamma: 0.85
    ae_dataset: "fineweb"
    ae_cache_num_samples: 10000
