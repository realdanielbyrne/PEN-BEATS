# Hybrid Distillation Test: Layer 15 only
#
# Three-wave pipeline comparing hybrid distillation (logit KD + attention pattern KD)
# against baseline approaches for layer 15 replacement.
#
# Wave 1: AE-LG MLP replacement on layer 15 (establishes MLP baseline)
# Wave 2: TrendWavelet-LG attention replacement on layer 15 (resume from wave 1)
#          Uses hybrid distillation: logit KD (alpha=0.5) + attention pattern KD (weight=0.3)
# Wave 3: Polish pass with unfrozen base + hybrid distillation
#
# Usage:
#   python scripts/run_wave_pipeline.py scripts/experiments/hybrid_distill_layer15_test.yaml
#   python scripts/run_wave_pipeline.py scripts/experiments/hybrid_distill_layer15_test.yaml --dry-run

pipeline:
  name: "hybrid_distill_layer15_test"
  description: "Hybrid distillation (logit + attention pattern KD) on layer 15"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  dataset: "fineweb"
  dataset_num_samples: 50000
  epochs: 3
  lr: 1.0e-4
  patience: 3
  batch_size: 3
  grad_accum_steps: 8
  dtype: "bfloat16"
  freeze_base: true
  seed: 42

waves:
  # Wave 1: AE-LG MLP on layer 15
  - name: "wave1_mlp_layer15"
    pe_attn_mode: "standard"
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [15]
    ae_latent_dim: 512
    ae_init: "pretrained"
    active_g_finetune: true
    ae_pretrain_epochs: 5
    ae_pretrain_lr: 0.001
    ae_pretrain_scheduler: "exponential"
    ae_pretrain_lr_warmup: 2
    ae_pretrain_gamma: 0.85
    ae_dataset: "fineweb"
    ae_cache_num_samples: 50000
    cleanup_intermediate: true

  # Wave 2: TrendWavelet-LG attention on layer 15 with hybrid distillation
  - name: "wave2_attn_layer15_hybrid_kd"
    resume_from: "wave1_mlp_layer15"
    pe_attn_mode: "trend_wavelet_lg"
    pe_layer_indices: [15]
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [15]
    ae_latent_dim: 512
    ae_init: "pretrained"
    trend_dim: 3
    wavelet_dim: 28
    attn_init: "pretrained"
    active_g_finetune: true
    attn_pretrain_epochs: 0
    ae_pretrain_epochs: 0
    # Hybrid distillation: logit KD + attention pattern KD
    kd_alpha: 0.5
    kd_temperature: 2.0
    kd_attn_weight: 0.3
    kd_attn_layers: [15]

  # Wave 3: Polish with hybrid distillation and unfrozen base
  - name: "wave3_polish_hybrid_kd"
    resume_from: "wave2_attn_layer15_hybrid_kd"
    pe_attn_mode: "trend_wavelet_lg"
    pe_layer_indices: [15]
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [15]
    ae_latent_dim: 512
    ae_init: "pretrained"
    trend_dim: 3
    wavelet_dim: 28
    attn_init: "pretrained"
    active_g_finetune: true
    attn_pretrain_epochs: 0
    ae_pretrain_epochs: 0
    freeze_base: false
    lr: 1.0e-5
    epochs: 2
    kd_alpha: 0.7
    kd_temperature: 2.0
    kd_attn_weight: 0.1
    kd_attn_layers: [15]

