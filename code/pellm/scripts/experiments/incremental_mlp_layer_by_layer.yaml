# Incremental one-layer-at-a-time MLP replacement, starting from layer 15.
#
# Each wave adds one more layer, using the prior compressed model as the
# AE pre-training teacher (auto-wired via resume_from).  Intermediate
# models and activation caches are deleted automatically to save disk space.
# Only the final wave's model is kept.
#
# --- Configurable knobs ---
#   Number of layers:  Add/remove waves.  N waves = N layers replaced,
#                      always starting from layer 15 and working down.
#                      E.g. 3 waves → layers 15, 14, 13
#                           16 waves → all layers (15 down to 0)
#   ae_pretrain_epochs: per-wave AE pre-training epochs (0 = skip)
#   epochs:            per-wave LM fine-tuning epochs (0 = skip)
#   rotate_ae_samples: true/false — each wave gets a different FineWeb slice
#                      (wave N skips N*ae_cache_num_samples docs).
#                      Set false to reuse the same samples across all waves.
#
# Usage:
#   python scripts/run_wave_pipeline.py scripts/experiments/incremental_mlp_layer_by_layer.yaml
#   python scripts/run_wave_pipeline.py scripts/experiments/incremental_mlp_layer_by_layer.yaml --dry-run

pipeline:
  name: "incremental_mlp_layer_by_layer"
  description: "One-layer-at-a-time AE-LG MLP replacement from layer 15 downward"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false
  rotate_ae_samples: true

defaults:
  pe_attn_mode: "standard"
  pe_mlp_mode: "ae_lg"
  ae_latent_dim: 512
  ae_init: "pretrained"
  ae_pretrain_early_stopping: true
  ae_dataset: "fineweb"
  ae_cache_num_samples: 20000
  dataset: "fineweb"
  dataset_num_samples: 100000
  kd_alpha: 0.5
  kd_temperature: 2.0
  patience: 3
  batch_size: 2
  grad_accum_steps: 8
  dtype: "bfloat16"
  freeze_base: true
  seed: 42
  cleanup_intermediate: true

waves:
  # Wave 1: Replace layer 15 MLP — AE pre-train only, no fine-tuning
  - name: "wave1_layer_15"
    pe_mlp_layer_indices: [15]
    ae_pretrain_epochs: 5
    epochs: 0

  # Wave 2: Add layer 14 — AE pre-train only (teacher = wave1 compressed model)
  - name: "wave2_layers_14_15"
    resume_from: "wave1_layer_15"
    pe_mlp_layer_indices: [14, 15]
    ae_pretrain_epochs: 5
    epochs: 0

  # Wave 3: Add layer 13 — AE pre-train + fine-tune all replaced layers (13-15)
  - name: "wave3_layers_13_15"
    resume_from: "wave2_layers_14_15"
    pe_mlp_layer_indices: [13, 14, 15]
    ae_pretrain_epochs: 5
    epochs: 5
    lr: 1.0e-4
