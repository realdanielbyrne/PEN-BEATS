# Layer 14/15 AE Strategy Sweep
#
# Goal:
#   Run the supported parallel Layer 14/15 sweep across all PE bottleneck MLP
#   families with 5 seeded replicates per configuration.
#
# Manual sequential recipe:
#   The staged sequential comparison remains manual-only because
#   scripts/run_from_yaml.py does not execute nested staged runs.
#   Use two direct finetune.py commands per PE MLP mode (ae, ae_lg, vae,
#   vae_lg) and per seed (42, 123, 456, 789, 1024):
#     stage 1: --pe-mlp-layer-indices 15
#     stage 2: --resume-from <stage1 output> --pe-mlp-layer-indices 14 15
#
# Fixed hyperparameters below are taken from the single best prior completed run
# across all CSV logs under scripts/experiments/results/:
#   scripts/experiments/results/ae_dataset_comparison/logs/ae_dataset_comparison_log.csv
#   run_id = ae_dataset_comparison_wikitext2_003
#   final_ppl = 15.373023609708364
#
# Why this run:
#   It has the lowest recorded final_ppl of any prior run, so its settings are
#   used unchanged as the sweep defaults here.
#
# AE caching / isolation verification:
#   finetune.py already uses a two-phase AE pre-training path:
#   Phase 1: extract teacher activations from a separate frozen teacher model
#            into layer-specific files named layer{idx}_batch{step}.pt
#   Phase 2: train each AE layer independently from its own cached files
#
# This means the required isolation DOES hold for AE pre-training itself:
#   - parallel: layer 14 and layer 15 caches are extracted independently from the
#     frozen teacher, then each AE trains from its own cache files
#   - sequential stage 2: if layer 14 were successfully added to the PE model,
#     layer 14 cache extraction would still come from the frozen teacher rather
#     than flowing through layer 15's AE
#
# Orchestrator note:
#   scripts/run_from_yaml.py currently launches one finetune.py process per
#   config and correctly handles the supported parallel grid below.

experiment:
  name: "layer14_15_ae_strategy_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  # Fixed from best prior run: ae_dataset_comparison_wikitext2_003
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  pe_attn_mode: "standard"
  pe_mlp_mode: ["ae", "ae_lg", "vae", "vae_lg"]
  ae_init: "pretrained"
  ae_inner_init: "svd"
  ae_latent_dim: 512
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-4
  epochs: 1
  patience: 0
  max_length: 512
  max_eval_batches: 50
  freeze_base: true
  local_files_only: true
  ae_dataset: "wikitext103"
  ae_cache_num_samples: 10000
  ae_pretrain_epochs: 5
  ae_pretrain_early_stopping: true
  ae_pretrain_warmup: 2
  ae_pretrain_patience: 3
  seed: [42, 123, 456, 789, 1024]
  # Kept here to document the desired finetune.py flag; run_from_yaml.py writes
  # its own CSV and does not currently forward log_csv through to finetune.py.
  log_csv: "scripts/experiments/results/layer14_15_ae_strategy_sweep/results.csv"

configs:
  - name: "parallel_layer14_15"
    # 4 PE MLP families x 5 seeds = 20 total runs.
    pe_mlp_layer_indices: [[14, 15]]
    output_dir: "trainedmodels/layer14_15_ae_strategy_sweep/parallel_layer14_15"
