# Two-wave pipeline: AE-LG MLP first + TrendWavelet-LG attention on layers 14-15
# (Reverse of attn_mlp_two_wave_layers_14_15)
#
# Wave 1: Replace MLP with ae_lg (latent_dim=256), AE pretrain 5 epochs,
#          finetune 5 epochs on FineWeb. Intermediate model deleted after wave 2.
# Wave 2: Resume from wave 1, replace attention with trend_wavelet_lg (active_g=true),
#          no attention pre-training — rely on fine-tuning only. Final model saved.
#
# Usage:
#   python scripts/run_wave_pipeline.py scripts/experiments/mlp_attn_two_wave_layers_14_15.yaml
#   python scripts/run_wave_pipeline.py scripts/experiments/mlp_attn_two_wave_layers_14_15.yaml --dry-run

pipeline:
  name: "mlp_attn_two_wave_layers_14_15"
  description: "AE-LG MLP + TrendWavelet-LG attention replacement on layers 14-15 (MLP first)"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: false

defaults:
  dataset: "fineweb"
  dataset_num_samples: 50000
  epochs: 1
  lr: 1.0e-4
  patience: 3
  batch_size: 3
  grad_accum_steps: 8
  dtype: "bfloat16"
  freeze_base: true
  seed: 42

waves:
  # Wave 1: AE-LG MLP on layers 14-15
  - name: "wave1_mlp_layers_14_15"
    pe_attn_mode: "standard"
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [14, 15]
    ae_latent_dim: 512
    ae_init: "pretrained"
    active_g_finetune: true
    # AE pre-training: 5 epochs with exponential LR decay
    ae_pretrain_epochs: 5
    ae_pretrain_lr: 0.001
    ae_pretrain_scheduler: "exponential"
    ae_pretrain_lr_warmup: 2
    ae_pretrain_gamma: 0.85
    ae_dataset: "fineweb"
    ae_cache_num_samples: 50000
    cleanup_intermediate: true

  # Wave 2: TrendWavelet-LG attention on layers 14-15 (resume from wave 1)
  - name: "wave2_attn_layers_14_15"
    resume_from: "wave1_mlp_layers_14_15"
    pe_attn_mode: "trend_wavelet_lg"
    pe_layer_indices: [14, 15]
    pe_mlp_mode: "ae_lg"
    pe_mlp_layer_indices: [14, 15]
    ae_latent_dim: 512
    ae_init: "pretrained"
    trend_dim: 3
    wavelet_dim: 28
    attn_init: "pretrained"
    active_g_finetune: true
    attn_pretrain_epochs: 0
    ae_pretrain_epochs: 0
