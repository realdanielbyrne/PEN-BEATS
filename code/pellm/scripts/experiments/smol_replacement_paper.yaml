# ---------------------------------------------------------------------------
# TrendWavelet-no-postLN attention sweep. Each variant uses the
# `trend_wavelet_no_postln` attention mode: TrendWaveletLinear q/k/v/o
# projections plus a post_attention_layernorm bypass on every PE attn
# layer (the post-attention residual stream feeds directly into the MLP).
# MLP varies across {standard, ae(ld=512), tw_root_fc_post_fc}. All three
# variants use the shared `tiered_db3_64_offsets` schedule, which drives
# both the attention TW basis and (for the third variant) the MLP TW
# basis simultaneously, since `per_layer_offsets` is consumed by both
# paths. Held constant: trend_dim=4, wavelet_dim=64, wavelet_type=db3,
# active_g=true. Compare against the matching `trend_wavelet`-attn
# variants (`trendwavelet_db3_64_silu`, AE+TW siblings, and
# `tw_root_fc_post_fc_db3_64_tiered_silu`) to isolate the LN-bypass effect.
# ---------------------------------------------------------------------------
  tw_noln_db3_64_tiered_fr_silu:
    # params: 112,673,088 | -16.2% vs baseline
    # Same param count as trendwavelet_db3_64_silu / trendwavelet_sym10_64_tiered_silu
    # (the LN-bypass does not change the parameter count — RMSNorm modules remain
    # constructed; they are simply skipped in forward()).
    pe_attn_mode: "trend_wavelet_no_postln"
    pe_mlp_mode: "standard"
    trend_dim: 4
    wavelet_dim: 64
    wavelet_type: "db3"
    per_layer_offsets: *tiered_64_fullrange_offsets
    active_g: true

  tw_noln_ae_mlp_512_db3_128_tiered_fr_silu:
    # params: 51,897,408 | -61.4% vs baseline
    # Matches ae_tw_sym10_64_tiered's param count (TW-attn + AE-MLP@512 has
    # the same parameter footprint regardless of wavelet family or LN-bypass).
    pe_attn_mode: "trend_wavelet_no_postln"
    pe_mlp_mode: "ae"
    ae_latent_dim: 512
    trend_dim: 3
    wavelet_dim: 128
    wavelet_type: "db3"
    per_layer_offsets: *tiered_64_fullrange_offsets
    active_g: true

  tw_noln_tw_root_fc_db3_128_tiered_silu:
    # params: 44,192,448 | -67.1% vs baseline
    # Matches tw_root_fc_tw_db3_64_silu's param count. Smallest of the three
    # new variants; pairs the no-postLN TW attention with the canonical
    # RootBlock MLP (pre-FC + frozen TW basis).
    pe_attn_mode: "trend_wavelet_no_postln"
    pe_mlp_mode: "tw_root_fc"
    trend_dim: 3
    wavelet_dim: 128
    wavelet_type: "db3"
    per_layer_offsets: *tiered_64_fullrange_offsets
    active_g: true
    mlp_active_g: true
