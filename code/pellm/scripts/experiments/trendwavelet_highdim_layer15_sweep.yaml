# TrendWavelet High-Dimension Attention Layer 15 Sweep
#
# Tests whether larger wavelet_dim (64, 128, 256) improves TrendWavelet
# initialization quality and training convergence. Also sweeps active_g
# (SiLU on TrendWavelet output) independently for pre-training and
# fine-tuning phases.
#
# Sweep axes:
#   - pe_attn_mode: trend_wavelet, trend_wavelet_generic,
#                   trend_wavelet_lg, trend_wavelet_generic_lg
#   - wavelet_dim: 64, 128, 256
#   - attn_init: lstsq, svd, fourier, pretrained, random
#   - active_g_pretrain: true, false
#   - active_g_finetune: true, false
#
# Fixed: db3 only, layer 15 only, no CUR
#
# Total configurations: 4 modes x 3 dims x 5 inits x 2 x 2 = 240 runs
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_highdim_layer15_sweep.yaml
#
# Dry run to preview commands:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_highdim_layer15_sweep.yaml --dry-run

experiment:
  name: "trendwavelet_highdim_layer15_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: true
  wandb_project: "pellm-trendwavelet-highdim-layer15"
  save_model: false

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  pe_mlp_mode: "standard"
  pe_layer_indices: [[15]]
  pe_projections: ["q_proj", "k_proj", "v_proj", "o_proj"]
  trend_dim: 3
  wavelet_type: "db3"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-3
  patience: 2
  max_length: 512
  max_eval_batches: 50
  freeze_base: true
  attn_pretrain_epochs: 10
  attn_pretrain_early_stopping: true
  attn_pretrain_warmup: 2
  attn_pretrain_patience: 3
  attn_dataset: "wikitext2"
  dataset: "wikitext2"
  epochs: 1
  local_files_only: true

configs:
  - name: "trend_wavelet"
    pe_attn_mode: "trend_wavelet"
    wavelet_dim: [64, 128, 256]
    attn_init: ["lstsq", "svd", "fourier", "pretrained", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

  - name: "trend_wavelet_generic"
    pe_attn_mode: "trend_wavelet_generic"
    wavelet_dim: [64, 128, 256]
    attn_init: ["lstsq", "svd", "fourier", "pretrained", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

  - name: "trend_wavelet_lg"
    pe_attn_mode: "trend_wavelet_lg"
    wavelet_dim: [64, 128, 256]
    attn_init: ["lstsq", "svd", "fourier", "pretrained", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

  - name: "trend_wavelet_generic_lg"
    pe_attn_mode: "trend_wavelet_generic_lg"
    wavelet_dim: [64, 128, 256]
    attn_init: ["lstsq", "svd", "fourier", "pretrained", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]
