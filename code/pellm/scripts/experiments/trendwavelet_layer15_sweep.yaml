# TrendWavelet Attention Layer 15 Sweep
#
# Systematically benchmarks TrendWavelet attention projection replacements on
# decoder layer 15 only, while keeping all MLP layers standard.
#
# Sweep axes:
#   - pe_attn_mode: trend_wavelet, trend_wavelet_generic,
#                   trend_wavelet_lg, trend_wavelet_generic_lg
#   - wavelet_dim: 16, 28, 40
#   - wavelet_type: haar, db3, sym10
#   - attn_init: pretrained, lstsq, svd, cur, fourier, random
#
# Fixed setup:
#   - Base model: meta-llama/Llama-3.2-1B-Instruct
#   - Target layer: decoder layer 15 only
#   - Target projections: q_proj, k_proj, v_proj, o_proj
#   - Attention pre-training: 5 epochs on cached WikiText-2 teacher activations
#   - LM fine-tuning: 1 epoch on WikiText-2
#
# Cache note:
#   Attention pre-training currently materializes teacher activations to .pt
#   files on disk. That is manageable for WikiText-2 but can explode for much
#   larger corpora. If this experiment is moved back to a larger dataset such
#   as WikiText-103, refactor the attention pre-training path to use chunked or
#   streaming pre-training instead of caching the full teacher corpus to .pt
#   files first.
#
# Total configurations: 4 modes x 3 wavelet dims x 3 wavelet types x 6 init modes = 216 runs
#
# Results:
#   JSON -> scripts/experiments/results/trendwavelet_layer15_sweep/logs/
#   CSV  -> scripts/experiments/results/trendwavelet_layer15_sweep/logs/
#   Models -> trainedmodels/trendwavelet_layer15_sweep/
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_layer15_sweep.yaml
#
# Dry run to preview commands:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_layer15_sweep.yaml --dry-run

experiment:
  name: "trendwavelet_layer15_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: true
  wandb_project: "pellm-trendwavelet-layer15"

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  pe_mlp_mode: "standard"
  pe_layer_indices: [[15]]
  pe_projections: ["q_proj", "k_proj", "v_proj", "o_proj"]
  trend_dim: 3
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-4
  patience: 2
  max_length: 512
  max_eval_batches: 50
  freeze_base: true
  attn_pretrain_epochs: 5
  attn_pretrain_early_stopping: true
  attn_pretrain_warmup: 2
  attn_pretrain_patience: 3
  attn_dataset: "wikitext2"
  dataset: "wikitext2"
  epochs: 1
  local_files_only: true

configs:
  - name: "trend_wavelet"
    pe_attn_mode: "trend_wavelet"
    wavelet_dim: [16, 28, 40]
    wavelet_type: ["haar", "db3", "sym10"]
    attn_init: ["pretrained", "lstsq", "svd", "cur", "fourier", "random"]

  - name: "trend_wavelet_generic"
    pe_attn_mode: "trend_wavelet_generic"
    wavelet_dim: [16, 28, 40]
    wavelet_type: ["haar", "db3", "sym10"]
    attn_init: ["pretrained", "lstsq", "svd", "cur", "fourier", "random"]

  - name: "trend_wavelet_lg"
    pe_attn_mode: "trend_wavelet_lg"
    wavelet_dim: [16, 28, 40]
    wavelet_type: ["haar", "db3", "sym10"]
    attn_init: ["pretrained", "lstsq", "svd", "cur", "fourier", "random"]

  - name: "trend_wavelet_generic_lg"
    pe_attn_mode: "trend_wavelet_generic_lg"
    wavelet_dim: [16, 28, 40]
    wavelet_type: ["haar", "db3", "sym10"]
    attn_init: ["pretrained", "lstsq", "svd", "cur", "fourier", "random"]
