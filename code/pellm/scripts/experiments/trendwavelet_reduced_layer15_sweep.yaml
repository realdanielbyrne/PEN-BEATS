# Reduced TrendWavelet Attention Layer 15 Sweep
#
# Benchmarks the four reduced TrendWavelet attention modes on decoder layer 15.
# Reduced modes add a learned dimensionality-reduction stage (SiLU-activated
# nn.Linear) before the TrendWavelet basis expansion, controlled by
# `reduction_dim`.  LG variants additionally add a per-dimension sigmoid gate
# on the coefficient vector.
#
# Sweep axes:
#   - pe_attn_mode: trend_wavelet_reduced, trend_wavelet_lg_reduced,
#                   trend_wavelet_generic_reduced, trend_wavelet_generic_lg_reduced
#   - reduction_dim: 128, 256, 512
#   - wavelet_dim: 28, 64, 128
#   - attn_init: pretrained, lstsq, svd, fourier, random
#   - active_g_pretrain: true, false
#   - active_g_finetune: true, false
#
# Fixed: db3 only, layer 15 only, trend_dim=3, generic_dim=5
#
# Total configurations:
#   4 modes x 3 reduction_dims x 3 wavelet_dims x 5 inits x 2 x 2 = 720 runs
#
# Results:
#   JSON -> scripts/experiments/results/trendwavelet_reduced_layer15_sweep/logs/
#   CSV  -> scripts/experiments/results/trendwavelet_reduced_layer15_sweep/logs/
#   Models -> trainedmodels/trendwavelet_reduced_layer15_sweep/
#
# Run with:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_reduced_layer15_sweep.yaml
#
# GPU 0, worker w0a:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_reduced_layer15_sweep.yaml --gpu-id 0 --worker-id w0a
#
# GPU 1, worker w1a:
#   PYTORCH_ALLOC_CONF=expandable_segments:True \
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_reduced_layer15_sweep.yaml --gpu-id 1 --worker-id w1a
#
# Dry run to preview commands:
#   .venv/bin/python scripts/run_from_yaml.py scripts/experiments/trendwavelet_reduced_layer15_sweep.yaml --dry-run

experiment:
  name: "trendwavelet_reduced_layer15_sweep"
  python: ".venv/bin/python"
  env:
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
  wandb: true
  wandb_project: "pellm-trendwavelet-reduced-layer15"
  save_model: false

defaults:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  pe_mlp_mode: "standard"
  pe_layer_indices: [[15]]
  pe_projections: ["q_proj", "k_proj", "v_proj", "o_proj"]
  trend_dim: 3
  generic_dim: 5
  wavelet_type: "db3"
  dtype: "bfloat16"
  batch_size: 2
  grad_accum_steps: 8
  lr: 1.0e-3
  patience: 2
  max_length: 512
  max_eval_batches: 50
  freeze_base: true
  attn_pretrain_epochs: 10
  attn_pretrain_early_stopping: true
  attn_pretrain_warmup: 2
  attn_pretrain_patience: 3
  attn_dataset: "wikitext2"
  dataset: "wikitext2"
  epochs: 1
  local_files_only: true

configs:
  - name: "trend_wavelet_reduced"
    pe_attn_mode: "trend_wavelet_reduced"
    reduction_dim: [128, 256, 512]
    wavelet_dim: [28, 64, 128]
    attn_init: ["pretrained", "lstsq", "svd", "fourier", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

  - name: "trend_wavelet_lg_reduced"
    pe_attn_mode: "trend_wavelet_lg_reduced"
    reduction_dim: [128, 256, 512]
    wavelet_dim: [28, 64, 128]
    attn_init: ["pretrained", "lstsq", "svd", "fourier", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

  - name: "trend_wavelet_generic_reduced"
    pe_attn_mode: "trend_wavelet_generic_reduced"
    reduction_dim: [128, 256, 512]
    wavelet_dim: [28, 64, 128]
    attn_init: ["pretrained", "lstsq", "svd", "fourier", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

  - name: "trend_wavelet_generic_lg_reduced"
    pe_attn_mode: "trend_wavelet_generic_lg_reduced"
    reduction_dim: [128, 256, 512]
    wavelet_dim: [28, 64, 128]
    attn_init: ["pretrained", "lstsq", "svd", "fourier", "random"]
    active_g_pretrain: [true, false]
    active_g_finetune: [true, false]

