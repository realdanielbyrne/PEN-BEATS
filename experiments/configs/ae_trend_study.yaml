# ae_trend_study.yaml
# Successive halving search: Trend + AE alternating stacks on M4-Yearly and Tourism-Yearly
# Architecture: [Trend, AE_variant] * 5 (10 stacks), 6 AE variants
# Search: latent_dim=[2,8,16], thetas_dim=[5,10](bottleneck), active_g=[False,forecast](Generic-type)
#         trend_thetas_dim=[3,5]
# ROOTBLOCK variants (AutoEncoder, GenericAEBackcast): latent_dim maps to thetas_dim
# Rounds: 7/15/30 epochs, keep 33%, top_k=2 final
# Mirrors: experiments/run_ae_trend_study.py
# 90 configs total

experiment_name: ae_trend_study
description: >
  Successive halving search for best Trend+AE alternating architecture.
  6 AE variants × latent/thetas/active_g/trend_thetas_dim search space = 90 configs.
  Architecture: [Trend, AE]*5 (10 stacks). Datasets: M4-Yearly + Tourism-Yearly.
output_csv: ae_trend_search_results.csv

dataset: [m4, tourism]
periods:
  - Yearly
  - Tourism-Yearly

runs:
  n_runs: 3
  base_seed: 42

training:
  max_epochs: 30
  patience: 10
  learning_rate: 0.001
  loss: SMAPELoss
  n_blocks_per_stack: 1
  share_weights: true
  lr_scheduler:
    warmup_epochs: 15
    eta_min: 0.000001

search:
  enabled: true
  rounds:
    - {max_epochs: 7,  n_runs: 3, keep_fraction: 0.33, top_k: null}
    - {max_epochs: 15, n_runs: 3, keep_fraction: 0.33, top_k: null}
    - {max_epochs: 30, n_runs: 3, keep_fraction: 0.33, top_k: 2}

extra_csv_columns:
  - search_round
  - arch_pattern
  - ae_variant
  - latent_dim_cfg
  - thetas_dim_cfg
  - trend_thetas_dim_cfg
  - meta_predicted_best
  - meta_convergence_score

configs:
  - {name: AutoEncoder_ld2_td5_ttd3_ag0, category: ae_search, stacks: {type: alternating, blocks: [Trend, AutoEncoder], repeats: 5}, block_params: {thetas_dim: 2, latent_dim: 4, trend_thetas_dim: 3}, training: {active_g: false}, extra_fields: {ae_variant: AutoEncoder, arch_pattern: trend_ae_alternating, latent_dim_cfg: 2, thetas_dim_cfg: 5, trend_thetas_dim_cfg: 3}}
  - {name: AutoEncoder_ld2_td5_ttd5_ag0, category: ae_search, stacks: {type: alternating, blocks: [Trend, AutoEncoder], repeats: 5}, block_params: {thetas_dim: 2, latent_dim: 4, trend_thetas_dim: 5}, training: {active_g: false}, extra_fields: {ae_variant: AutoEncoder, arch_pattern: trend_ae_alternating, latent_dim_cfg: 2, thetas_dim_cfg: 5, trend_thetas_dim_cfg: 5}}
