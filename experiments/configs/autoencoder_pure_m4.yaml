# ============================================================
# AutoEncoder Pure-Stack Study on M4
# Tests AutoEncoder, AutoEncoderAE, and AutoEncoderAELG variants
#
# Stack depth: 10 (sub-1M parameter budget)
# active_g: false, true
# Latent dims: ld=32 for AE/AAE, ld=16 for AELG
# LR Scheduler: ReduceLROnPlateau
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/autoencoder_pure_m4.yaml
#   python experiments/run_from_yaml.py experiments/configs/autoencoder_pure_m4.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/autoencoder_pure_m4.yaml --max-epochs 50 --periods Yearly
# ============================================================

experiment_name: autoencoder_pure_m4
category: ae_pure_study
description: >
  Pure stacks of AutoEncoder (ld=32), AutoEncoderAE (ld=32), and AutoEncoderAELG (ld=16)
  on M4 all periods. Tests active_g (false, true) with ReduceLROnPlateau scheduler
  at 10-stack depth for sub-1M parameter regime.

dataset: m4
periods:
  - Yearly


# Global training defaults
training:
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  max_epochs: 100
  patience: 15

block_params:
  basis_dim: 128

# ReduceLROnPlateau scheduler with early stopping integration
lr_scheduler:
  type: plateau
  factor: 0.5
  patience: 10
  min_lr: 0.00001
  mode: min
  cooldown: 0
  monitor: val_loss
  interval: epoch
  frequency: 1

# Extra CSV columns for tracking
extra_csv_columns:
  - block_type_cfg
  - latent_dim_cfg
  - active_g_cfg

# --- Pure stacks of 10 blocks ---
# 6 total configs: 3 block types × 2 active_g settings
configs:
  # AutoEncoder (ld=32, ag=false)
  - name: AE_10s_ld32_ag0
    stacks:
      type: homogeneous
      block: AutoEncoder
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: false
    extra_fields:
      block_type_cfg: AutoEncoder
      latent_dim_cfg: 32
      active_g_cfg: false

  # AutoEncoder (ld=32, ag=true)
  - name: AE_10s_ld32_ag1
    stacks:
      type: homogeneous
      block: AutoEncoder
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: true
    extra_fields:
      block_type_cfg: AutoEncoder
      latent_dim_cfg: 32
      active_g_cfg: true

  # AutoEncoderAE (ld=32, ag=false)
  - name: AAE_10s_ld32_ag0
    stacks:
      type: homogeneous
      block: AutoEncoderAE
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: false
    extra_fields:
      block_type_cfg: AutoEncoderAE
      latent_dim_cfg: 32
      active_g_cfg: false

  # AutoEncoderAE (ld=32, ag=true)
  - name: AAE_10s_ld32_ag1
    stacks:
      type: homogeneous
      block: AutoEncoderAE
      n: 10
    block_params:
      latent_dim: 32
      thetas_dim: 5
    training:
      active_g: true
    extra_fields:
      block_type_cfg: AutoEncoderAE
      latent_dim_cfg: 32
      active_g_cfg: true

  # AutoEncoderAELG (ld=16, ag=false)
  - name: AELG_10s_ld16_ag0
    stacks:
      type: homogeneous
      block: AutoEncoderAELG
      n: 10
    block_params:
      latent_dim: 16
      thetas_dim: 5
    training:
      active_g: false
    extra_fields:
      block_type_cfg: AutoEncoderAELG
      latent_dim_cfg: 16
      active_g_cfg: false

  # AutoEncoderAELG (ld=16, ag=true)
  - name: AELG_10s_ld16_ag1
    stacks:
      type: homogeneous
      block: AutoEncoderAELG
      n: 10
    block_params:
      latent_dim: 16
      thetas_dim: 5
    training:
      active_g: true
    extra_fields:
      block_type_cfg: AutoEncoderAELG
      latent_dim_cfg: 16
      active_g_cfg: true
