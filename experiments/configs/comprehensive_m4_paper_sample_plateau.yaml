# ============================================================
# Comprehensive M4 Paper Sample — ReduceLROnPlateau Variant
#
# Combines all 68 configs from:
#   * comprehensive_m4_paper_sample.yaml (53 configs)
#   * comprehensive_m4_paper_sample_sym10_fills.yaml (15 configs)
#
# Training protocol matches the original paper-sampling variant
# (nbeats_paper, batch_size=1024, max_steps=100000) but replaces
# the MultiStepLR scheduler with ReduceLROnPlateau on a val-check
# cadence (interval=step, frequency=100 to match val_check_interval):
#   * factor: 0.75   -> LR drops by 25 % each trigger
#   * patience: 3    -> trigger only after 3 val checks with no improvement
#                       (val-check units; filters single-check noise)
#   * cooldown: 0    -> resume monitoring immediately after reduction
#   * min_lr: 1e-6
#
# Rationale: under nbeats_paper sampling, Monthly runs early-stop after
# ~5 Lightning epochs (~4600 steps / ~46 val checks), with best val_loss
# at val check ~30. Per-epoch plateau triggers 0-2 times before
# EarlyStopping fires; per-val-check plateau gets ~30-50 opportunities.
# patience=3 yields ~3-6 actual drops per run; cumulative decay 0.75^4
# ~= 0.32 mirrors the original epoch-cadence "25% per epoch" intent
# without collapsing the LR to min_lr mid-run.
#
# Currently restricted to Monthly only for initial validation.
# Extend `periods` to run other M4 horizons.
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/comprehensive_m4_paper_sample_plateau.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/comprehensive_m4_paper_sample_plateau.yaml
# ============================================================

experiment_name: comprehensive_m4_paper_sample_plateau
category: comprehensive_sweep
description: >
  Combined configs from comprehensive_m4_paper_sample and
  comprehensive_m4_paper_sample_sym10_fills. Monthly-only with
  ReduceLROnPlateau scheduler (factor=0.75, patience=0).
dataset: m4
periods:
- Yearly
- Quarterly
- Monthly
- Weekly
- Daily
- Hourly
protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Yearly: 1.5
    Quarterly: 1.5
    Monthly: 10
    Weekly: 10
    Daily: 10
    Hourly: 10
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024
lr_scheduler:
  type: plateau
  factor: 0.75
  patience: 2
  cooldown: 1
  min_lr: 1.0e-06
  mode: min
  monitor: val_loss
  # Step the scheduler on the same cadence as validation (every 100 steps),
  # not once per Lightning epoch (1000 steps). Under nbeats_paper sampling
  # most Monthly runs early-stop after ~5 Lightning epochs (~46 val checks);
  # epoch-cadence plateau gets 0-2 trigger opportunities, step-cadence
  # gives ~30-50, matching the val_check_interval signal that also drives
  # EarlyStopping.
  #
  # patience=3 (in val-check units) only fires on a sustained plateau,
  # filtering single-check val_loss noise. Expected ~3-6 actual drops per
  # run -> cumulative decay 0.75^4 ~= 0.32, comparable to the old epoch-
  # cadence "25% per epoch" intent. Use patience=0 only if you want LR
  # to collapse to min_lr mid-run (warmup -> finetune behavior).
  interval: step
  frequency: 100
block_params:
  wavelet_type: db3
runs:
  n_runs: 10
  seed_mode: random
output:
  results_dir: experiments/results
  csv_filename: comprehensive_m4_paper_sample_plateau_results.csv
  save_predictions: false
logging:
  wandb:
    enabled: true
    project: nbeats-lightning
  tensorboard: false
hardware:
  accelerator: auto
  num_workers: 0
  pin_memory: true
analysis:
  enabled: true
  ranking: true
extra_csv_columns:
- arch_family
- block_type_primary
- backbone
- stack_pattern
- n_stacks
- wavelet_family
- basis_dim_label
- latent_dim_cfg
- trend_thetas_dim_cfg
- skip_distance_cfg
- active_g_cfg
- kl_weight_cfg
- share_weights_cfg
