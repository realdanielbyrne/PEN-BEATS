# lg_vae_study_large.yaml
# LG/VAE block successive halving search — Large datasets (16 stacks)
# Datasets: tourism, traffic, weather — all share 16-stack architecture
# Same 19 configs as lg_vae_study_m4 but with 16 stacks (8 repeats for alternating)
# Mirrors: experiments/run_lg_vae_study.py (dataset=tourism/weather/traffic)

experiment_name: lg_vae_study
description: >
  LG/VAE backbone successive halving on Tourism/Traffic/Weather (16 stacks each).
  19 configs × 2 passes. Same block families as m4 variant but larger stack depth.
output_csv: lg_vae_study_results.csv

dataset: [tourism, traffic, weather]
periods:
  - Tourism-Yearly
  - Traffic-96
  - Weather-96

runs:
  n_runs: 3
  base_seed: 42

training:
  max_epochs: 50
  patience: 10
  learning_rate: 0.001
  loss: SMAPELoss
  lr_scheduler:
    warmup_epochs: 15
    eta_min: 0.000001

search:
  enabled: true
  rounds:
    - {max_epochs: 10, n_runs: 3, keep_fraction: 0.33, top_k: null}
    - {max_epochs: 15, n_runs: 3, keep_fraction: 0.33, top_k: null}
    - {max_epochs: 50, n_runs: 3, keep_fraction: null,  top_k: 2}

extra_csv_columns:
  - search_round
  - block_type
  - backbone_family
  - wavelet_family
  - active_g_cfg
  - meta_predicted_best
  - meta_convergence_score

passes:
  - pass_name: baseline
    pass_params:
      active_g: false
    configs:
      - {name: GenericAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: BottleneckGenericAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: BottleneckGenericAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: BottleneckGenericAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: GenericAEBackcastAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericAEBackcastAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericAEBackcastAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: AutoEncoderAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: AutoEncoderAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: AutoEncoderAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: GenericVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: BottleneckGenericVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: BottleneckGenericVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: BottleneckGenericVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: GenericAEBackcastVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericAEBackcastVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericAEBackcastVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: AutoEncoderVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: AutoEncoderVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: AutoEncoderVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: VAE, category: pure_lg_vae, stacks: {type: homogeneous, block: VAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: VAE, backbone_family: RootBlock, wavelet_family: ''}}
      - {name: TrendAELG+Haar, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, HaarWaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: Haar}}
      - {name: TrendAELG+DB4, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, DB4WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: DB4}}
      - {name: TrendAELG+Coif2, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, Coif2WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: Coif2}}
      - {name: TrendAELG+Symlet3, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, Symlet3WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: Symlet3}}
      - {name: TrendVAE+Haar, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, HaarWaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: Haar}}
      - {name: TrendVAE+DB4, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, DB4WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: DB4}}
      - {name: TrendVAE+Coif2, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, Coif2WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: Coif2}}
      - {name: TrendVAE+Symlet3, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, Symlet3WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: Symlet3}}
      - {name: NBEATS-I-LG, category: nbeats_i_style, stacks: {type: alternating, blocks: [TrendAELG, SeasonalityAELG], repeats: 1}, training: {n_blocks_per_stack: 3, share_weights: true}, extra_fields: {block_type: TrendAELG+SeasonalityAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: NBEATS-I-VAE, category: nbeats_i_style, stacks: {type: alternating, blocks: [TrendVAE, SeasonalityVAE], repeats: 1}, training: {n_blocks_per_stack: 3, share_weights: true}, extra_fields: {block_type: TrendVAE+SeasonalityVAE, backbone_family: VAE, wavelet_family: ''}}
  - pass_name: activeG_fcast
    pass_params:
      active_g: forecast
    configs:
      - {name: GenericAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: BottleneckGenericAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: BottleneckGenericAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: BottleneckGenericAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: GenericAEBackcastAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericAEBackcastAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericAEBackcastAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: AutoEncoderAELG, category: pure_lg_vae, stacks: {type: homogeneous, block: AutoEncoderAELG, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: AutoEncoderAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: GenericVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: BottleneckGenericVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: BottleneckGenericVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: BottleneckGenericVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: GenericAEBackcastVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: GenericAEBackcastVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: GenericAEBackcastVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: AutoEncoderVAE, category: pure_lg_vae, stacks: {type: homogeneous, block: AutoEncoderVAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: AutoEncoderVAE, backbone_family: VAE, wavelet_family: ''}}
      - {name: VAE, category: pure_lg_vae, stacks: {type: homogeneous, block: VAE, n: 16}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: VAE, backbone_family: RootBlock, wavelet_family: ''}}
      - {name: TrendAELG+Haar, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, HaarWaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: Haar}}
      - {name: TrendAELG+DB4, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, DB4WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: DB4}}
      - {name: TrendAELG+Coif2, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, Coif2WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: Coif2}}
      - {name: TrendAELG+Symlet3, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendAELG, Symlet3WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendAELG, backbone_family: LG, wavelet_family: Symlet3}}
      - {name: TrendVAE+Haar, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, HaarWaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: Haar}}
      - {name: TrendVAE+DB4, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, DB4WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: DB4}}
      - {name: TrendVAE+Coif2, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, Coif2WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: Coif2}}
      - {name: TrendVAE+Symlet3, category: trend_wavelet, stacks: {type: alternating, blocks: [TrendVAE, Symlet3WaveletV3], repeats: 8}, training: {n_blocks_per_stack: 1, share_weights: true}, extra_fields: {block_type: TrendVAE, backbone_family: VAE, wavelet_family: Symlet3}}
      - {name: NBEATS-I-LG, category: nbeats_i_style, stacks: {type: alternating, blocks: [TrendAELG, SeasonalityAELG], repeats: 1}, training: {n_blocks_per_stack: 3, share_weights: true}, extra_fields: {block_type: TrendAELG+SeasonalityAELG, backbone_family: LG, wavelet_family: ''}}
      - {name: NBEATS-I-VAE, category: nbeats_i_style, stacks: {type: alternating, blocks: [TrendVAE, SeasonalityVAE], repeats: 1}, training: {n_blocks_per_stack: 3, share_weights: true}, extra_fields: {block_type: TrendVAE+SeasonalityVAE, backbone_family: VAE, wavelet_family: ''}}
