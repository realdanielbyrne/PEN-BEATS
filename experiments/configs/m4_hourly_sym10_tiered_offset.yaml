# ============================================================
# M4 Hourly — Tiered Basis-Offset Experiment with Sym10
#
# Tests overlapping frequency-band targeting on the high-frequency
# M4 Hourly dataset (H=48, L=240) using alternating Trend+Symlet10WaveletV3
# architectures. Five wavelet positions get progressively shifted
# basis offsets (low→high or high→low) with basis_dim=eq_fcast.
#
# Architecture: 10 stacks = 5 × [Trend, Symlet10WaveletV3]
#   * RootBlock  (Trend + Symlet10WaveletV3)
#   * AE         (TrendAE + Symlet10WaveletV3AE)
#
# Offset design (slightly overlapping, step=8):
#   Position 1: offset 0   (lowest frequencies)
#   Position 2: offset 8
#   Position 3: offset 16
#   Position 4: offset 24
#   Position 5: offset 32   (highest frequencies)
#   Reverse ordering tested for each backbone.
#
# Paper-sampling protocol + ReduceLROnPlateau scheduler.
# ============================================================

experiment_name: m4_hourly_sym10_tiered_offset
category: wavelet_offset_study
description: >
  Tiered basis_offset sweep on M4 Hourly with sym10 wavelets.
  Ascending vs descending frequency targeting for RootBlock and AE backbones.

dataset: m4
periods:
  - Hourly

protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Hourly: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

lr_scheduler:
  type: plateau
  factor: 0.75
  patience: 1
  cooldown: 0
  min_lr: 1.0e-06
  mode: min
  monitor: val_loss
  interval: step
  frequency: 100

block_params:
  trend_thetas_dim: 3
  basis_dim: eq_fcast
  wavelet_type: sym10
  latent_dim: 32
  basis_offset: 0

extra_csv_columns:
  - basis_dim
  - basis_offset
  - stack_basis_offsets

configs:

  # ── RootBlock — ascending low→high ────────────────────────────────────
  - name: T+Sym10V3_10s_bdEQ_ascend
    category: tiered_offset_rb
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 8, 0, 16, 0, 24, 0, 32]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: ascend

  # ── RootBlock — descending high→low ───────────────────────────────────
  - name: T+Sym10V3_10s_bdEQ_descend
    category: tiered_offset_rb
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 32, 0, 24, 0, 16, 0, 8, 0, 0]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: descend

  # ── AE — ascending low→high ────────────────────────────────────────────
  - name: TAE+Sym10V3AE_10s_ld32_bdEQ_ascend
    category: tiered_offset_ae
    stacks:
      type: alternating
      blocks: [TrendAE, Symlet10WaveletV3AE]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 8, 0, 16, 0, 24, 0, 32]
    extra_fields:
      arch_family: alt_ae
      block_type_primary: TrendAE+Symlet10WaveletV3AE
      backbone: AERootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: ascend

  # ── AE — descending high→low ───────────────────────────────────────────
  - name: TAE+Sym10V3AE_10s_ld32_bdEQ_descend
    category: tiered_offset_ae
    stacks:
      type: alternating
      blocks: [TrendAE, Symlet10WaveletV3AE]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 32, 0, 24, 0, 16, 0, 8, 0, 0]
    extra_fields:
      arch_family: alt_ae
      block_type_primary: TrendAE+Symlet10WaveletV3AE
      backbone: AERootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: descend

  # ── TrendWavelet (unified, parameter-efficient) — ascending low→high ───
  - name: TW_10s_td3_sym10_bdEQ_ascend
    category: tiered_offset_tw
    stacks:
      type: homogeneous
      block: TrendWavelet
      n: 10
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      wavelet_type: sym10
      stack_basis_offsets: [0, 0, 8, 8, 16, 16, 24, 24, 32, 32]
    extra_fields:
      arch_family: trendwavelet
      block_type_primary: TrendWavelet
      backbone: RootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: ascend

  # ── TrendWavelet (unified) — descending high→low ──────────────────────
  - name: TW_10s_td3_sym10_bdEQ_descend
    category: tiered_offset_tw
    stacks:
      type: homogeneous
      block: TrendWavelet
      n: 10
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      wavelet_type: sym10
      stack_basis_offsets: [32, 32, 24, 24, 16, 16, 8, 8, 0, 0]
    extra_fields:
      arch_family: trendwavelet
      block_type_primary: TrendWavelet
      backbone: RootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: descend

  # ── TrendWaveletAE (unified, parameter-efficient, ld=16) — ascending ──
  - name: TWAE_10s_td3_sym10_ld16_bdEQ_ascend
    category: tiered_offset_twae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      wavelet_type: sym10
      latent_dim: 16
      stack_basis_offsets: [0, 0, 8, 8, 16, 16, 24, 24, 32, 32]
    extra_fields:
      arch_family: trendwavelet_ae
      block_type_primary: TrendWaveletAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: ascend

  # ── TrendWaveletAE (unified, ld=16) — descending ──────────────────────
  - name: TWAE_10s_td3_sym10_ld16_bdEQ_descend
    category: tiered_offset_twae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      wavelet_type: sym10
      latent_dim: 16
      stack_basis_offsets: [32, 32, 24, 24, 16, 16, 8, 8, 0, 0]
    extra_fields:
      arch_family: trendwavelet_ae
      block_type_primary: TrendWaveletAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 16
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      offset_direction: descend

runs:
  n_runs: 10
  base_seed: 42
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: m4_hourly_sym10_tiered_offset_results.csv
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: true
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 1
  pin_memory: true

analysis:
  enabled: true
  ranking: true
