# ============================================================
# Milk Production Convergence Study — active_g effect (6-stack)
# Mirrors run_milk_convergence.py
#
# Tests whether active_g stabilizes convergence on the milk production
# dataset (156 monthly observations) using 6-stack Generic architecture.
# 100 independent random-seed runs per configuration (200 total).
#
# Experimental conditions:
#   - Milk6_baseline: active_g=False, activation=ReLU
#   - Milk6_activeG:  active_g=True,  activation=ReLU
#
# NOTE: Original script uses TimeSeriesDataModule (single-series 80/20 split).
# This YAML uses the collection-based loader with batch_size=64 override.
# Key testable parameters (active_g, activation, n_stacks, n_runs) are
# faithfully reproduced.
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/milk_convergence.yaml
# ============================================================

experiment_name: milk_convergence
category: convergence_study
description: >
  active_g convergence study on Milk production dataset (6-stack Generic).
  100 runs per config with random seeds. Measures healthy run rate,
  convergence stability, and final forecast accuracy.

dataset: milk
periods: [Milk]

training:
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 500
  patience: 20
  n_blocks_per_stack: 1
  share_weights: true
  batch_size: 64         # original uses 64 (default auto resolves to 128)
  sum_losses: false
  # forecast_multiplier: 4  # auto-resolved: Milk → 4, backcast = 4 * 6 = 24

block_params:
  thetas_dim: 5
  latent_dim: 4

lr_scheduler: null

# ── Configs under test ────────────────────────────────────────────────────
configs:
  - name: Milk6_baseline
    category: convergence_baseline
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: false

  - name: Milk6_activeG
    category: convergence_activeg
    stacks: {type: homogeneous, block: Generic, n: 6}
    training:
      active_g: true

runs:
  n_runs: 100
  seed_mode: random       # original uses random.randint() per run

output:
  results_dir: experiments/results
  csv_filename: milk_convergence_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: false
