# ============================================================
# Milk Production Convergence Study — active_g effect (10-stack)
# Mirrors run_milk_convergence_10stack.py
#
# Identical to milk_convergence.yaml but scaled to 10 stacks to test
# whether the active_g stabilization effect strengthens with deeper models.
# 100 independent random-seed runs per configuration (200 total).
#
# Experimental conditions:
#   - Milk10_baseline: active_g=False, activation=ReLU
#   - Milk10_activeG:  active_g=True,  activation=ReLU
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/milk_convergence_10stack.yaml
# ============================================================

experiment_name: milk_convergence_10stack
category: convergence_study
description: >
  active_g convergence study on Milk production dataset (10-stack Generic).
  Extends the 6-stack study to test depth scaling of active_g stabilization.
  100 runs per config with random seeds.

dataset: milk
periods: [Milk]

training:
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 500
  patience: 20
  n_blocks_per_stack: 1
  share_weights: true
  batch_size: 64
  sum_losses: false

block_params:
  thetas_dim: 5
  latent_dim: 4

lr_scheduler: null

configs:
  - name: Milk10_baseline
    category: convergence_baseline
    stacks: {type: homogeneous, block: Generic, n: 10}
    training:
      active_g: false

  - name: Milk10_activeG
    category: convergence_activeg
    stacks: {type: homogeneous, block: Generic, n: 10}
    training:
      active_g: true

runs:
  n_runs: 100
  seed_mode: random

output:
  results_dir: experiments/results
  csv_filename: milk_convergence_10stack_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: false
