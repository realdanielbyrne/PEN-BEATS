# ============================================================
# NHiTS-Protocol Benchmark — Traffic Dataset
#
# Aligns evaluation with the NHiTS paper protocol:
#   - Z-score normalization (train on normalized data)
#   - 70/10/20 train/val/test split
#   - All 862 columns including OT target
#   - MSE loss
#   - L = 5*H lookback
#   - 8 runs per config (seeds 1-8)
#   - Batch size 256
#
# Usage (standalone runner):
#   python experiments/run_nhits_benchmark.py --dataset traffic --horizons 96 192 336 720
#   python experiments/run_nhits_benchmark.py --dataset traffic --horizons 96 --dry-run
#   python experiments/run_nhits_benchmark.py --analyze
# ============================================================

experiment_name: NHiTS-Protocol-Traffic
description: >
  Head-to-head benchmark of novel AELG block types against NHiTS published
  baselines on Traffic dataset, using the NHiTS evaluation protocol.
  Tests both NBeatsNet (10-stack) and NHiTSNet (3-stack) architectures.

dataset: traffic
horizons: [96, 192, 336, 720]

# NHiTS evaluation protocol
protocol:
  normalize: true
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true     # 862 columns (with OT)
  loss: MSELoss
  forecast_multiplier: 5   # L = 5*H
  batch_size: 256

# NHiTS published baselines for comparison (Table 1)
baselines:
  NHiTS:
    Traffic-96:  {mse: 0.401, mae: 0.267}
    Traffic-192: {mse: 0.411, mae: 0.270}
    Traffic-336: {mse: 0.423, mae: 0.278}
    Traffic-720: {mse: 0.461, mae: 0.299}

# Block configurations to benchmark (same as Weather)
configs:
  # --- NBeatsNet (10-stack) ---
  - name: GenericAELG-10
    model: NBeatsNet
    stack_types: ['GenericAELG'] * 10

  - name: TrendAELG+HaarV3AELG
    model: NBeatsNet
    stack_types: "['TrendAELG', 'HaarWaveletV3AELG'] * 5"

  - name: TrendAELG+DB2V3AELG
    model: NBeatsNet
    stack_types: "['TrendAELG', 'DB2WaveletV3AELG'] * 5"

  - name: TrendAELG+Coif1V3AELG
    model: NBeatsNet
    stack_types: "['TrendAELG', 'Coif1WaveletV3AELG'] * 5"

  - name: TrendAELG+Symlet2V3AELG
    model: NBeatsNet
    stack_types: "['TrendAELG', 'Symlet2WaveletV3AELG'] * 5"

  - name: TrendWaveletAELG-10
    model: NBeatsNet
    stack_types: ['TrendWaveletAELG'] * 10

  # --- NHiTSNet (3-stack with hierarchical pooling) ---
  - name: NHiTS-GenericAELG
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAELG+HaarV3AELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'HaarWaveletV3AELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAELG+DB2V3AELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'DB2WaveletV3AELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAELG+Coif1V3AELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'Coif1WaveletV3AELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAELG+Symlet2V3AELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'Symlet2WaveletV3AELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendWaveletAELG
    model: NHiTSNet
    stack_types: ['TrendWaveletAELG', 'TrendWaveletAELG', 'TrendWaveletAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

runs:
  n_runs: 8
  base_seed: 1

training:
  max_epochs: 100
  patience: 10
  activation: ReLU
  active_g: false
  sum_losses: false

block_params:
  thetas_dim: 5
  latent_dim: 4
  basis_dim: 128
