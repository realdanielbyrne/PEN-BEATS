# ============================================================
# NHiTS-Protocol Benchmark — Traffic Dataset
#
# Aligns evaluation with the NHiTS paper protocol:
#   - No normalization (PeMS occupancy rates are naturally 0-1 scaled)
#   - 70/10/20 train/val/test split
#   - All 862 columns including OT target
#   - MSE loss
#   - L = 5*H lookback (critical for stability; L=2H causes divergence)
#   - 8 runs per config (seeds 1-8)
#   - Batch size 256
#
# Usage (standalone runner):
#   python experiments/run_nhits_benchmark.py --dataset traffic --horizons 96 192 336 720
#   python experiments/run_nhits_benchmark.py --dataset traffic --horizons 96 --dry-run
#   python experiments/run_nhits_benchmark.py --analyze
# ============================================================

experiment_name: NHiTS-Protocol-Traffic
description: >
  Head-to-head benchmark of novel AELG block types against NHiTS published
  baselines on Traffic dataset, using the NHiTS evaluation protocol.
  Tests both NBeatsNet (10-stack) and NHiTSNet (3-stack) architectures.

dataset: traffic
horizons: [96, 192, 336, 720]

# NHiTS evaluation protocol
# Note: Traffic (PeMS) data is naturally 0-1 scaled occupancy rates.
# Normalization is not required (confirmed by AsymWavelet Diagnostic study).
protocol:
  normalize: false
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true     # 862 columns (with OT)
  loss: MSELoss
  forecast_multiplier: 5   # L = 5*H (mandatory; L=2H causes divergence)
  batch_size: 256

# NHiTS published baselines for comparison (Table 1)
baselines:
  NHiTS:
    Traffic-96:  {mse: 0.401, mae: 0.267}
    Traffic-192: {mse: 0.411, mae: 0.270}
    Traffic-336: {mse: 0.423, mae: 0.278}
    Traffic-720: {mse: 0.461, mae: 0.299}

# Benchmark configurations (9 configs)
# Selection rationale:
#   Reference baselines: Generic (N-BEATS-G), NHiTS-Generic (NHiTS-G)
#   NBeatsNet: GenericAELG, BottleneckGenericAELG, TrendAELG+Sym20V3AELG, TrendWaveletAELG
#   NHiTSNet:  GenericAELG, TrendAELG+Coif2V3AELG+GenericAELG, TrendWaveletAELG
configs:
  # --- Reference baselines (vanilla blocks, same pipeline) ---
  - name: Generic-10
    model: NBeatsNet
    stack_types: "['Generic'] * 10"

  - name: NHiTS-Generic
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  # --- NBeatsNet novel (10-stack, 4 configs) ---
  - name: GenericAELG-10
    model: NBeatsNet
    stack_types: "['GenericAELG'] * 10"

  - name: GenericAE-10
    model: NBeatsNet
    stack_types: "['GenericAE'] * 10"

  - name: BottleneckGenericAELG-10
    model: NBeatsNet
    stack_types: "['BottleneckGenericAELG'] * 10"

  - name: BottleneckGenericAE-10
    model: NBeatsNet
    stack_types: "['BottleneckGenericAE'] * 10"

  - name: TrendAELG+Sym20V3AELG
    model: NBeatsNet
    stack_types: "['TrendAELG', 'Symlet20WaveletV3AELG'] * 5"

  - name: TrendAE+Sym20V3AE
    model: NBeatsNet
    stack_types: "['TrendAE', 'Symlet20WaveletV3AE'] * 5"

  - name: TrendWaveletAELG-10
    model: NBeatsNet
    stack_types: "['TrendWaveletAELG'] * 10"

  - name: TrendWaveletAE-10
    model: NBeatsNet
    stack_types: "['TrendWaveletAE'] * 10"

  - name: TrendWavelet-10
    model: NBeatsNet
    stack_types: "['TrendWavelet'] * 10"
  # --- NHiTSNet (3-stack with hierarchical pooling, 3 configs) ---
  - name: NHiTS-GenericAELG
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-GenericAE
    model: NHiTSNet
    stack_types: ['GenericAE', 'GenericAE', 'GenericAE']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAELG+Coif2V3AELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'Coif2WaveletV3AELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAE+Coif2V3AE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'GenericAE']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendWaveletAELG
    model: NHiTSNet
    stack_types: ['TrendWaveletAELG', 'TrendWaveletAELG', 'TrendWaveletAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendWaveletAE
    model: NHiTSNet
    stack_types: ['TrendWaveletAE', 'TrendWaveletAE', 'TrendWaveletAE']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendWavelet
    model: NHiTSNet
    stack_types: ['TrendWavelet', 'TrendWavelet', 'TrendWavelet']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]
    
runs:
  n_runs: 8
  base_seed: 1

training:
  max_epochs: 100
  patience: 10
  activation: ReLU
  active_g: false
  sum_losses: false

block_params:
  thetas_dim: 5
  latent_dim: 16           # Research-confirmed optimal (ld=16 >> ld=4/8)
  basis_dim: eq_fcast      # Dynamic: set to forecast_length per horizon
