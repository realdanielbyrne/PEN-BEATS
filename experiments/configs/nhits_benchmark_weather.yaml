# ============================================================
# NHiTS-Protocol Benchmark — Weather Dataset
#
# Aligns evaluation with the NHiTS paper protocol:
#   - Z-score normalization (train on normalized data)
#   - 70/10/20 train/val/test split
#   - All 21 columns including OT target
#   - MSE loss
#   - L = 5*H lookback
#   - 8 runs per config (seeds 1-8)
#   - Batch size 256
#
# Usage (standalone runner):
#   python experiments/run_nhits_benchmark.py --dataset weather --horizons 96 192 336 720
#   python experiments/run_nhits_benchmark.py --dataset weather --horizons 96 --dry-run
#   python experiments/run_nhits_benchmark.py --analyze
# ============================================================

experiment_name: NHiTS-Protocol-Weather
description: >
  Head-to-head benchmark of novel AELG block types against NHiTS published
  baselines on Weather dataset, using the NHiTS evaluation protocol.
  Tests both NBeatsNet (10-stack) and NHiTSNet (3-stack) architectures.

dataset: weather
horizons: [96, 192, 336, 720]

# NHiTS evaluation protocol
protocol:
  normalize: true
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true     # 21 columns (with OT)
  loss: MSELoss
  forecast_multiplier: 5   # L = 5*H
  batch_size: 256

# NHiTS published baselines for comparison (Table 1)
baselines:
  NHiTS:
    Weather-96:  {mse: 0.158, mae: 0.209}
    Weather-192: {mse: 0.211, mae: 0.253}
    Weather-336: {mse: 0.272, mae: 0.296}
    Weather-720: {mse: 0.348, mae: 0.349}

# Benchmark configurations (9 configs)
# Selection rationale:
#   Reference baselines: Generic (N-BEATS-G), NHiTS-Generic (NHiTS-G)
#   NBeatsNet: GenericAELG, BottleneckGenericAELG, TrendAELG+Sym20V3AELG, TrendWaveletAELG
#   NHiTSNet:  GenericAELG, TrendAELG+Coif2V3AELG+GenericAELG, TrendWaveletAELG
configs:
  # --- Reference baselines (vanilla blocks, same pipeline) ---
  - name: Generic-10
    model: NBeatsNet
    stack_types: ['Generic'] * 10

  - name: NHiTS-Generic
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  # --- NBeatsNet novel (10-stack, 4 configs) ---
  - name: GenericAELG-10
    model: NBeatsNet
    stack_types: ['GenericAELG'] * 10

  - name: BottleneckGenericAELG-10
    model: NBeatsNet
    stack_types: ['BottleneckGenericAELG'] * 10

  - name: TrendAELG+Sym20V3AELG
    model: NBeatsNet
    stack_types: "['TrendAELG', 'Symlet20WaveletV3AELG'] * 5"

  - name: TrendWaveletAELG-10
    model: NBeatsNet
    stack_types: ['TrendWaveletAELG'] * 10

  # --- NHiTSNet (3-stack with hierarchical pooling, 3 configs) ---
  - name: NHiTS-GenericAELG
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendAELG+Coif2V3AELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'Coif2WaveletV3AELG', 'GenericAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

  - name: NHiTS-TrendWaveletAELG
    model: NHiTSNet
    stack_types: ['TrendWaveletAELG', 'TrendWaveletAELG', 'TrendWaveletAELG']
    n_pools_kernel_size: [8, 4, 1]
    n_freq_downsample: [24, 12, 1]

runs:
  n_runs: 8
  base_seed: 1

training:
  max_epochs: 100
  patience: 10
  activation: ReLU
  active_g: false
  sum_losses: false

block_params:
  thetas_dim: 5
  latent_dim: 16           # Research-confirmed optimal (ld=16 >> ld=4/8)
  basis_dim: eq_fcast      # Dynamic: set to forecast_length per horizon
