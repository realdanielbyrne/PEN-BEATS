# ============================================================
# NHiTS Novel AE Block Types — Weather Exploration
#
# Focused study of novel AE-backbone block types in the NHiTS
# 3-stack hierarchical architecture on Weather. Tests alternating
# TrendAE+WaveletAE patterns alongside homogeneous TrendWaveletAE
# stacks, with the best prior NHiTS performers as references.
#
# Metrics:
#   mse/mae        — on z-score-normalized data (paper-comparable)
#   denorm_mse/mae — on original-scale data (interpretable)
#   smape          — scale-independent sanity check
#
# Usage:
#   python experiments/run_nhits_benchmark.py \
#       --yaml experiments/configs/nhits_novel_ae_weather.yaml --dry-run
#   python experiments/run_nhits_benchmark.py --yaml experiments/configs/nhits_novel_ae_weather.yaml
# ============================================================

experiment_name: NHiTS-NovelAE-Weather
description: >
  Exploration of novel AE block types in NHiTS 3-stack architecture
  on Weather dataset. Tests alternating TrendAE+WaveletAE patterns
  (db3, coif2, haar) and homogeneous TrendWaveletAE/AELG stacks,
  with best prior NHiTS performers and a new BottleneckGenericAELG
  config as references.

  Training protocol follows the NHiTS paper defaults: step-based training
  (max_steps=1000), batch_size=32, early stopping disabled. Per-horizon
  pool/freq are controlled by NHITS_HORIZON_OVERRIDES (grid-search
  winners) so configs below differ only in stack_types.

dataset: weather
horizons: [720, 192, 336, 96]

# NHiTS evaluation protocol
protocol:
  normalize: true
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true     # 21 columns (with OT)
  loss: MSELoss
  forecast_multiplier: 5   # L = 5*H
  batch_size: 32           # Paper setting (neuralforecast NHiTS default)
  num_workers: 4

# NHiTS published baselines (Table 1)
baselines:
  NHiTS:
    Weather-96:  {mse: 0.158, mae: 0.209}
    Weather-192: {mse: 0.211, mae: 0.253}
    Weather-336: {mse: 0.272, mae: 0.296}
    Weather-720: {mse: 0.348, mae: 0.349}

configs:
  # Per-horizon n_pools_kernel_size and n_freq_downsample are supplied by
  # NHITS_HORIZON_OVERRIDES in run_nhits_benchmark.py (grid-search winners).
  # Configs below differ only in stack_types (and active_g where noted).

  # --- Reference baselines (vanilla blocks, same pipeline) ---
  # NHiTSGenericRoot uses a 2-layer MLP tower matching the NHiTS paper
  # (neuralforecast mlp_units=[[512,512]]), not the 4-layer N-BEATS tower.
  - name: NHiTS-Generic
    model: NHiTSNet
    stack_types: ['NHiTSGenericRoot', 'NHiTSGenericRoot', 'NHiTSGenericRoot']

  - name: NHiTS-IG
    model: NHiTSNet
    stack_types: ['Trend', 'Seasonality', 'Generic']

  # --- NHiTSNet (3-stack with hierarchical pooling, 3 configs) ---
  - name: NHiTS-GenericAELG
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']

  - name: NHiTS-GenericAE
    model: NHiTSNet
    stack_types: ['GenericAE', 'GenericAE', 'GenericAE']

  - name: NHiTS-TrendAELG+Coif2V3AELG+GenericAELG
    model: NHiTSNet
    stack_types: ['TrendAELG', 'Coif2WaveletV3AELG', 'GenericAELG']

  - name: NHiTS-TrendAE+Coif2V3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'GenericAE']

  - name: NHiTS-TrendWaveletAELG
    model: NHiTSNet
    stack_types: ['TrendWaveletAELG', 'TrendWaveletAELG', 'TrendWaveletAELG']

  - name: NHiTS-TrendWaveletAE
    model: NHiTSNet
    stack_types: ['TrendWaveletAE', 'TrendWaveletAE', 'TrendWaveletAE']

  - name: NHiTS-TrendWavelet
    model: NHiTSNet
    stack_types: ['TrendWavelet', 'TrendWavelet', 'TrendWavelet']

  # --- NHiTSNet (3-stack with hierarchical pooling): Generic-family ---
  - name: NHiTS-Generic-agF
    model: NHiTSNet
    stack_types: ['NHiTSGenericRoot', 'NHiTSGenericRoot', 'NHiTSGenericRoot']
    active_g: forecast

  - name: NHiTS-GenericAELG-agF
    model: NHiTSNet
    stack_types: ['GenericAELG', 'GenericAELG', 'GenericAELG']
    active_g: forecast

  - name: NHiTS-GenericAE-agF
    model: NHiTSNet
    stack_types: ['GenericAE', 'GenericAE', 'GenericAE']
    active_g: forecast

  # --- NHiTSNet (3-stack with hierarchical pooling): TrendWaveletGeneric-family ---
  - name: NHiTS-TrendWaveletGeneric-agF
    model: NHiTSNet
    stack_types: ['TrendWaveletGeneric', 'TrendWaveletGeneric', 'TrendWaveletGeneric']
    active_g: forecast

  - name: NHiTS-TrendWaveletGenericAELG-agF
    model: NHiTSNet
    stack_types: ['TrendWaveletGenericAELG', 'TrendWaveletGenericAELG', 'TrendWaveletGenericAELG']
    active_g: forecast

  - name: NHiTS-TrendWaveletGenericVAE-agF
    model: NHiTSNet
    stack_types: ['TrendWaveletGenericVAE', 'TrendWaveletGenericVAE', 'TrendWaveletGenericVAE']
    active_g: forecast

  # --- New: Alternating TrendAE + WaveletAE + TrendAE(3 wavelet families) (3-stack with hierarchical pooling) ---
  - name: NHiTS-TrendAE+DB3V3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'DB3WaveletV3AE', 'TrendAE']

  - name: NHiTS-TrendAE+Coif2V3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'Coif2WaveletV3AE', 'TrendAE']

  - name: NHiTS-TrendAE+HaarV3AE+TrendAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'HaarWaveletV3AE', 'TrendAE']

  # --- New: Alternating TrendAE + WaveletAE + GenericAE (3 wavelet families) (3-stack with hierarchical pooling)  ---
  - name: NHiTS-TrendAE+DB3V3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'DB3WaveletV3AE', 'GenericAE']

  - name: NHiTS-TrendAE+HaarV3AE+GenericAE
    model: NHiTSNet
    stack_types: ['TrendAE', 'HaarWaveletV3AE', 'GenericAE']

  # --- New: BottleneckGenericAELG (3-stack with hierarchical pooling)
  - name: NHiTS-BottleneckGenericAELG
    model: NHiTSNet
    stack_types: ['BottleneckGenericAELG', 'BottleneckGenericAELG', 'BottleneckGenericAELG']

runs:
  n_runs: 5
  base_seed: 1

# NHiTS paper-aligned training protocol: step-based, no early stopping,
# validate every 100 steps. Per-horizon pool/freq defaults come from
# NHITS_HORIZON_OVERRIDES (grid-search winners) so the per-config values
# below are ignored at training time.
training:
  max_steps: 1000          # Paper setting (neuralforecast NHiTS default)
  max_epochs: 1000         # Upper cap only; max_steps stops training first
  early_stopping: false    # Paper setting (disabled)
  val_check_interval: 100  # Validate every 100 steps
  patience: 25             # Unused when early_stopping=false
  activation: ReLU
  active_g: false
  sum_losses: false
  warmup_epochs: 25
  learning_rate: .001

block_params:
  thetas_dim: 5
  latent_dim: 16           # Research-confirmed optimal
  basis_dim: eq_fcast      # Dynamic: set to forecast_length per horizon
