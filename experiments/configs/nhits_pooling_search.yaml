    n_freq_downsample: [24, 12, 1]

  - name: Pool-4x2x1_Freq-1x1x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [4, 2, 1]
    n_freq_downsample: [1, 1, 1]

  # --- Pool [2,2,1] × 3 freq options ---
  - name: Pool-2x2x1_Freq-168x24x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [2, 2, 1]
