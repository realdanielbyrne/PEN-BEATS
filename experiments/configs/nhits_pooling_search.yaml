  - name: Pool-16x8x1_Freq-48x12x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [16, 8, 1]
    n_freq_downsample: [48, 12, 1]

  - name: Pool-32x16x1_Freq-48x12x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [32, 16, 1]
    n_freq_downsample: [48, 12, 1]

  # --- Ideal for H=336: [72,18,1] × 4 pool kernels ---
  - name: Pool-2x2x2_Freq-72x18x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
