# ============================================================
# NHiTS Pooling Parameter Search
#
# Grid search over the paper's n_pools_kernel_size and
# n_freq_downsample candidates 
#
# Usage:
#   # Dry run — inspect the plan
#   python experiments/run_nhits_benchmark.py \
#       --yaml experiments/configs/nhits_pooling_search.yaml --dry-run
#
#   # Run the full search (all horizons, 2 runs each = 48 jobs)
#   python experiments/run_nhits_benchmark.py --yaml experiments/configs/nhits_pooling_search.yaml --csv-path experiments/results/nhits_pooling_search.csv
#
#   # Run a single horizon quickly
#   python experiments/run_nhits_benchmark.py \
#       --yaml experiments/configs/nhits_pooling_search.yaml \
#       --horizons 96 \
#       --csv-path experiments/results/nhits_pooling_search.csv
#
#   # Analyze results
#   python experiments/run_nhits_benchmark.py --analyze --csv-path experiments/results/nhits_pooling_search.csv
# ============================================================

experiment_name: NHiTS-Pooling-Search
description: >
  Grid search over n_pools_kernel_size × n_freq_downsample to
  identify the best pooling configuration per forecast horizon.
  Uses the paper's candidate values on NHiTS-Generic baseline.

dataset: weather
horizons: [96, 192, 336, 720]

# IMPORTANT: disable horizon-adaptive overrides so each config's
# explicit pooling values are used as-is at every horizon.
skip_horizon_overrides: true

# Same LTSF protocol as the main benchmark
protocol:
  normalize: true
  train_ratio: 0.7
  val_ratio: 0.1
  include_target: true
  loss: MSELoss
  forecast_multiplier: 5
  batch_size: 256  

hardware:  
  num_workers: 5

runs:
  n_runs: 2
  base_seed: 1

training:
  max_epochs: 20
  early_stopping: false    # Paper setting (disabled)
  patience: 20             # Unused when early_stopping=false
  activation: ReLU
  active_g: false
  sum_losses: false
  warmup_epochs: 5
  learning_rate: .001

block_params:
  thetas_dim: 5
  latent_dim: 16
  basis_dim: eq_fcast


configs:
  # --- Pool [2,2,2] × 3 freq options ---
  - name: Pool-2x2x2_Freq-168x24x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [2, 2, 2]
    n_freq_downsample: [168, 24, 1]

  - name: Pool-2x2x2_Freq-24x12x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [2, 2, 2]
    n_freq_downsample: [24, 12, 1]

  - name: Pool-2x2x2_Freq-1x1x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [2, 2, 2]
    n_freq_downsample: [1, 1, 1]

  # --- Pool [4,2,1] × 3 freq options ---
  - name: Pool-4x2x1_Freq-168x24x1
    model: NHiTSNet
    stack_types: ['Generic', 'Generic', 'Generic']
    n_pools_kernel_size: [4, 2, 1]
    n_freq_downsample: [168, 24, 1]

  - name: Pool-4x2x1_Freq-24x12x1
    model: NHiTSNet
