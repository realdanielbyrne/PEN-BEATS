# ============================================================
# Omnibus Benchmark — M4 Dataset (Yearly, Quarterly)
#
# Publication-quality head-to-head comparison of 28 configs:
#   6 paper baselines (3 architectures × {active_g=false, forecast})
#   4 novel non-AE configs (2 base × {active_g=false, forecast})
#   6 novel AE configs (3 base × {active_g=false, forecast})
#   12 novel AELG configs (6 base × {active_g=false, forecast})
#
# Single-pass design: each config specifies its own active_g.
# 28 configs × 10 runs × 2 periods = 560 runs
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/omnibus_benchmark_m4.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/omnibus_benchmark_m4.yaml
#   python experiments/run_from_yaml.py experiments/configs/omnibus_benchmark_m4.yaml --gpu-id 0 --worker-id w0a
# ============================================================

experiment_name: omnibus_benchmark
category: omnibus
description: >
  Publication-quality omnibus benchmark: 17 architectures spanning paper
  baselines, novel non-AE, AE, and AELG configurations. Single-pass design
  with per-config active_g. M4 Yearly + Quarterly, SMAPELoss, coif2 wavelets.

dataset: m4
periods: [Yearly, Quarterly]

# ── Shared Training Defaults ────────────────────────────────────────────────
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  thetas_dim: 5
  latent_dim: 16
  basis_dim: 128
  trend_thetas_dim: 3
  generic_dim: 5
  wavelet_type: coif2

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

runs:
  n_runs: 10
  base_seed: 42
  seed_mode: sequential

# ── Extended CSV Schema ─────────────────────────────────────────────────────
extra_csv_columns:
  - arch_family
  - block_type_primary
  - backbone
  - stack_pattern
  - n_stacks
  - innovation_claim

# ── 17 Configurations ──────────────────────────────────────────────────────
configs:

  # ════════════════════════════════════════════════════════════════════════
  # Paper Baselines (6 entries from 3 architectures)
  # ════════════════════════════════════════════════════════════════════════

  # 1. NBEATS-G — Paper faithful, ~24.7M params
  - name: NBEATS-G-baseline
    category: paper_baseline
    stacks: {builtin: NBEATS-G}
    training: {active_g: false}
    extra_fields:
      arch_family: paper_baseline
      block_type_primary: Generic
      backbone: RootBlock
      stack_pattern: homogeneous
      n_stacks: 30
      innovation_claim: Paper-faithful NBEATS-G baseline

  # 2. NBEATS-G + active_g — Shows +22% improvement finding
  - name: NBEATS-G-activeG
    category: paper_baseline
    stacks: {builtin: NBEATS-G}
    training: {active_g: forecast}
    extra_fields:
      arch_family: paper_baseline
      block_type_primary: Generic
      backbone: RootBlock
      stack_pattern: homogeneous
      n_stacks: 30
      innovation_claim: active_g activation on Generic blocks

  # 3. NBEATS-I — Paper faithful interpretable
  - name: NBEATS-I-baseline
    category: paper_baseline
    stacks: {builtin: NBEATS-I}
    n_blocks_per_stack: 3
    training: {active_g: false}
    extra_fields:
      arch_family: paper_baseline
      block_type_primary: Trend+Seasonality
      backbone: RootBlock
      stack_pattern: builtin
      n_stacks: 2
      innovation_claim: Paper-faithful NBEATS-I baseline

  # 4. NBEATS-I + active_g
  - name: NBEATS-I-activeG
    category: paper_baseline
    stacks: {builtin: NBEATS-I}
    n_blocks_per_stack: 3
    training: {active_g: forecast}
    extra_fields:
      arch_family: paper_baseline
      block_type_primary: Trend+Seasonality
      backbone: RootBlock
      stack_pattern: builtin
      n_stacks: 2
      innovation_claim: active_g on interpretable blocks

  # 5. NBEATS-I+G — Paper faithful mixed
  - name: NBEATS-I+G-baseline
    category: paper_baseline
    stacks: {builtin: NBEATS-I+G}
    training: {active_g: false}
    extra_fields:
      arch_family: paper_baseline
      block_type_primary: Trend+Seasonality+Generic
      backbone: RootBlock
      stack_pattern: prefix_body
      n_stacks: 30
      innovation_claim: Paper-faithful NBEATS-I+G baseline

  # 6. NBEATS-I+G + active_g
  - name: NBEATS-I+G-activeG
    category: paper_baseline
    stacks: {builtin: NBEATS-I+G}
    training: {active_g: forecast}
    extra_fields:
      arch_family: paper_baseline
      block_type_primary: Trend+Seasonality+Generic
      backbone: RootBlock
      stack_pattern: prefix_body
      n_stacks: 30
      innovation_claim: active_g on mixed interpretable+generic

  # ════════════════════════════════════════════════════════════════════════
  # Novel Non-AE Configurations (2)
  # ════════════════════════════════════════════════════════════════════════

  # 7. Trend+Coif2WaveletV3 alternating — M4-Yearly SOTA (SMAPE=13.410)
  - name: Trend+Coif2WaveletV3-30
    category: novel_nonae
    stacks:
      type: alternating
      blocks: [Trend, Coif2WaveletV3]
      repeats: 15
    training: {active_g: false}
    extra_fields:
      arch_family: novel_nonae
      block_type_primary: Trend+Coif2WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      innovation_claim: Polynomial+DWT orthonormal basis SOTA

  # 8. TrendWaveletGeneric — 3-branch non-AE, parameter efficiency (~965K)
  - name: TrendWaveletGeneric-10
    category: novel_nonae
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    training: {active_g: false}
    extra_fields:
      arch_family: novel_nonae
      block_type_primary: TrendWaveletGeneric
      backbone: RootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: 3-branch unified block most parameter-efficient

  # ════════════════════════════════════════════════════════════════════════
  # Novel AE Configurations (3)
  # ════════════════════════════════════════════════════════════════════════

  # 9. GenericAE — Tourism winner candidate, depth-stable
  - name: GenericAE-10
    category: novel_ae
    stacks:
      type: homogeneous
      block: GenericAE
      n: 10
    training: {active_g: forecast}
    block_params: {latent_dim: 8}
    extra_fields:
      arch_family: novel_ae
      block_type_primary: GenericAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: AE bottleneck depth-stable learned basis

  # 10. BottleneckGenericAE — Rank-d factorized basis + AE bottleneck
  - name: BottleneckGenericAE-10
    category: novel_ae
    stacks:
      type: homogeneous
      block: BottleneckGenericAE
      n: 10
    training: {active_g: forecast}
    block_params: {latent_dim: 8}
    extra_fields:
      arch_family: novel_ae
      block_type_primary: BottleneckGenericAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: Rank-d factorized basis with AE bottleneck

  # 11. NBEATS-I+GenericAE — Mixed interpretable prefix + AE body
  - name: NBEATS-I+GenericAE
    category: novel_ae
    stacks: {builtin: NBEATS-I+GenericAE}
    training: {active_g: forecast}
    block_params: {latent_dim: 8}
    extra_fields:
      arch_family: novel_ae
      block_type_primary: Trend+Seasonality+GenericAE
      backbone: mixed
      stack_pattern: prefix_body
      n_stacks: 30
      innovation_claim: Interpretable prefix with AE learned body

  # ════════════════════════════════════════════════════════════════════════
  # Novel AELG Configurations (6)
  # ════════════════════════════════════════════════════════════════════════

  # 12. TrendWaveletAELG-10 — Unified polynomial+DWT+AELG, param efficiency
  - name: TrendWaveletAELG-10
    category: novel_aelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    training: {active_g: false}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: Learned-gate AE with polynomial+DWT basis

  # 13. TrendWaveletAELG-20 — Depth-matched comparison to 30-stack non-AE
  - name: TrendWaveletAELG-20
    category: novel_aelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 20
    training: {active_g: false}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 20
      innovation_claim: Depth-matched AELG vs 30-stack non-AE

  # 14. TrendAELG+Coif2WaveletV3AELG alternating — Depth-matched AELG at 30 stacks
  - name: TrendAELG+Coif2WaveletV3AELG-30
    category: novel_aelg
    stacks:
      type: alternating
      blocks: [TrendAELG, Coif2WaveletV3AELG]
      repeats: 15
    training: {active_g: false}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendAELG+Coif2WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 30
      innovation_claim: Depth-matched AELG alternating at 30 stacks

  # 15. GenericAELG-20-skip — Skip connection rescue for bimodal collapse
  - name: GenericAELG-20-skip
    category: novel_aelg
    stacks:
      type: homogeneous
      block: GenericAELG
      n: 20
    training:
      active_g: forecast
      skip_distance: 5
      skip_alpha: 0.1
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: GenericAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 20
      innovation_claim: Skip connections rescue deep AELG collapse

  # 16. BottleneckGenericAELG-10 — Cross-horizon robust (avg rank 3.5/14)
  - name: BottleneckGenericAELG-10
    category: novel_aelg
    stacks:
      type: homogeneous
      block: BottleneckGenericAELG
      n: 10
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: BottleneckGenericAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: Cross-horizon robust AELG with bottleneck

  # 17. TrendWaveletGenericAELG-10 — 3-branch unified AELG
  - name: TrendWaveletGenericAELG-10
    category: novel_aelg
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    training: {active_g: false}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: 3-branch trend+wavelet+generic unified AELG

  # ════════════════════════════════════════════════════════════════════════
  # active_g Sweep — Complement variants for all novel configs (11)
  # Tests active_g effect on TrendWavelet varietals and AE/AELG blocks
  # ════════════════════════════════════════════════════════════════════════

  # 7b. Trend+Coif2WaveletV3-30 + active_g
  - name: Trend+Coif2WaveletV3-30-activeG
    category: novel_nonae
    stacks:
      type: alternating
      blocks: [Trend, Coif2WaveletV3]
      repeats: 15
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_nonae
      block_type_primary: Trend+Coif2WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      innovation_claim: active_g sweep for polynomial+DWT

  # 8b. TrendWaveletGeneric-10 + active_g
  - name: TrendWaveletGeneric-10-activeG
    category: novel_nonae
    stacks:
      type: homogeneous
      block: TrendWaveletGeneric
      n: 10
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_nonae
      block_type_primary: TrendWaveletGeneric
      backbone: RootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: active_g sweep for 3-branch unified

  # 9b. GenericAE-10 without active_g
  - name: GenericAE-10-noActiveG
    category: novel_ae
    stacks:
      type: homogeneous
      block: GenericAE
      n: 10
    training: {active_g: false}
    block_params: {latent_dim: 8}
    extra_fields:
      arch_family: novel_ae
      block_type_primary: GenericAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: active_g sweep for GenericAE

  # 10b. BottleneckGenericAE-10 without active_g
  - name: BottleneckGenericAE-10-noActiveG
    category: novel_ae
    stacks:
      type: homogeneous
      block: BottleneckGenericAE
      n: 10
    training: {active_g: false}
    block_params: {latent_dim: 8}
    extra_fields:
      arch_family: novel_ae
      block_type_primary: BottleneckGenericAE
      backbone: AERootBlock
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: active_g sweep for BottleneckGenericAE

  # 11b. NBEATS-I+GenericAE without active_g
  - name: NBEATS-I+GenericAE-noActiveG
    category: novel_ae
    stacks: {builtin: NBEATS-I+GenericAE}
    training: {active_g: false}
    block_params: {latent_dim: 8}
    extra_fields:
      arch_family: novel_ae
      block_type_primary: Trend+Seasonality+GenericAE
      backbone: mixed
      stack_pattern: prefix_body
      n_stacks: 30
      innovation_claim: active_g sweep for interpretable+AE

  # 12b. TrendWaveletAELG-10 + active_g
  - name: TrendWaveletAELG-10-activeG
    category: novel_aelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: active_g sweep for unified AELG

  # 13b. TrendWaveletAELG-20 + active_g
  - name: TrendWaveletAELG-20-activeG
    category: novel_aelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 20
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendWaveletAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 20
      innovation_claim: active_g sweep for depth-matched AELG

  # 14b. TrendAELG+Coif2WaveletV3AELG-30 + active_g
  - name: TrendAELG+Coif2WaveletV3AELG-30-activeG
    category: novel_aelg
    stacks:
      type: alternating
      blocks: [TrendAELG, Coif2WaveletV3AELG]
      repeats: 15
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendAELG+Coif2WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 30
      innovation_claim: active_g sweep for AELG alternating

  # 15b. GenericAELG-20-skip without active_g
  - name: GenericAELG-20-skip-noActiveG
    category: novel_aelg
    stacks:
      type: homogeneous
      block: GenericAELG
      n: 20
    training:
      active_g: false
      skip_distance: 5
      skip_alpha: 0.1
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: GenericAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 20
      innovation_claim: active_g sweep for skip-rescued AELG

  # 16b. BottleneckGenericAELG-10 without active_g
  - name: BottleneckGenericAELG-10-noActiveG
    category: novel_aelg
    stacks:
      type: homogeneous
      block: BottleneckGenericAELG
      n: 10
    training: {active_g: false}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: BottleneckGenericAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: active_g sweep for bottleneck AELG

  # 17b. TrendWaveletGenericAELG-10 + active_g
  - name: TrendWaveletGenericAELG-10-activeG
    category: novel_aelg
    stacks:
      type: homogeneous
      block: TrendWaveletGenericAELG
      n: 10
    training: {active_g: forecast}
    extra_fields:
      arch_family: novel_aelg
      block_type_primary: TrendWaveletGenericAELG
      backbone: AERootBlockLG
      stack_pattern: homogeneous
      n_stacks: 10
      innovation_claim: active_g sweep for 3-branch AELG

# ── Output ──────────────────────────────────────────────────────────────────
output:
  results_dir: experiments/results
  csv_filename: omnibus_benchmark_results.csv
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0
  gpu_id: null

analysis:
  enabled: true
  ranking: true
