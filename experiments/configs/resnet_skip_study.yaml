# ============================================================
# ResNet-Style Skip Connection Study
#
# Tests whether periodic re-injection of the original input
# into the residual stream improves forecasting for deep
# N-BEATS architectures using modern AE block types.
#
# Hypothesis: The N-BEATS forward pass subtracts backcast from
# residual at each stack. In deep models (16-30 stacks), the
# residual decays to near-zero, starving later stacks of signal.
# Skip connections add alpha * original_input back every
# skip_distance stacks, combating this decay.
#
# Architectures:
#   A) GenericAELG homogeneous (simplest modern AE block)
#   B) TrendAELG + WaveletV3AELG alternating (top performer)
#   C) Generic homogeneous (legacy rehabilitation test)
#
# Method: 3-round successive halving (24 configs)
#   Round 1:  10 epochs, 3 runs, keep 50% → ~12 survive
#   Round 2:  25 epochs, 3 runs, keep 50% → ~6 survive
#   Round 3: 100 epochs, 5 runs → final rankings
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study.yaml --dry-run
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study.yaml
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study.yaml --analyze-only
# ============================================================

experiment_name: resnet_skip_study
dataset: m4
periods: [Yearly]
category: skip_connection_study
description: >
  ResNet-style skip connection ablation across modern AE and
  legacy Generic architectures. Tests depth scaling (10-30
  stacks), skip_distance (4-10), and alpha mode (fixed vs
  learnable). Successive halving eliminates poor performers
  early — legacy Generic configs only survive if competitive.

# Shared training defaults
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

# Default block params (overridden per-section where needed)
block_params:
  thetas_dim: 5

# Cosine annealing with warmup
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

# Successive halving search
search:
  enabled: true
  rounds:
    - {max_epochs: 10,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 25,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 100, n_runs: 5}

# Meta-forecaster for Round 1 ranking
# Trains a small N-BEATS model on historical val_loss curves to predict
# which configs will converge well, enabling smarter early elimination.
meta_forecaster:
  enabled: true
  force_retrain: true
  cache_dir: experiments/results/.meta_cache
  training_csvs:
    - experiments/results/m4/unified_benchmark_results.csv
    - experiments/results/m4/block_benchmark_results.csv
    - experiments/results/m4/convergence_study_results_v1.csv
    - experiments/results/m4/generic_ae_pure_stack_results.csv
    - experiments/results/m4/trendae_study_results.csv
    - experiments/results/m4/wavelet_v3aelg_trendaelg_study_results.csv
    - experiments/results/m4/trendwaveletae_pure_study_results.csv
    - experiments/results/m4/lg_vae_study_results.csv
    - experiments/results/m4/vae2_study_results.csv

# Study-specific CSV columns for analysis
extra_csv_columns:
  - search_round
  - architecture
  - n_stacks
  - skip_distance_cfg
  - skip_alpha_cfg

runs:
  n_runs: 3
  base_seed: 42

# ---------------------------------------------------------------------------
# 24 experimental configurations
# ---------------------------------------------------------------------------
configs:

  # ══════════════════════════════════════════════════════════════════════════
  # Section A: GenericAELG homogeneous (9 configs)
  #   Best-practice params: latent_dim=16, thetas_dim=5
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: GAELG10_no_skip
    category: genAELG_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAELG20_no_skip
    category: genAELG_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAELG30_no_skip
    category: genAELG_baseline
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── 10-stack control (skip shouldn't help much) ─────────────────────────

  - name: GAELG10_skip5_learn
    category: genAELG_control
    stacks: {type: homogeneous, block: GenericAELG, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 10
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  # ── 20-stack: fixed vs learnable alpha ──────────────────────────────────

  - name: GAELG20_skip5_a01
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAELG20_skip5_learn
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  # ── 30-stack: distance sweep + alpha comparison ─────────────────────────
  # skip=5  → 5 injections (stacks 5, 10, 15, 20, 25)
  # skip=10 → 2 injections (stacks 10, 20)

  - name: GAELG30_skip5_a01
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAELG30_skip5_learn
    category: genAELG_depth_x_skip
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  - name: GAELG30_skip10_learn
    category: genAELG_distance_sweep
    stacks: {type: homogeneous, block: GenericAELG, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 10, skip_alpha: learnable}
    extra_fields:
      architecture: GenericAELG
      n_stacks: 30
      skip_distance_cfg: 10
      skip_alpha_cfg: learnable

  # ══════════════════════════════════════════════════════════════════════════
  # Section B: TrendAELG + WaveletV3AELG alternating (10 configs)
  #   Best-practice params: latent_dim=8, trend_thetas_dim=3,
  #   wavelet_type=db2, basis_dim=6 (eq_fcast for M4-Yearly H=6)
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: TW8_no_skip
    category: trendwav_baseline
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 8
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TW16_no_skip
    category: trendwav_baseline
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TW24_no_skip
    category: trendwav_baseline
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── 8-stack control (skip shouldn't help much) ──────────────────────────
  # skip=4 on 8 stacks → 1 injection (at stack 4)

  - name: TW8_skip4_learn
    category: trendwav_control
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 8
      skip_distance_cfg: 4
      skip_alpha_cfg: learnable

  # ── 16-stack: distance sweep + alpha comparison ─────────────────────────
  # skip=4 on 16 stacks → 3 injections (stacks 4, 8, 12)
  # skip=8 on 16 stacks → 1 injection  (stack 8)

  - name: TW16_skip4_a01
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TW16_skip4_learn
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: learnable

  - name: TW16_skip8_learn
    category: trendwav_distance_sweep
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 8, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 16
      skip_distance_cfg: 8
      skip_alpha_cfg: learnable

  # ── 24-stack: distance sweep + alpha comparison ─────────────────────────
  # skip=4 on 24 stacks → 5 injections (stacks 4, 8, 12, 16, 20)
  # skip=8 on 24 stacks → 2 injections (stacks 8, 16)

  - name: TW24_skip4_a01
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TW24_skip4_learn
    category: trendwav_depth_x_skip
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: learnable

  - name: TW24_skip8_learn
    category: trendwav_distance_sweep
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 8, skip_alpha: learnable}
    extra_fields:
      architecture: TrendAELG_WaveletV3AELG
      n_stacks: 24
      skip_distance_cfg: 8
      skip_alpha_cfg: learnable

  # ══════════════════════════════════════════════════════════════════════════
  # Section C: Generic legacy — rehabilitation test (5 configs)
  #   30-stack homogeneous Generic (paper baseline, ~24.7M params).
  #   If skip connections fix the signal decay problem, these
  #   over-parameterized stacks might become competitive again.
  # ══════════════════════════════════════════════════════════════════════════

  - name: G30_no_skip
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: G30_skip5_a01
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: G30_skip5_learn
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 5, skip_alpha: learnable}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: learnable

  - name: G30_skip10_a01
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 10, skip_alpha: 0.1}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 10
      skip_alpha_cfg: "0.1"

  - name: G30_skip10_learn
    category: generic_legacy
    stacks: {type: homogeneous, block: Generic, n: 30}
    training: {skip_distance: 10, skip_alpha: learnable}
    extra_fields:
      architecture: Generic
      n_stacks: 30
      skip_distance_cfg: 10
      skip_alpha_cfg: learnable

output:
  results_dir: experiments/results
  save_predictions: true
  predictions_subdir: predictions

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
