# ============================================================
# ResNet-Style Skip Connection Study v2
#
# Follow-up to resnet_skip_study.yaml, targeting gaps
# identified in the v1 analysis:
#   - GenericAE backbone (untested at depth)
#   - TrendVAE + WaveletV3VAE (VAE backbone untested with skip)
#   - TrendVAE2 + WaveletV3VAE2 (compact VAE2 backbone, unstable)
#   - TrendWaveletAE (non-LG combined block, untested at depth)
#   - TrendWaveletAELG (combined block untested at depth)
#   - Short skip distances (2, 3) not tested in v1
#
# Key findings from v1:
#   - Skip rescues GenericAELG at 30 stacks (SMAPE 36->13.8)
#   - Fixed alpha=0.1 beats learnable in 4/5 comparisons
#   - Skip connections help unstable blocks most
#   - Legacy Generic not rehabilitated by skip
#   - MetaForecaster unreliable as sole elimination criterion
#
# Method: 3-round successive halving (30 configs)
#   Round 1:  15 epochs, 3 runs, keep 50% -> ~15 survive
#   Round 2:  30 epochs, 3 runs, keep 50% -> ~8 survive
#   Round 3: 100 epochs, 5 runs -> final (early stopping)
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study_v2.yaml --dry-run
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study_v2.yaml
#   python experiments/run_from_yaml.py \
#       experiments/configs/resnet_skip_study_v2.yaml --analyze-only
# ============================================================

experiment_name: resnet_skip_study_v2
dataset: m4
periods: [Yearly]
category: skip_connection_study_v2
description: >
  Skip connection follow-up: tests GenericAE depth scaling,
  TrendVAE+WaveletV3VAE (VAE backbone), TrendVAE2+WaveletV3VAE2
  (compact VAE2, instability-prone), TrendWaveletAE and
  TrendWaveletAELG (combined blocks) at deep stacks. Fills v1
  gaps: short skip distances (2, 3), untested backbones,
  cross-architecture comparison at matched depth. Hypothesis:
  skip connections specifically rescue unstable block families.

# Shared training defaults
training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

# Default block params (overridden per-section where needed)
block_params:
  thetas_dim: 5

# Cosine annealing with warmup
lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

# Successive halving search
# Longer R1 (15 epochs) gives actual val_loss enough signal
# to rank reliably without meta_forecaster dependence.
# R3 relies on patience=10 early stopping + built-in divergence
# detection to terminate unstable runs early.
search:
  enabled: true
  rounds:
    - {max_epochs: 15,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 30,  n_runs: 3, keep_fraction: 0.50}
    - {max_epochs: 100, n_runs: 5}

# Meta-forecaster disabled — v1 analysis showed it's unreliable
# as sole elimination criterion. Longer R1 (15 epochs) provides
# enough actual val_loss signal for ranking.
meta_forecaster:
  enabled: false

# Study-specific CSV columns for analysis
extra_csv_columns:
  - search_round
  - architecture
  - n_stacks
  - skip_distance_cfg
  - skip_alpha_cfg

runs:
  n_runs: 3
  base_seed: 42

# ---------------------------------------------------------------------------
# 30 experimental configurations
# ---------------------------------------------------------------------------
configs:

  # ══════════════════════════════════════════════════════════════════════════
  # Section A: GenericAE homogeneous — depth scaling + skip (6 configs)
  #   Tests whether GenericAE degrades at depth like GenericAELG and
  #   whether skip connections rescue it.
  #   Block params: latent_dim=16, thetas_dim=5
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: GAE10_no_skip
    category: genericAE_baseline
    stacks: {type: homogeneous, block: GenericAE, n: 10}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAE
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAE20_no_skip
    category: genericAE_baseline
    stacks: {type: homogeneous, block: GenericAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAE
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: GAE30_no_skip
    category: genericAE_baseline
    stacks: {type: homogeneous, block: GenericAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: GenericAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── Skip variants ──────────────────────────────────────────────────────

  - name: GAE20_skip5_a01
    category: genericAE_skip
    stacks: {type: homogeneous, block: GenericAE, n: 20}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAE
      n_stacks: 20
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAE30_skip5_a01
    category: genericAE_skip
    stacks: {type: homogeneous, block: GenericAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 5, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAE
      n_stacks: 30
      skip_distance_cfg: 5
      skip_alpha_cfg: "0.1"

  - name: GAE30_skip3_a01
    category: genericAE_skip
    stacks: {type: homogeneous, block: GenericAE, n: 30}
    block_params: {latent_dim: 16}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: GenericAE
      n_stacks: 30
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  # ══════════════════════════════════════════════════════════════════════════
  # Section B: TrendVAE + WaveletV3VAE alternating (6 configs)
  #   Tests whether VAE backbone interacts differently with skip.
  #   The stochastic latent space may amplify or dampen residual decay.
  #   Block params: latent_dim=8, trend_thetas_dim=3, wavelet_type=db2
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: TVAE8_no_skip
    category: trendVAE_baseline
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 8
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TVAE16_no_skip
    category: trendVAE_baseline
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 16
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TVAE24_no_skip
    category: trendVAE_baseline
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 24
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── Skip variants ──────────────────────────────────────────────────────

  - name: TVAE16_skip4_a01
    category: trendVAE_skip
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TVAE24_skip4_a01
    category: trendVAE_skip
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TVAE24_skip3_a01
    category: trendVAE_skip
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE_WaveletV3VAE
      n_stacks: 24
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  # ══════════════════════════════════════════════════════════════════════════
  # Section C: TrendVAE2 + WaveletV3VAE2 alternating (6 configs)
  #   Compact VAE2 backbone — known to be instability-prone.
  #   If skip connections specifically rescue unstable blocks,
  #   this architecture should show the largest skip benefit.
  #   Block params: latent_dim=8, trend_thetas_dim=3, wavelet_type=db2
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: TV2_8_no_skip
    category: trendVAE2_baseline
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 4}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 8
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TV2_16_no_skip
    category: trendVAE2_baseline
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 16
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TV2_24_no_skip
    category: trendVAE2_baseline
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 24
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── Skip variants ──────────────────────────────────────────────────────

  - name: TV2_16_skip4_a01
    category: trendVAE2_skip
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 8}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 16
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TV2_24_skip4_a01
    category: trendVAE2_skip
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 4, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 24
      skip_distance_cfg: 4
      skip_alpha_cfg: "0.1"

  - name: TV2_24_skip3_a01
    category: trendVAE2_skip
    stacks: {type: alternating, blocks: [TrendVAE2, WaveletV3VAE2], repeats: 12}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendVAE2_WaveletV3VAE2
      n_stacks: 24
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  # ══════════════════════════════════════════════════════════════════════════
  # Section D: TrendWaveletAE homogeneous — deep stacks + short skip
  #   (6 configs)
  #   Non-LG combined block — no learned gate means the AE bottleneck
  #   is more rigid, potentially more prone to instability at depth.
  #   Block params: latent_dim=8, trend_thetas_dim=3, wavelet_type=db2
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: TWA10_no_skip
    category: trendWaveletAE_baseline
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 10}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TWA20_no_skip
    category: trendWaveletAE_baseline
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 20}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TWA30_no_skip
    category: trendWaveletAE_baseline
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── Skip variants (short distances 2, 3) ───────────────────────────────

  - name: TWA20_skip3_a01
    category: trendWaveletAE_skip
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 20}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 20
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  - name: TWA30_skip3_a01
    category: trendWaveletAE_skip
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 30
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  - name: TWA30_skip2_a01
    category: trendWaveletAE_skip
    stacks: {type: homogeneous, block: TrendWaveletAE, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 2, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAE
      n_stacks: 30
      skip_distance_cfg: 2
      skip_alpha_cfg: "0.1"

  # ══════════════════════════════════════════════════════════════════════════
  # Section E: TrendWaveletAELG homogeneous — deep stacks + short skip
  #   (6 configs)
  #   LG variant of the combined block — learned gate may provide
  #   some natural regularization at depth. Compare with Section D
  #   (non-LG) to isolate the gate's effect.
  #   Block params: latent_dim=8, trend_thetas_dim=3, wavelet_type=db2
  # ══════════════════════════════════════════════════════════════════════════

  # ── Baselines (no skip) ─────────────────────────────────────────────────

  - name: TWALG10_no_skip
    category: trendWaveletAELG_baseline
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 10}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAELG
      n_stacks: 10
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TWALG20_no_skip
    category: trendWaveletAELG_baseline
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 20}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAELG
      n_stacks: 20
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  - name: TWALG30_no_skip
    category: trendWaveletAELG_baseline
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 0, skip_alpha: 0.0}
    extra_fields:
      architecture: TrendWaveletAELG
      n_stacks: 30
      skip_distance_cfg: 0
      skip_alpha_cfg: none

  # ── Skip variants (short distances 2, 3) ───────────────────────────────

  - name: TWALG20_skip3_a01
    category: trendWaveletAELG_skip
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 20}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAELG
      n_stacks: 20
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  - name: TWALG30_skip3_a01
    category: trendWaveletAELG_skip
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 3, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAELG
      n_stacks: 30
      skip_distance_cfg: 3
      skip_alpha_cfg: "0.1"

  - name: TWALG30_skip2_a01
    category: trendWaveletAELG_skip
    stacks: {type: homogeneous, block: TrendWaveletAELG, n: 30}
    block_params: {latent_dim: 8, trend_thetas_dim: 3, wavelet_type: db2, basis_dim: 6, forecast_basis_dim: 6}
    training: {skip_distance: 2, skip_alpha: 0.1}
    extra_fields:
      architecture: TrendWaveletAELG
      n_stacks: 30
