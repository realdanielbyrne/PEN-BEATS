      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend

  # ── DB3 · 10 stacks ────────────────────────────────────────

  - name: T+DB3V3_10s_tiered_ag0
    category: tiered_rb_db3_10s
    stacks:
      type: alternating
      blocks: [Trend, DB3WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
