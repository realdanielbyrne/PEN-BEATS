  csv_filename: tiered_offset_m4_allperiods_paperlr_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: true
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0
  pin_memory: true

analysis:
  enabled: true
  ranking: true
