# ============================================================
# Tiered Frequency-Band Offset — M4 Non-Hourly Periods (Paper-faithful StepLR)
#
# Duplicate of tiered_offset_m4_allperiods.yaml with the plateau LR
# replaced by the paper-faithful multistep LR (10 milestones, gamma=0.5),
# matching the scheduler used in m4_hourly_sym10_tiered_offset_paperlr.yaml.
#
# This allows direct comparison of plateau vs. step LR on the same tiered
# offset architectures to isolate scheduler sensitivity.
#
# ── Offset clamping behaviour on short horizons ──────────────
# _WaveletGeneratorV3 silently clamps offsets to [0, full_rank-1].
# With basis_dim=eq_fcast, full_rank ≈ forecast_length, so:
#   Yearly  (H=6):  offset=32 clamps → effective_dim=1 (no tiering)
#   Quarterly (H=8): same
#   Weekly  (H=13): same
#   Daily   (H=14): same
#   Monthly (H=18, db3): partial — tiers 1–2 valid, 3–5 clamp
#
# ── Architectures ─────────────────────────────────────────────
#   • sym10 — long-support wavelet; best on Hourly
#   • db3   — shorter support; partial tiering on Monthly
#   • 10-stack and 30-stack depths
#   • 4 backbones: RootBlock (ag0, agf), AE (ld32), AELG (ld32)
#
# ── Offset design (5 tiers, step=8, ascending) ────────────────
#   10s: [0,0, 0,8, 0,16, 0,24, 0,32]   (1 wavelet block per tier)
#   30s: [0,0,0,0,0,0, 0,8,0,8,0,8, 0,16,0,16,0,16, 0,24,0,24,0,24, 0,32,0,32,0,32]
#                                        (3 wavelet blocks per tier)
#
# ── Paper-faithful StepLR ─────────────────────────────────────
#   type: multistep — 10 equally-spaced milestones, gamma=0.5
#   Mirrors Oreshkin et al. (2020) Appendix D training protocol.
#
# ------------------------------------------------------------
# CLI usage
# ------------------------------------------------------------
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_offset_m4_allperiods_paperlr.yaml --dry-run
#
#   python experiments/run_from_yaml.py experiments/configs/tiered_offset_m4_allperiods_paperlr.yaml
#
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_offset_m4_allperiods_paperlr.yaml --analyze-only
#
#   python experiments/run_from_yaml.py \
#       experiments/configs/tiered_offset_m4_allperiods_paperlr.yaml 2>&1 | \
#       tee experiments/logs/tiered_offset_m4_allperiods_paperlr.log
# ============================================================

experiment_name: tiered_offset_m4_allperiods_paperlr
category: wavelet_offset_study
description: >
  Tiered basis_offset sweep across M4 non-Hourly periods (Yearly, Quarterly,
  Monthly, Weekly, Daily) using the paper-faithful multistep LR scheduler
  (10 milestones, gamma=0.5). Duplicate of tiered_offset_m4_allperiods but
  with plateau LR replaced by stepLR for scheduler sensitivity analysis.
  Tests sym10 and db3 wavelets at 10 and 30 stacks with RootBlock (ag0/agf),
  AE, and AELG backbones. Ascending frequency tiers only.

dataset: m4
periods:
  - Weekly

protocol:
  sampling_style: nbeats_paper
  steps_per_epoch: 1000
  sampling_weights: uniform
  lh_multiplier:
    Yearly: 1.5
    Quarterly: 1.5
    Monthly: 10
    Weekly: 10
    Daily: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_steps: 100000
  max_epochs: 150
  patience: 15
  val_check_interval: 100
  min_delta: 0.001
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  forecast_multiplier: 5
  batch_size: 1024

lr_scheduler:
  type: multistep
  n_milestones: 10
  gamma: 0.5

block_params:
  trend_thetas_dim: 3
  basis_dim: eq_fcast
  basis_offset: 0
  latent_dim: 32

extra_csv_columns:
  - basis_dim
  - basis_offset
  - stack_basis_offsets
  - arch_family
  - block_type_primary
  - backbone
  - stack_pattern
  - n_stacks
  - wavelet_family
  - basis_dim_label
  - latent_dim_cfg
  - trend_thetas_dim_cfg
  - active_g_cfg
  - tiered

configs:

  # ── Sym10 · 10 stacks ──────────────────────────────────────

  - name: T+Sym10V3_10s_tiered_ag0
    category: tiered_rb_sym10_10s
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 8, 0, 16, 0, 24, 0, 32]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend

  - name: T+Sym10V3_10s_tiered_agf
    category: tiered_rb_sym10_10s
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 5
    training:
      active_g: forecast
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 8, 0, 16, 0, 24, 0, 32]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: forecast
      tiered: ascend

  - name: TAE+Sym10V3AE_10s_tiered
    category: tiered_ae_sym10_10s
    stacks:
      type: alternating
      blocks: [TrendAE, Symlet10WaveletV3AE]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 8, 0, 16, 0, 24, 0, 32]
    extra_fields:
      arch_family: alt_ae_sym10
      block_type_primary: TrendAE+Symlet10WaveletV3AE
      backbone: AERootBlock
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend

  - name: TAELG+Sym10V3AELG_10s_tiered
    category: tiered_aelg_sym10_10s
    stacks:
      type: alternating
      blocks: [TrendAELG, Symlet10WaveletV3AELG]
      repeats: 5
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 8, 0, 16, 0, 24, 0, 32]
    extra_fields:
      arch_family: alt_aelg_sym10
      block_type_primary: TrendAELG+Symlet10WaveletV3AELG
      backbone: AERootBlockLG
      stack_pattern: alternating
      n_stacks: 10
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend

  # ── Sym10 · 30 stacks ──────────────────────────────────────

  - name: T+Sym10V3_30s_tiered_ag0
    category: tiered_rb_sym10_30s
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 0, 0, 0, 0, 8, 0, 8, 0, 8, 0, 16, 0, 16, 0, 16, 0, 24, 0, 24, 0, 24, 0, 32, 0, 32, 0, 32]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend

  - name: T+Sym10V3_30s_tiered_agf
    category: tiered_rb_sym10_30s
    stacks:
      type: alternating
      blocks: [Trend, Symlet10WaveletV3]
      repeats: 15
    training:
      active_g: forecast
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      stack_basis_offsets: [0, 0, 0, 0, 0, 0, 0, 8, 0, 8, 0, 8, 0, 16, 0, 16, 0, 16, 0, 24, 0, 24, 0, 24, 0, 32, 0, 32, 0, 32]
    extra_fields:
      arch_family: alt_trend_wavelet_rb
      block_type_primary: Trend+Symlet10WaveletV3
      backbone: RootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: null
      trend_thetas_dim_cfg: 3
      active_g_cfg: forecast
      tiered: ascend

  - name: TAE+Sym10V3AE_30s_tiered
    category: tiered_ae_sym10_30s
    stacks:
      type: alternating
      blocks: [TrendAE, Symlet10WaveletV3AE]
      repeats: 15
    block_params:
      basis_dim: eq_fcast
      trend_thetas_dim: 3
      latent_dim: 32
      stack_basis_offsets: [0, 0, 0, 0, 0, 0, 0, 8, 0, 8, 0, 8, 0, 16, 0, 16, 0, 16, 0, 24, 0, 24, 0, 24, 0, 32, 0, 32, 0, 32]
    extra_fields:
      arch_family: alt_ae_sym10
      block_type_primary: TrendAE+Symlet10WaveletV3AE
      backbone: AERootBlock
      stack_pattern: alternating
      n_stacks: 30
      wavelet_family: sym10
      basis_dim_label: eq_fcast
      latent_dim_cfg: 32
      trend_thetas_dim_cfg: 3
      active_g_cfg: false
      tiered: ascend

  - name: TAELG+Sym10V3AELG_30s_tiered
    category: tiered_aelg_sym10_30s
    stacks:
      type: alternating
      blocks: [TrendAELG, Symlet10WaveletV3AELG]
      repeats: 15
    block_params:
