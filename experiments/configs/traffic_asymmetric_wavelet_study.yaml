# ============================================================
# Traffic-96 Asymmetric Wavelet Family Diagnostic Study
#
# Tests whether using different wavelet families for the long
# backcast (L=480) and short forecast (H=96) paths explains the
# Traffic performance inversion relative to M4/Tourism/Weather.
#
# Protocol: NHiTS-style Traffic regime
#   - Z-score normalization
#   - 70/10/20 train/val/test split
#   - MSE loss
#   - L = 5*H lookback (480 for H=96)
#   - Batch size 256
#   - eq_fcast basis sizing (basis_dim = forecast_length)
#
# Backbone families:
#   - AELG: alternating TrendAELG + WaveletV3AELG
#   - VAE:  alternating TrendVAE  + WaveletV3VAE
#
# Wavelet assignments (backcast → forecast):
#   - coif2 → coif2        (symmetric short-support baseline)
#   - sym3  → sym3          (symmetric short-support)
#   - sym20 → sym3          (long→short asymmetric)
#   - sym20 → coif2         (long→short asymmetric)
#   - sym3  → sym20         (short→long control)
#
# Usage:
#   python experiments/run_from_yaml.py experiments/configs/traffic_asymmetric_wavelet_study.yaml --dry-run
#   python experiments/run_from_yaml.py experiments/configs/traffic_asymmetric_wavelet_study.yaml
# ============================================================

experiment_name: Traffic-AsymWavelet-Diagnostic
dataset: traffic
periods: [Traffic-96]
category: wavelet_asymmetric_diagnostic

training:
  loss: MSELoss
  max_epochs: 100
  patience: 10
  activation: ReLU
  active_g: false
  sum_losses: false
  optimizer: Adam
  batch_size: 256
  forecast_multiplier: 5

block_params:
  basis_dim: 96          # eq_fcast: basis_dim = forecast_length
  forecast_basis_dim: 96
  latent_dim: 4
  thetas_dim: 5
  trend_thetas_dim: 3

runs:
  n_runs: 5
  base_seed: 1

configs:
  # ── AELG backbone: TrendAELG + WaveletV3AELG alternating (5 pairs = 10 stacks) ──

  - name: AELG-coif2-coif2
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 5}
    block_params:
      wavelet_type: coif2

  - name: AELG-sym3-sym3
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 5}
    block_params:
      wavelet_type: sym3

  - name: AELG-sym20-sym3
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 5}
    block_params:
      wavelet_type: sym3
      backcast_wavelet_type: sym20

  - name: AELG-sym20-coif2
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 5}
    block_params:
      wavelet_type: coif2
      backcast_wavelet_type: sym20

  - name: AELG-sym3-sym20
    stacks: {type: alternating, blocks: [TrendAELG, WaveletV3AELG], repeats: 5}
    block_params:
      wavelet_type: sym20
      backcast_wavelet_type: sym3

  # ── VAE backbone: TrendVAE + WaveletV3VAE alternating (5 pairs = 10 stacks) ──

  - name: VAE-coif2-coif2
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 5}
    block_params:
      wavelet_type: coif2

  - name: VAE-sym3-sym3
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 5}
    block_params:
      wavelet_type: sym3

  - name: VAE-sym20-sym3
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 5}
    block_params:
      wavelet_type: sym3
      backcast_wavelet_type: sym20

  - name: VAE-sym20-coif2
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 5}
    block_params:
      wavelet_type: coif2
      backcast_wavelet_type: sym20

  - name: VAE-sym3-sym20
    stacks: {type: alternating, blocks: [TrendVAE, WaveletV3VAE], repeats: 5}
    block_params:
      wavelet_type: sym20
      backcast_wavelet_type: sym3

output:
  save_predictions: true

logging:
  tensorboard: false

