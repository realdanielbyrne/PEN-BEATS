# ============================================================
# TrendWaveletAE/AELG Corrected-Width Validation — Tourism-Yearly
#
# Validates TrendWaveletAE and TrendWaveletAELG with the
# corrected t_width=256 (fixed from inadvertent g_width=512).
# Tourism-Yearly dataset (H=4, backcast=8, forecast_multiplier=2).
#
# Design:
#   - 2 block types × 4 wavelet families = 8 configs
#   - Single pass: active_g=false
#   - eq_fcast: basis_dim=4 (= forecast_length H=4)
#   - latent_dim=8 for AE, latent_dim=12 for AELG
#   - 10 stacks, 5 runs per config = 40 total runs
#
# Note on latent_dim: prior Tourism studies confirmed ld=16 is
# critical for TrendWaveletAELG SOTA performance. This validation
# uses ld=12 per the experiment spec to test corrected width in a
# controlled setting comparable to M4 and Weather. A follow-on
# study with ld=16 can assess peak Tourism performance.
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_twidth_validation_tourism.yaml --dry-run
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_twidth_validation_tourism.yaml
#   python experiments/run_from_yaml.py \
#       experiments/configs/trendwavelet_twidth_validation_tourism.yaml --worker-id gpu0
# ============================================================

experiment_name: trendwavelet_twidth_validation_tourism
category: trendwavelet_twidth_validation
description: >
  TrendWaveletAE/AELG with corrected t_width=256 on Tourism-Yearly.
  Validates the width bug fix across datasets. eq_fcast: basis_dim=4 (H=4).

dataset: tourism
periods:
  - Tourism-Yearly

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

# Global block params — t_width=256 explicitly set to document the corrected value.
# basis_dim=4 = eq_fcast for Tourism-Yearly (H=4).
block_params:
  trend_thetas_dim: 3
  basis_dim: 4
  t_width: 256

extra_csv_columns:
  - block_type
  - backbone
  - wavelet_family

# ── TrendWaveletAE (AERootBlock, latent_dim=8) ────────────────────────────────
configs:
  - name: TWAE_haar_td3_bd4_ld8
    category: trendwaveletae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    block_params:
      wavelet_type: haar
      latent_dim: 8
    extra_fields:
      block_type: TrendWaveletAE
      backbone: AERootBlock
      wavelet_family: haar

  - name: TWAE_db3_td3_bd4_ld8
    category: trendwaveletae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    block_params:
      wavelet_type: db3
      latent_dim: 8
    extra_fields:
      block_type: TrendWaveletAE
      backbone: AERootBlock
      wavelet_family: db3

  - name: TWAE_db10_td3_bd4_ld8
    category: trendwaveletae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    block_params:
      wavelet_type: db10
      latent_dim: 8
    extra_fields:
      block_type: TrendWaveletAE
      backbone: AERootBlock
      wavelet_family: db10

  - name: TWAE_sym20_td3_bd4_ld8
    category: trendwaveletae
    stacks:
      type: homogeneous
      block: TrendWaveletAE
      n: 10
    block_params:
      wavelet_type: sym20
      latent_dim: 8
    extra_fields:
      block_type: TrendWaveletAE
      backbone: AERootBlock
      wavelet_family: sym20

# ── TrendWaveletAELG (AERootBlockLG, latent_dim=12) ──────────────────────────
  - name: TWAELG_haar_td3_bd4_ld12
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    block_params:
      wavelet_type: haar
      latent_dim: 12
    extra_fields:
      block_type: TrendWaveletAELG
      backbone: AERootBlockLG
      wavelet_family: haar

  - name: TWAELG_db3_td3_bd4_ld12
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    block_params:
      wavelet_type: db3
      latent_dim: 12
    extra_fields:
      block_type: TrendWaveletAELG
      backbone: AERootBlockLG
      wavelet_family: db3

  - name: TWAELG_db10_td3_bd4_ld12
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    block_params:
      wavelet_type: db10
      latent_dim: 12
    extra_fields:
      block_type: TrendWaveletAELG
      backbone: AERootBlockLG
      wavelet_family: db10

  - name: TWAELG_sym20_td3_bd4_ld12
    category: trendwaveletaelg
    stacks:
      type: homogeneous
      block: TrendWaveletAELG
      n: 10
    block_params:
      wavelet_type: sym20
      latent_dim: 12
    extra_fields:
      block_type: TrendWaveletAELG
      backbone: AERootBlockLG
      wavelet_family: sym20

runs:
  n_runs: 5
  base_seed: 42

output:
  results_dir: experiments/results
  csv_filename: trendwavelet_twidth_validation_tourism_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0
  worker_id: ""

analysis:
  enabled: true
  ranking: true
