# ============================================================
# Wavelet Study 2 — Basis Dimension Sweep
# Mirrors run_wavelet_study_2_basis_dim.py
#
# Factorial study: wavelet family × basis_dim × trend thetas_dim
# Architecture: [Trend, WaveletV3] * 5  (10 stacks, alternating)
# Dataset: M4-Yearly only (horizon=6, backcast=30)
#
# Search grid (24 configs):
#   Wavelet families: HaarWaveletV3, DB3WaveletV3, Coif2WaveletV3       (3)
#   basis_dim:
#     eq_fcast   = forecast_length      = 6
#     lt_fcast   = max(fl//2, fl-2)     = 4
#     eq_bcast   = backcast_length      = 30
#     lt_bcast   = backcast_length // 2 = 15                            (4)
#   trend thetas_dim: 3, 5                                              (2)
#   Total: 3 × 4 × 2 = 24 configs
#
# Fixed: active_g=False, sum_losses=False, n_blocks=1, share_weights=True
# Runs: 3 seeds (42, 43, 44) per config
#
# Usage:
#   python experiments/run_from_yaml.py \
#       experiments/configs/wavelet_study_2_basis_dim.yaml
# ============================================================

experiment_name: wavelet_study_2_basis_dim
category: wavelet_basis_sweep
description: >
  Factorial Trend+WaveletV3 study on M4-Yearly: 3 wavelet families × 4 basis_dim
  levels × 2 trend polynomial degrees (thetas_dim=3 vs 5). Fixed active_g=False.
  Tests whether the wavelet basis_dim relative to forecast/backcast length affects
  forecasting quality.

dataset: m4
periods: [Yearly]

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  n_blocks_per_stack: 1
  share_weights: true

block_params:
  latent_dim: 4
  # basis_dim and trend_thetas_dim set per config

lr_scheduler: null

extra_csv_columns:
  - basis_dim
  - basis_offset
  - thetas_dim
  - backcast_length

configs:

  # ── HaarWaveletV3 ────────────────────────────────────────────────────
  - name: Haar_bd6_eq_fcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 6, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 6, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Haar_bd6_eq_fcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 6, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 6, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: Haar_bd4_lt_fcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 4, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 4, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Haar_bd4_lt_fcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 4, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 4, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: Haar_bd30_eq_bcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 30, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 30, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Haar_bd30_eq_bcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 30, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 30, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: Haar_bd15_lt_bcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 15, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 15, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Haar_bd15_lt_bcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, HaarWaveletV3], repeats: 5}
    block_params: {basis_dim: 15, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 15, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  # ── DB3WaveletV3 ─────────────────────────────────────────────────────
  - name: DB3_bd6_eq_fcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 6, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 6, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: DB3_bd6_eq_fcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 6, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 6, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: DB3_bd4_lt_fcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 4, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 4, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: DB3_bd4_lt_fcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 4, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 4, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: DB3_bd30_eq_bcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 30, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 30, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: DB3_bd30_eq_bcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 30, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 30, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: DB3_bd15_lt_bcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 15, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 15, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: DB3_bd15_lt_bcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, DB3WaveletV3], repeats: 5}
    block_params: {basis_dim: 15, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 15, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  # ── Coif2WaveletV3 ───────────────────────────────────────────────────
  - name: Coif2_bd6_eq_fcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 6, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 6, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Coif2_bd6_eq_fcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 6, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 6, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: Coif2_bd4_lt_fcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 4, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 4, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Coif2_bd4_lt_fcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 4, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 4, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: Coif2_bd30_eq_bcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 30, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 30, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Coif2_bd30_eq_bcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 30, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 30, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

  - name: Coif2_bd15_lt_bcast_td3
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 15, thetas_dim: 3, trend_thetas_dim: 3}
    extra_fields: {basis_dim: 15, basis_offset: 0, thetas_dim: 3, backcast_length: 30}

  - name: Coif2_bd15_lt_bcast_td5
    category: basis_dim_sweep
    stacks: {type: alternating, blocks: [Trend, Coif2WaveletV3], repeats: 5}
    block_params: {basis_dim: 15, thetas_dim: 5, trend_thetas_dim: 5}
    extra_fields: {basis_dim: 15, basis_offset: 0, thetas_dim: 5, backcast_length: 30}

runs:
  n_runs: 3
  seeds: [42, 43, 44]

output:
  results_dir: experiments/results
  csv_filename: wavelet_study_2_basis_dim_results.csv
  save_predictions: false

logging:
  wandb:
    enabled: false
    project: nbeats-lightning
  tensorboard: false

hardware:
  accelerator: auto
  num_workers: 0

analysis:
  enabled: true
  ranking: true
