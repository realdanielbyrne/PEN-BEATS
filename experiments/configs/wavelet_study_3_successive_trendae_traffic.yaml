# wavelet_study_3_successive_traffic.yaml
# Successive halving search over WaveletV3 families, basis_dims, and trend_thetas_dim
# Backbone: [Trend, <WaveletV3>] * 10 (20 stacks) — LARGE_STACK_DATASETS
# Dataset: Traffic-96 (horizon=96, backcast=192, forecast_multiplier=2)
# basis_dims: eq_fcast=96, lt_fcast=94 (max(48,94)), eq_bcast=192
#   NOTE: lt_bcast=96 collides with eq_fcast=96 → deduplicated to 3 unique values
# Mirrors: experiments/run_wavelet_study_3_successive.py (Traffic pass)
# 84 configs per pass × 2 passes = 168 total configs
# Successive halving: 3 rounds → 7 / 15 / 50 epochs, keep top 33% each round

experiment_name: wavelet_study_3_successive_trendae_traffic
description: >
  WaveletV3 successive halving search on Traffic-96 (TrendAE backbone).
  14 wavelet families × 3 basis_dims × 2 trend_thetas_dims = 84 configs per pass.
  Architecture: [TrendAE, WaveletV3] * 10 (20 stacks). Basis dims: eq_fcast=96,
  lt_fcast=94, eq_bcast=192 (lt_bcast=96 deduped with eq_fcast). 2 passes:
  baseline (active_g=false) and activeG_fcast (active_g=forecast).
output_csv: wavelet_study_3_successive_trendae_results.csv

dataset: traffic
periods:
  - Traffic-96

runs:
  n_runs: 3
  base_seed: 42

training:
  max_epochs: 50
  patience: 10
  learning_rate: 0.001
  loss: SMAPELoss
  lr_scheduler:
    warmup_epochs: 15
    eta_min: 0.000001

search:
  enabled: true
  rounds:
    - {epochs: 7,  keep_fraction: 0.33, top_k: null}
    - {epochs: 15, keep_fraction: 0.33, top_k: null}
    - {epochs: 50, keep_fraction: null,  top_k: 2}

extra_csv_columns:
  - search_round
  - basis_dim
  - basis_offset
  - trend_thetas_dim_cfg
  - wavelet_family
  - bd_label
  - active_g_cfg
  - meta_predicted_best
  - meta_convergence_score

passes:
  - pass_name: baseline
    pass_params:
      active_g: false
    configs:
      - {name: Haar_bd96_eq_fcast_ttd3,    category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, HaarWaveletV3],    repeats: 10}, block_params: {basis_dim: 96,  trend_thetas_dim: 3}, extra_fields: {wavelet_family: HaarWaveletV3,    bd_label: eq_fcast, trend_thetas_dim_cfg: 3}}
      - {name: Haar_bd96_eq_fcast_ttd5,    category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, HaarWaveletV3],    repeats: 10}, block_params: {basis_dim: 96,  trend_thetas_dim: 5}, extra_fields: {wavelet_family: HaarWaveletV3,    bd_label: eq_fcast, trend_thetas_dim_cfg: 5}}
      - {name: Haar_bd94_lt_fcast_ttd3,    category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, HaarWaveletV3],    repeats: 10}, block_params: {basis_dim: 94,  trend_thetas_dim: 3}, extra_fields: {wavelet_family: HaarWaveletV3,    bd_label: lt_fcast, trend_thetas_dim_cfg: 3}}
      - {name: Haar_bd94_lt_fcast_ttd5,    category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, HaarWaveletV3],    repeats: 10}, block_params: {basis_dim: 94,  trend_thetas_dim: 5}, extra_fields: {wavelet_family: HaarWaveletV3,    bd_label: lt_fcast, trend_thetas_dim_cfg: 5}}
      - {name: Haar_bd192_eq_bcast_ttd3,   category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, HaarWaveletV3],    repeats: 10}, block_params: {basis_dim: 192, trend_thetas_dim: 3}, extra_fields: {wavelet_family: HaarWaveletV3,    bd_label: eq_bcast, trend_thetas_dim_cfg: 3}}
      - {name: Haar_bd192_eq_bcast_ttd5,   category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, HaarWaveletV3],    repeats: 10}, block_params: {basis_dim: 192, trend_thetas_dim: 5}, extra_fields: {wavelet_family: HaarWaveletV3,    bd_label: eq_bcast, trend_thetas_dim_cfg: 5}}
      - {name: DB2_bd96_eq_fcast_ttd3,     category: wavelet_search, stacks: {type: alternating, blocks: [TrendAE, DB2WaveletV3],     repeats: 10}, block_params: {basis_dim: 96,  trend_thetas_dim: 3}, extra_fields: {wavelet_family: DB2WaveletV3,     bd_label: eq_fcast, trend_thetas_dim_cfg: 3}}
