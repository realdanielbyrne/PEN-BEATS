study_name: wavelet_v3ae_study_traffic

dataset: traffic
period: Traffic-96

architecture:
  trend_block: TrendAE
  repeats: 10

training:
  active_g: false
  sum_losses: false
  activation: ReLU
  n_blocks_per_stack: 1
  share_weights: true
  loss: SMAPELoss
  optimizer: Adam
  learning_rate: 0.001

lr_scheduler:
  warmup_epochs: 15
  eta_min: 0.000001

search_space:
  wavelets:
    - HaarWaveletV3AE
    - DB2WaveletV3AE
    - DB3WaveletV3AE
    - DB4WaveletV3AE
    - DB10WaveletV3AE
    - DB20WaveletV3AE
    - Coif1WaveletV3AE
    - Coif2WaveletV3AE
    - Coif3WaveletV3AE
    - Coif10WaveletV3AE
    - Symlet2WaveletV3AE
    - Symlet3WaveletV3AE
    - Symlet10WaveletV3AE
    - Symlet20WaveletV3AE
  basis_labels: [eq_fcast, lt_fcast, eq_bcast, lt_bcast]
  trend_thetas_dims: [3, 5]
  latent_dims: [2, 5, 8]

search:
  rounds:
    - max_epochs: 10
      n_runs: 3
      keep_fraction: 0.67
    - max_epochs: 15
      n_runs: 3
      keep_fraction: 0.67
    - max_epochs: 50
      n_runs: 3
      top_k: 10

meta_forecaster:
  enabled: true
  cache_dir: experiments/results/.meta_cache
  training_csvs:
    - experiments/results/m4/unified_benchmark_results.csv
    - experiments/results/m4/block_benchmark_results.csv
    - experiments/results/traffic/block_benchmark_results.csv
    - experiments/results/m4/convergence_study_results_v1.csv
    - experiments/results/weather/convergence_study_results_v1.csv
    - experiments/results/traffic/convergence_study_results_v1.csv

output:
  results_dir: experiments/results
  search_csv_filename: wavelet_v3ae_study_results.csv
  cross_csv_path: experiments/results/wavelet_v3ae_cross_dataset_results.csv

hardware:
  accelerator: auto
  num_workers: 0

runs:
  base_seed: 42
